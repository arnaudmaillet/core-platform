[package]
name = "traffic-redis"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Redis-lease distributed backend for the traffic rate limiter."

[dependencies]
traffic = { workspace = true }
redis-storage = { workspace = true }
fred = { workspace = true, features = ["i-scripts"] }
async-trait = { workspace = true }
dashmap = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[features]
# Live-Redis integration test (requires a Docker daemon). Off by default so the unit
# suite — which exercises the lease algorithm against an in-memory claim source — stays
# hermetic.
integration-traffic-redis = []

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
test-support = { workspace = true }
