syntax = "proto3";

package post.v1;

import "post/v1/models.proto";

option go_package = "github.com/core-platform/proto/post/v1";

message PostTarget {
  string post_id   = 1;
  string author_id = 2;
}

service PostCommandService {
  rpc CreatePost(CreatePostRequest) returns (CreatePostResponse);
  rpc UpdateCaption(UpdateCaptionRequest) returns (UpdateCaptionResponse);
  rpc ChangeVisibility(ChangeVisibilityRequest) returns (ChangeVisibilityResponse);
  rpc ToggleComments(ToggleCommentsRequest) returns (ToggleCommentsResponse);
  rpc DeletePost(DeletePostRequest) returns (DeletePostResponse);
}

message CreatePostRequest {
  string              command_id            = 1;
  string              region                = 2;
  string              author_id             = 3;
  string              post_type             = 4;
  optional string     caption               = 5;
  repeated MediaAsset media_list            = 6;
  bool                allowed_comment_hands = 7;
  string              visibility_level      = 8;
  optional string     music_id              = 9;
  string              dynamic_metadata      = 10;
}

message CreatePostResponse {
  string post_id = 1;
}

message UpdateCaptionRequest {
  string     command_id  = 1;
  PostTarget target      = 2;
  string     new_caption = 3;
}

message UpdateCaptionResponse {}

message ChangeVisibilityRequest {
  string     command_id           = 1;
  PostTarget target               = 2;
  string     new_visibility_level = 3;
}

message ChangeVisibilityResponse {}

message ToggleCommentsRequest {
  string     command_id = 1;
  PostTarget target     = 2;
  bool       allowed    = 3;
}

message ToggleCommentsResponse {}

message DeletePostRequest {
  string     command_id = 1;
  PostTarget target     = 2;
}

message DeletePostResponse {}