[package]
name        = "profile-api"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
authors.workspace    = true
repository.workspace = true
description = "Generated gRPC contract for profile.v1 — server + client stubs and reflection descriptor."

[dependencies]
tonic       = { workspace = true }
tonic-prost = { workspace = true }
prost       = { workspace = true }
prost-types = { workspace = true }

[build-dependencies]
tonic-prost-build = { workspace = true }

# prost / prost-types / tonic-prost are referenced only by the tonic-generated
# code emitted into OUT_DIR (via `tonic::include_proto!`), which cargo-machete's
# source scan cannot see. They are genuinely required to compile — keep them.
[package.metadata.cargo-machete]
ignored = ["prost", "prost-types", "tonic-prost"]
