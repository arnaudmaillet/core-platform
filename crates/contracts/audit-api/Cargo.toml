[package]
name        = "audit-api"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
authors.workspace    = true
repository.workspace = true
description = "Generated gRPC contract for audit.v1 — the internal compliance evidence surface: the synchronous fail-closed RecordPrivileged RPC, the access-controlled Query/Export/VerifyIntegrity reads, and the AuditEvent envelope reused as the audit.v1.events Kafka payload (server + client stubs and reflection descriptor)."

[dependencies]
tonic       = { workspace = true }
tonic-prost = { workspace = true }
prost       = { workspace = true }
prost-types = { workspace = true }

[build-dependencies]
tonic-prost-build = { workspace = true }

# prost / prost-types / tonic-prost are referenced only by the tonic-generated
# code emitted into OUT_DIR (via `tonic::include_proto!`), which cargo-machete's
# source scan cannot see. They are genuinely required to compile — keep them.
[package.metadata.cargo-machete]
ignored = ["prost", "prost-types", "tonic-prost"]
