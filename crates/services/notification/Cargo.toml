[package]
name        = "notification"
version.workspace   = true
edition.workspace   = true
license.workspace   = true
authors.workspace   = true
repository.workspace = true
description = "Notification microservice — semantic event ingestion, ScyllaDB activity feed, gRPC server-streaming, and layered write-collapse fan-out mitigation."

[dependencies]
error          = { workspace = true }
validate-core  = { workspace = true }
validation     = { workspace = true }
scylla-storage = { path = "../../shared/storage/scylla", package = "scylla-storage" }
redis-storage  = { path = "../../shared/storage/redis",  package = "redis-storage" }
cqrs           = { path = "../../shared/cqrs" }
telemetry      = { path = "../../shared/telemetry" }
transport      = { path = "../../shared/transport" }

tokio        = { workspace = true }
tokio-stream = { workspace = true }
futures      = { workspace = true }
futures-util = { workspace = true }
async-trait  = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
uuid         = { workspace = true }
chrono       = { workspace = true }
thiserror    = { workspace = true }
tracing      = { workspace = true }
dashmap      = { workspace = true }
once_cell    = { workspace = true }
regex        = { workspace = true }

tonic            = { workspace = true }
tonic-prost      = { workspace = true }
prost            = { workspace = true }
prost-types      = { workspace = true }
tonic-health     = { workspace = true }
tonic-reflection = { workspace = true }
http             = { workspace = true }

scylla = { workspace = true }
fred   = { workspace = true, features = ["partial-tracing", "i-scripts"] }

[build-dependencies]
tonic-build       = { workspace = true }
tonic-prost-build = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
