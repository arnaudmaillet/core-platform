[package]
name        = "post"
version.workspace   = true
edition.workspace   = true
license.workspace   = true
authors.workspace   = true
repository.workspace = true
description = "Post microservice — multi-format media content production pillar (Carousel / MainVideo / TextOnly)."

[dependencies]
post-api = { workspace = true }
error            = { workspace = true }
validate-core    = { workspace = true }
validation       = { workspace = true }
scylla-storage   = { workspace = true }
cqrs         = { workspace = true }
auth-context = { workspace = true }
telemetry    = { workspace = true }
transport    = { workspace = true }
service-runtime = { workspace = true }
anyhow       = { workspace = true }
tokio        = { workspace = true }
futures      = { workspace = true }
async-trait  = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
base64       = { workspace = true }
uuid         = { workspace = true }
chrono       = { workspace = true }
thiserror    = { workspace = true }
tracing      = { workspace = true }
tonic             = { workspace = true }
tonic-prost       = { workspace = true }
prost             = { workspace = true }
prost-types       = { workspace = true }
tonic-health      = { workspace = true }
tonic-reflection  = { workspace = true }
http              = { workspace = true }
scylla = { workspace = true }

[features]
# Gates the live, container-backed integration suite (tests/integration.rs).
# Off by default so `cargo test -p post` stays a fast, infra-free unit run; the
# live suite is opt-in via `cargo test -p post --features integration-post`.
integration-post = []

[dev-dependencies]
tokio = { workspace = true }

# ── Integration suite (feature = "integration-post") ─────────────────────────
# Container orchestration, the RF=1 migration runner, and `await_until` come from
# the shared `test-support` crate; the suite code is wholly behind
# `#[cfg(feature = "integration-post")]`.
test-support = { workspace = true }
async-trait  = { workspace = true }
uuid         = { workspace = true }
