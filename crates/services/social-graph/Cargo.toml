[package]
name        = "social-graph"
version.workspace   = true
edition.workspace   = true
license.workspace   = true
authors.workspace   = true
repository.workspace = true
description = "Social-graph microservice — directional follow/block relationships between opaque ProfileId primitives."

[dependencies]
# ── Shared platform infrastructure ───────────────────────────────────────────
error            = { workspace = true }
validate-core    = { workspace = true }
validation       = { workspace = true }
scylla-storage   = { workspace = true }
redis-storage    = { workspace = true }

# ── Shared platform crates ────────────────────────────────────────────────────
cqrs         = { workspace = true }
auth-context = { workspace = true }
telemetry    = { workspace = true }
transport    = { workspace = true }

# ── Async runtime & utilities ─────────────────────────────────────────────────
tokio        = { workspace = true }
futures      = { workspace = true }
async-trait  = { workspace = true }

# ── Serialisation ─────────────────────────────────────────────────────────────
serde        = { workspace = true }
serde_json   = { workspace = true }
base64       = { workspace = true }

# ── Domain types ──────────────────────────────────────────────────────────────
uuid         = { workspace = true }
chrono       = { workspace = true }

# ── Error handling ────────────────────────────────────────────────────────────
thiserror    = { workspace = true }

# ── Observability ─────────────────────────────────────────────────────────────
tracing      = { workspace = true }

# ── gRPC / Protobuf ───────────────────────────────────────────────────────────
tonic             = { workspace = true }
tonic-prost       = { workspace = true }
prost             = { workspace = true }
prost-types       = { workspace = true }
tonic-health      = { workspace = true }
tonic-reflection  = { workspace = true }
http              = { workspace = true }

# ── Storage drivers (direct access for advanced query patterns) ───────────────
scylla = { workspace = true }
fred   = { workspace = true }

[build-dependencies]
tonic-build       = { workspace = true }
tonic-prost-build = { workspace = true }

[features]
# Gates the live, container-backed integration suite (tests/integration.rs).
# Off by default so `cargo test -p social-graph` stays a fast, infra-free unit
# run; the live suite is opt-in via
# `cargo test -p social-graph --features integration-social-graph`.
integration-social-graph = []

[dev-dependencies]
tokio = { workspace = true }

# ── Integration suite (feature = "integration-social-graph") ─────────────────
# Container orchestration, the RF=1 migration runner, and `await_until` come from
# the shared `test-support` crate; the suite code is wholly behind
# `#[cfg(feature = "integration-social-graph")]`.
test-support = { workspace = true }
async-trait  = { workspace = true }
uuid         = { workspace = true }
