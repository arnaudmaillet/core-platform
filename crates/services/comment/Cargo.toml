[package]
name        = "comment"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
authors.workspace    = true
repository.workspace = true
description = "Comment microservice — 1-level threaded comment engine with GIF support, ScyllaDB wide-column tree layout, and Kafka-driven engagement counter reactivity."

[dependencies]
error          = { workspace = true }
validate-core  = { workspace = true }
validation     = { workspace = true }
scylla-storage = { path = "../../shared/storage/scylla", package = "scylla-storage" }
cqrs           = { path = "../../shared/cqrs" }
telemetry      = { path = "../../shared/telemetry" }
transport      = { path = "../../shared/transport" }

tokio        = { workspace = true }
async-trait  = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
base64       = { workspace = true }
uuid         = { workspace = true }
chrono       = { workspace = true }
thiserror    = { workspace = true }
tracing      = { workspace = true }

tonic            = { workspace = true }
tonic-prost      = { workspace = true }
prost            = { workspace = true }
prost-types      = { workspace = true }
tonic-health     = { workspace = true }
tonic-reflection = { workspace = true }
http             = { workspace = true }

scylla = { workspace = true }

[build-dependencies]
tonic-build       = { workspace = true }
tonic-prost-build = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
