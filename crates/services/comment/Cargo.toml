[package]
name        = "comment"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
authors.workspace    = true
repository.workspace = true
description = "Comment microservice — 1-level threaded comment engine with GIF support, ScyllaDB wide-column tree layout, and Kafka-driven engagement counter reactivity."

[dependencies]
error          = { workspace = true }
validate-core  = { workspace = true }
validation     = { workspace = true }
scylla-storage = { workspace = true }
cqrs           = { workspace = true }
telemetry      = { workspace = true }
transport      = { workspace = true }

tokio        = { workspace = true }
async-trait  = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
base64       = { workspace = true }
uuid         = { workspace = true }
chrono       = { workspace = true }
thiserror    = { workspace = true }
tracing      = { workspace = true }

tonic            = { workspace = true }
tonic-prost      = { workspace = true }
prost            = { workspace = true }
prost-types      = { workspace = true }
tonic-health     = { workspace = true }
tonic-reflection = { workspace = true }
http             = { workspace = true }

scylla = { workspace = true }

[build-dependencies]
tonic-build       = { workspace = true }
tonic-prost-build = { workspace = true }

[features]
# Gates the live, container-backed integration suite (tests/integration.rs).
# Off by default so `cargo test -p comment` stays a fast, infra-free unit run; the
# live suite is opt-in via `cargo test -p comment --features integration-comment`.
integration-comment = []

[dev-dependencies]
tokio = { workspace = true }

# ── Integration suite (feature = "integration-comment") ──────────────────────
# Container orchestration, the RF=1 migration runner, and `await_until` come from
# the shared `test-support` crate; the suite code is wholly behind
# `#[cfg(feature = "integration-comment")]`.
test-support = { workspace = true }
async-trait  = { workspace = true }
uuid         = { workspace = true }
