[package]
name        = "geo-discovery"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
authors.workspace    = true
repository.workspace = true
description = "Geo-discovery microservice — H3 spatial indexing engine with Redis-primary ZSET scoring, msgpack card caching, and ScyllaDB TWCS durability for a real-time global map feed."

[dependencies]
geo-discovery-api = { workspace = true }
error          = { workspace = true }
validate-core  = { workspace = true }
validation     = { workspace = true }
scylla-storage = { workspace = true }
redis-storage  = { workspace = true }
cqrs           = { workspace = true }
telemetry      = { workspace = true }
transport      = { workspace = true }
service-runtime = { workspace = true }
anyhow         = { workspace = true }

tokio        = { workspace = true }
futures      = { workspace = true }
futures-util = { workspace = true }
async-trait  = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
uuid         = { workspace = true }
chrono       = { workspace = true }
thiserror    = { workspace = true }
tracing      = { workspace = true }

tonic            = { workspace = true }
tonic-prost      = { workspace = true }
prost            = { workspace = true }
prost-types      = { workspace = true }
tonic-health     = { workspace = true }
tonic-reflection = { workspace = true }
http             = { workspace = true }

scylla = { workspace = true }
fred   = { workspace = true, features = ["partial-tracing", "i-scripts"] }

# H3 spatial indexing — pure Rust, no C FFI.
h3o = "0.6"

# MessagePack serialization for compact Redis card payloads (~45% smaller than JSON).
rmp-serde = "1.3"

[features]
# Gates the live, container-backed integration suite (tests/integration.rs).
# Off by default so `cargo test -p geo-discovery` stays a fast, infra-free unit
# run; the live suite is opt-in via
# `cargo test -p geo-discovery --features integration-geo-discovery`.
integration-geo-discovery = []

[dev-dependencies]
tokio = { workspace = true }

# ── Integration suite (feature = "integration-geo-discovery") ────────────────
# Container orchestration, the RF=1 migration runner, and `await_until` come from
# the shared `test-support` crate; the suite code is wholly behind
# `#[cfg(feature = "integration-geo-discovery")]`.
test-support = { workspace = true }
uuid         = { workspace = true }
