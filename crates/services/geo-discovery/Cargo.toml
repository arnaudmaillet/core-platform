[package]
name        = "geo-discovery"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
authors.workspace    = true
repository.workspace = true
description = "Geo-discovery microservice — H3 spatial indexing engine with Redis-primary ZSET scoring, msgpack card caching, and ScyllaDB TWCS durability for a real-time global map feed."

[dependencies]
error          = { workspace = true }
validate-core  = { workspace = true }
validation     = { workspace = true }
scylla-storage = { path = "../../shared/storage/scylla", package = "scylla-storage" }
redis-storage  = { path = "../../shared/storage/redis",  package = "redis-storage" }
cqrs           = { path = "../../shared/cqrs" }
telemetry      = { path = "../../shared/telemetry" }
transport      = { path = "../../shared/transport" }

tokio        = { workspace = true }
futures      = { workspace = true }
futures-util = { workspace = true }
async-trait  = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
uuid         = { workspace = true }
chrono       = { workspace = true }
thiserror    = { workspace = true }
tracing      = { workspace = true }

tonic            = { workspace = true }
tonic-prost      = { workspace = true }
prost            = { workspace = true }
prost-types      = { workspace = true }
tonic-health     = { workspace = true }
tonic-reflection = { workspace = true }
http             = { workspace = true }

scylla = { workspace = true }
fred   = { workspace = true, features = ["partial-tracing", "i-scripts"] }

# H3 spatial indexing — pure Rust, no C FFI.
h3o = "0.6"

# MessagePack serialization for compact Redis card payloads (~45% smaller than JSON).
rmp-serde = "1.3"

[build-dependencies]
tonic-build       = { workspace = true }
tonic-prost-build = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
