# Auth PostgreSQL via CloudNativePG. namePrefix -> staging-auth-postgres; CNPG
# exposes staging-auth-postgres-rw:5432 and a staging-auth-postgres-app Secret
# (key `uri` = full connection string) wired into auth-server (see
# patch-auth-db.yaml).
#
# Holds auth's own session/issuance state. The federated IdP (Keycloak) is a
# separate concern — auth brokers to it; its datastore is not this cluster.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: auth-postgres
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  bootstrap:
    initdb:
      database: auth
      owner: app
  storage:
    size: 10Gi
    storageClass: gp3
  # Pin to the database node tier and tolerate its taint, so the cluster lands on
  # the dedicated DB nodes instead of spilling onto general/spot capacity.
  # enablePodAntiAffinity spreads the two instances across AZs.
  affinity:
    nodeSelector:
      intent: database
    tolerations:
      - key: dedicated
        value: database
        effect: NoSchedule
    enablePodAntiAffinity: true
    topologyKey: topology.kubernetes.io/zone
