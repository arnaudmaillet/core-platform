# Account PostgreSQL via CloudNativePG. namePrefix -> staging-account-postgres;
# CNPG exposes staging-account-postgres-rw:5432 and a staging-account-postgres-app
# Secret (key `uri` = full connection string) wired into account-server (see patch).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: account-postgres
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  bootstrap:
    initdb:
      database: account
      owner: app
  storage:
    size: 10Gi
    storageClass: gp3
  # Pin to the database node tier and tolerate its taint, so the cluster lands on
  # the dedicated DB nodes instead of spilling onto general/spot capacity.
  # enablePodAntiAffinity spreads the two instances across AZs.
  affinity:
    nodeSelector:
      intent: database
    tolerations:
      - key: dedicated
        value: database
        effect: NoSchedule
    enablePodAntiAffinity: true
    topologyKey: topology.kubernetes.io/zone
