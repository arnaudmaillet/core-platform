# Media asset-lifecycle PostgreSQL via CloudNativePG. namePrefix ->
# staging-media-postgres; CNPG exposes staging-media-postgres-rw:5432 and a
# staging-media-postgres-app Secret (key `uri` = full connection string) wired
# into media-server (see patch-media-db.yaml).
#
# Postgres is media's asset-lifecycle SoR (the JSONB asset document). The bytes
# live in S3 (presigned direct upload/delivery) and the hot cache in ElastiCache;
# neither is provisioned here.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: media-postgres
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  bootstrap:
    initdb:
      database: media
      owner: app
  storage:
    size: 10Gi
    storageClass: gp3
  # Pin to the database node tier and tolerate its taint, so the cluster lands on
  # the dedicated DB nodes instead of spilling onto general/spot capacity.
  # enablePodAntiAffinity spreads the two instances across AZs.
  affinity:
    nodeSelector:
      intent: database
    tolerations:
      - key: dedicated
        value: database
        effect: NoSchedule
    enablePodAntiAffinity: true
    topologyKey: topology.kubernetes.io/zone
