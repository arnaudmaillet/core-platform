# k8s/overlays/staging/kustomization.yaml
#
# Staging fleet on managed backends (MSK + ElastiCache) + in-cluster operators
# (scylla-operator ScyllaCluster, CNPG for account). Deployed by ArgoCD via
# infrastructure/argocd/apps/deployments/staging.
#
# NB: ScyllaDB is NOT here — it's the standalone, un-prefixed ScyllaCluster in
# namespace `scylla` (k8s/base/infra/scylla-cluster), applied separately so the
# env's scylla-client.scylla.svc FQDN is not rewritten by namePrefix.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namePrefix: staging-
# Teach kustomize to flow namePrefix into KEDA ScaledObject scaleTargetRef
# (built-in name-reference covers HPA but not the keda.sh CRD). See the file.
configurations:
  - scaledobject-refs-config.yaml
  # Flow namePrefix into ScheduledBackup.spec.cluster.name -> CNPG Cluster.
  - cnpg-refs-config.yaml
  # Flow namePrefix into ExternalSecret.spec.secretStoreRef.name -> SecretStore.
  - external-secrets-refs-config.yaml
resources:
  # ── Services ─────────────────────────────────────────────────────────────────
  - ../../base/services/chat/server
  - ../../base/services/social-graph/server
  - ../../base/services/profile/server
  - ../../base/services/geo-discovery/server
  - ../../base/services/notification/server
  - ../../base/services/post/server
  - ../../base/services/comment/server
  - ../../base/services/engagement/server
  - ../../base/services/account/server
  - ../../base/services/timeline/server
  # ── New fleet (10 binaries) ──────────────────────────────────────────────────
  - ../../base/services/counter/server
  - ../../base/services/counter/worker
  - ../../base/services/audit/server
  - ../../base/services/audit/worker
  - ../../base/services/auth/server
  - ../../base/services/media/server
  - ../../base/services/moderation/server
  - ../../base/services/search/server
  - ../../base/services/realtime/gateway
  - ../../base/services/realtime/dispatcher
  # Public WSS entrypoint for the gateway (internet-facing NLB, L4, TLS at edge).
  - realtime-gateway-public.yaml
  # ── In-cluster stateful backends + secrets sync ──────────────────────────────
  # CNPG Postgres clusters (one per Postgres-backed service). Each exposes a
  # <cluster>-app Secret with the connection `uri`, injected via a per-svc DB patch.
  - account-postgres.yaml
  - counter-postgres.yaml
  - audit-postgres.yaml
  - moderation-postgres.yaml
  - auth-postgres.yaml
  - media-postgres.yaml
  # Nightly base backups for the CNPG clusters (barmanObjectStore -> S3).
  - scheduledbackups.yaml
  # IRSA-annotated ServiceAccounts (audit-server/-worker, media-server).
  - service-accounts.yaml
  # KEDA SASL auth for the MSK lag scalers (counter/realtime/audit workers).
  - keda-trigger-auth.yaml
  - external-secrets.yaml
  # PreSync hook: creates all registry topics (+ .dlq) — MSK auto-create is off.
  - topic-provisioner-job.yaml
  # Baseline namespace isolation (default-deny ingress + same-ns allow + public WSS).
  - networkpolicies.yaml
configMapGenerator:
  - name: chat-config
    envs: [chat.env]
  - name: social-graph-config
    envs: [social-graph.env]
  - name: profile-config
    envs: [profile.env]
  - name: geo-discovery-config
    envs: [geo-discovery.env]
  - name: notification-config
    envs: [notification.env]
  - name: post-config
    envs: [post.env]
  - name: comment-config
    envs: [comment.env]
  - name: engagement-config
    envs: [engagement.env]
  - name: account-config
    envs: [account.env]
  - name: timeline-config
    envs: [timeline.env]
  # New fleet (server + worker of a service share one *-config).
  - name: counter-config
    envs: [counter.env]
  - name: audit-config
    envs: [audit.env]
  - name: auth-config
    envs: [auth.env]
  - name: media-config
    envs: [media.env]
  - name: moderation-config
    envs: [moderation.env]
  - name: search-config
    envs: [search.env]
  - name: realtime-config
    envs: [realtime.env]
  - name: infra-config
    files: [infrastructure.toml]
images:
  - name: core-platform-chat-server
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-chat-server
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
  - name: core-platform-social-graph-server
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-social-graph-server
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
  - name: core-platform-profile-server
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-profile-server
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
  - name: core-platform-geo-discovery-server
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-geo-discovery-server
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
  - name: core-platform-notification-server
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-notification-server
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
  - name: core-platform-post-server
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-post-server
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
  - name: core-platform-comment-server
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-comment-server
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
  - name: core-platform-engagement-server
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-engagement-server
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
  - name: core-platform-account-server
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-account-server
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
  - name: core-platform-timeline-server
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-timeline-server
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
  - name: core-platform-migrator
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-migrator
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
  - name: core-platform-topic-provisioner
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-topic-provisioner
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
  # ── New fleet (one image per binary) ─────────────────────────────────────────
  - name: core-platform-counter-server
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-counter-server
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
  - name: core-platform-counter-worker
