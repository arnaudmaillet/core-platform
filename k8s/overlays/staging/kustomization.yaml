  - name: core-platform-search-server
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-search-server
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
  - name: core-platform-realtime-gateway
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-realtime-gateway
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
  - name: core-platform-realtime-dispatcher
    newName: 724772065879.dkr.ecr.us-east-1.amazonaws.com/core-platform-realtime-dispatcher
    newTag: 8f48a71f09e25e233e61c17975b7b58c2de8f457
patches:
  # Baseline pod-security hardening (non-root, seccomp, drop caps) on every Deployment.
  - path: patch-securitycontext.yaml
    target:
      kind: Deployment
  # Inject the synced MSK/Redis creds into every service container.
  - path: patch-backend-creds.yaml
    target:
      kind: Deployment
  # DATABASE_URL from each CNPG cluster's -app secret (init container + runtime).
  - path: patch-account-db.yaml
  - path: patch-counter-server-db.yaml
  - path: patch-counter-worker-db.yaml
  - path: patch-audit-server-db.yaml
  - path: patch-audit-worker-db.yaml
  - path: patch-moderation-db.yaml
  - path: patch-auth-db.yaml
  - path: patch-media-db.yaml
  # MSK SASL/SCRAM + TLS + TriggerAuthentication for the KEDA lag scalers.
  - path: patch-counter-worker-scaler.yaml
  - path: patch-realtime-dispatcher-scaler.yaml
  - path: patch-audit-worker-scaler.yaml
  # Per-service sensitive creds via dedicated ExternalSecrets (envFrom).
  - path: patch-search-secrets.yaml
    target:
      kind: Deployment
      name: search-server
  - path: patch-media-secrets.yaml
    target:
      kind: Deployment
      name: media-server
  - path: patch-auth-secrets.yaml
    target:
      kind: Deployment
      name: auth-server
  - path: patch-audit-secrets.yaml
    target:
      kind: Deployment
      name: audit-server
  - path: patch-audit-secrets.yaml
    target:
      kind: Deployment
      name: audit-worker
