# media-server: DATABASE_URL (CNPG uri) into the migrator init container + server.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-server
spec:
  template:
    spec:
      initContainers:
        - name: migrate-media
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: staging-media-postgres-app
                  key: uri
      containers:
        - name: server
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: staging-media-postgres-app
                  key: uri
