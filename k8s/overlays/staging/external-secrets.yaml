# Pulls the managed-backend credentials (MSK SCRAM, Redis AUTH) the data-store
# Terraform modules wrote to Secrets Manager into a k8s Secret (backend-creds),
# which the service pods consume via envFrom (see patch). Auth uses the ESO IRSA
# role (modules/security/irsa-roles enable_external_secrets).
# ClusterSecretStore (NOT a namespaced SecretStore): the ESO IRSA ServiceAccount
# lives in the external-secrets namespace, and a namespaced SecretStore may only
# reference an SA in its OWN namespace — ESO's admission webhook rejects a
# cross-namespace serviceAccountRef ("namespace should be empty or match the
# SecretStore's namespace"). A ClusterSecretStore is cluster-scoped and may
# reference the operator's SA in external-secrets (the canonical IRSA pattern).
# No sync-wave: ESO re-reconciles ExternalSecrets once the store exists, so gating
# the fleet on the store (a prior sync-wave: -1) was unnecessary AND deployed 0
# pods whenever the store failed to apply.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  # Literal target name (kustomize doesn't prefix fields inside a CR), so the
  # envFrom in the deployment patch matches.
  target:
    name: backend-creds
  data:
    - secretKey: KAFKA_SASL_USERNAME
      remoteRef: { key: "AmazonMSK_core-platform-staging_app", property: username }
    - secretKey: KAFKA_SASL_PASSWORD
      remoteRef: { key: "AmazonMSK_core-platform-staging_app", property: password }
    - secretKey: REDIS_PASSWORD
      remoteRef: { key: "core-platform-staging-redis-auth", property: password }
---
# OpenSearch master creds for the search service (fine-grained access control).
# The ESO read policy already covers "core-platform-staging-*", so no IAM change.
# Injected into search-server via a dedicated envFrom patch (Block 5) rather than
# the fleet-wide backend-creds, since only search consumes them.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: search-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: search-creds
  # secretKeys ARE the env var names (envFrom) — match what search reads exactly.
  data:
    - secretKey: SEARCH_OPENSEARCH_USER
      remoteRef: { key: "core-platform-staging-opensearch-master", property: username }
    - secretKey: SEARCH_OPENSEARCH_PASSWORD
      remoteRef: { key: "core-platform-staging-opensearch-master", property: password }
---
# media S3 static keys (rusty-s3 SigV4). These are an IAM user's access key —
# the media code does NOT use the IRSA role on its SA (see Block 5 notes). The SM
# secret core-platform-staging-media-s3 {access_key, secret_key} is provisioned by
# the data/app-secrets Terraform unit (was previously create-out-of-band).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: media-s3-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: media-s3-creds
  data:
    - secretKey: MEDIA_S3_ACCESS_KEY
      remoteRef: { key: "core-platform-staging-media-s3", property: access_key }
    - secretKey: MEDIA_S3_SECRET_KEY
      remoteRef: { key: "core-platform-staging-media-s3", property: secret_key }
---
# audit crypto/custody material. Static S3 keys (object-store + witness), the v1
# ENV-KEK and the checkpoint signing key. Real AWS KMS/HSM custody + cross-account
# WORM witness are the documented external deferral; this wires the v1 path. The SM
# secret core-platform-staging-audit-crypto is provisioned by the data/app-secrets
# Terraform unit (was previously create-out-of-band).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: audit-crypto
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: audit-crypto
  data:
    - secretKey: AUDIT_OBJECT_STORE_ACCESS_KEY
      remoteRef: { key: "core-platform-staging-audit-crypto", property: object_access_key }
    - secretKey: AUDIT_OBJECT_STORE_SECRET_KEY
      remoteRef: { key: "core-platform-staging-audit-crypto", property: object_secret_key }
    - secretKey: AUDIT_WITNESS_ACCESS_KEY
      remoteRef: { key: "core-platform-staging-audit-crypto", property: witness_access_key }
    - secretKey: AUDIT_WITNESS_SECRET_KEY
      remoteRef: { key: "core-platform-staging-audit-crypto", property: witness_secret_key }
    - secretKey: AUDIT_KEK_BASE64
      remoteRef: { key: "core-platform-staging-audit-crypto", property: kek_base64 }
    - secretKey: AUDIT_CHECKPOINT_SIGNING_KEY_BASE64
      remoteRef: { key: "core-platform-staging-audit-crypto", property: signing_key_base64 }
---
# auth ES256 signing keys + Keycloak client secret. The SM secret
# core-platform-staging-auth-secrets is provisioned by the data/app-secrets
# Terraform unit (was previously create-out-of-band). Keycloak itself is NOT yet
# provisioned (auth-prerequisite); the client secret is a generated placeholder.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: auth-secrets
  data:
    - secretKey: AUTH_SIGNING_PRIVATE_PEM
      remoteRef: { key: "core-platform-staging-auth-secrets", property: signing_private_pem }
    - secretKey: AUTH_SIGNING_PUBLIC_PEM
      remoteRef: { key: "core-platform-staging-auth-secrets", property: signing_public_pem }
    - secretKey: AUTH_KEYCLOAK_CLIENT_SECRET
      remoteRef: { key: "core-platform-staging-auth-secrets", property: keycloak_client_secret }
