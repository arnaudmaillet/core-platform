# Pulls the managed-backend credentials (MSK SCRAM, Redis AUTH) the data-store
# Terraform modules wrote to Secrets Manager into a k8s Secret (backend-creds),
# which the service pods consume via envFrom (see patch). Auth uses the ESO IRSA
# role (modules/security/irsa-roles enable_external_secrets).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  # Literal target name (kustomize doesn't prefix fields inside a CR), so the
  # envFrom in the deployment patch matches.
  target:
    name: backend-creds
  data:
    - secretKey: KAFKA_SASL_USERNAME
      remoteRef: { key: "AmazonMSK_core-platform-staging_app", property: username }
    - secretKey: KAFKA_SASL_PASSWORD
      remoteRef: { key: "AmazonMSK_core-platform-staging_app", property: password }
    - secretKey: REDIS_PASSWORD
      remoteRef: { key: "core-platform-staging-redis-auth", property: password }
