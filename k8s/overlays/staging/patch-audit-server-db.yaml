# audit-server: DATABASE_URL (CNPG uri) into the migrator init container + server.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-server
spec:
  template:
    spec:
      initContainers:
        - name: migrate-audit
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: staging-audit-postgres-app
                  key: uri
      containers:
        - name: server
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: staging-audit-postgres-app
                  key: uri
