# k8s/overlays/staging/realtime-gateway-public.yaml
#
# Public WSS entrypoint for the realtime gateway. This is the ONE place the fleet
# leaves the internal gRPC mesh for a client-facing listener, and deliberately a
# type: LoadBalancer NLB (L4) — NOT the ALB/Ingress the gRPC/HTTP services use:
#
#   * L4 keeps the gateway, not a proxy, the owner of the connection table — the
#     whole point of the realtime design (a parked-future conn per device).
#   * An ALB would terminate HTTP and pool/route per-request, breaking the
#     long-lived multiplexed socket model and the C10M memory budget.
#
# TLS terminates HERE (the gateway app speaks plain WS on :8443 — see
# REALTIME_GATEWAY_WS_ADDR), so the NLB listens 443/TLS with the ACM cert and
# forwards plaintext to the pod. The NLB stays L4: it terminates TLS but does not
# parse the WS/HTTP layer, so the gateway still receives the raw handshake.
#
# namePrefix -> staging-realtime-gateway-public. Selector matches the gateway pods
# by label (namePrefix renames resources, not label values), same as the base
# ClusterIP Service. The internal gRPC plane (:50066) stays on that ClusterIP
# Service and is NOT exposed here.
apiVersion: v1
kind: Service
metadata:
  name: realtime-gateway-public
  labels:
    app: realtime-gateway
    role: edge
  annotations:
    # AWS Load Balancer Controller — provision an external (internet-facing) NLB
    # targeting pod IPs directly (no node-port hop).
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    # TLS termination at the NLB (L4 TLS listener). ARN filled at deploy.
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "${ACM_CERTIFICATE_ARN}"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: tcp
    # Even client spread across AZs; conns are long-lived so per-conn balancing.
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    # DNS for the public endpoint (env-scoped to avoid colliding with prod in the
    # shared core-platform.click zone; single-level so the wildcard cert covers it).
    external-dns.alpha.kubernetes.io/hostname: realtime-staging.core-platform.click
spec:
  # Default (Cluster) traffic policy: with nlb-target-type=ip the LB registers pod
  # IPs directly, so source IP is preserved without the Local-policy node-hop
  # caveats (which are an instance-mode concern).
  type: LoadBalancer
  selector:
    app: realtime-gateway
  ports:
    - name: wss
      protocol: TCP
      port: 443
      targetPort: wss
