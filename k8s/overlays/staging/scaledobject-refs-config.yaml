# k8s/overlays/staging/scaledobject-refs-config.yaml
#
# Kustomize nameReference transformer extension for KEDA.
#
# Kustomize's BUILT-IN name-reference config rewrites the HPA scaleTargetRef when
# namePrefix renames a Deployment (so `staging-` flows through). It does NOT know
# about the KEDA ScaledObject CRD, so without this its spec.scaleTargetRef.name
# stays unprefixed and the scaler silently targets a non-existent Deployment
# (e.g. `counter-worker` instead of `staging-counter-worker`) — no error, it just
# never scales. This teaches kustomize that a ScaledObject's scaleTargetRef.name
# is a reference to a Deployment, so the prefix is applied consistently.
#
# Referenced from kustomization.yaml `configurations:`.
nameReference:
  - kind: Deployment
    group: apps
    fieldSpecs:
      - path: spec/scaleTargetRef/name
        kind: ScaledObject
  # Same problem for the KEDA TriggerAuthentication the SASL triggers reference:
  # without this the prefixed ScaledObject points authenticationRef at the
  # unprefixed TA name and auth resolution fails.
  - kind: TriggerAuthentication
    group: keda.sh
    fieldSpecs:
      - path: spec/triggers/authenticationRef/name
        kind: ScaledObject
