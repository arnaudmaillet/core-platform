# account-server: DATABASE_URL from the CNPG-generated secret (full uri), into
# BOTH the migrate-account init container and the server. The migrator does
# `env::var("DATABASE_URL").expect(...)`, so without it on the init container the
# pod's schema migration panics before the server ever starts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-server
spec:
  template:
    spec:
      initContainers:
        - name: migrate-account
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: staging-account-postgres-app
                  key: uri
      containers:
        - name: server
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: staging-account-postgres-app
                  key: uri
