# account-server: DATABASE_URL from the CNPG-generated secret (full uri).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-server
spec:
  template:
    spec:
      containers:
        - name: server
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: staging-account-postgres-app
                  key: uri
