# moderation-server: DATABASE_URL (CNPG uri) into the Postgres migrator init +
# server. migrate-moderation-history is Scylla -> reads SCYLLA_* from the configmap.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moderation-server
spec:
  template:
    spec:
      initContainers:
        - name: migrate-moderation
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: staging-moderation-postgres-app
                  key: uri
      containers:
        - name: server
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: staging-moderation-postgres-app
                  key: uri
