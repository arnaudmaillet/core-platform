# k8s/overlays/staging/topic-provisioner-job.yaml
#
# Provisions every Kafka topic in the event-topology registry (plus the consumer
# runtime's `<topic>.dlq` counterparts) BEFORE the fleet syncs. MSK runs with
# auto.create.topics.enable=false (modules/msk server properties): without this
# Job producers fail UNKNOWN_TOPIC_OR_PART and consumers idle forever — nothing
# else in the platform creates topics.
#
# ArgoCD PreSync hook: runs on every sync, so a topic added to the registry is
# created by the same sync that rolls the code consuming it. Idempotent —
# TOPIC_ALREADY_EXISTS is success. BeforeHookCreation replaces the (immutable)
# finished Job on the next sync. If the Job fails, the sync fails: the fleet is
# not rolled onto a broker missing its topics.
#
# TOPIC_REPLICATION_FACTOR is required by the binary (no default on purpose) and
# MUST track the env's broker count / MSK default.replication.factor — staging
# runs 2 brokers => RF 2 (see data/msk/terragrunt.hcl). TOPIC_PARTITIONS=12
# matches the KEDA workers' maxReplicaCount cap.
apiVersion: batch/v1
kind: Job
metadata:
  name: topic-provisioner
  labels:
    app: topic-provisioner
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: topic-provisioner
    spec:
      restartPolicy: OnFailure
      # Same pod-security baseline as the fleet (the patch-securitycontext
      # JSON6902 patch targets kind: Deployment only, so it's inlined here).
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: provision
          image: core-platform-topic-provisioner
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            # KAFKA_SASL_USERNAME / KAFKA_SASL_PASSWORD (ESO-synced MSK SCRAM).
            - secretRef:
                name: backend-creds
          env:
            - name: KAFKA_BROKERS
              value: "${MSK_BOOTSTRAP_BROKERS_SASL_SCRAM}"
            - name: KAFKA_SECURITY_PROTOCOL
              value: SASL_SSL
            - name: KAFKA_SASL_MECHANISM
              value: SCRAM-SHA-512
            - name: TOPIC_REPLICATION_FACTOR
              value: "2"
            - name: TOPIC_PARTITIONS
              value: "12"
