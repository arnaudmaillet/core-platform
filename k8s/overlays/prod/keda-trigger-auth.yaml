# k8s/overlays/prod/keda-trigger-auth.yaml
#
# KEDA TriggerAuthentication for the MSK Kafka scalers. The Kafka lag triggers run
# against managed MSK (SASL/SCRAM over TLS), so the scaler itself must authenticate
# — it reads the SAME SCRAM creds the app uses, from the ESO-synced 'backend-creds'
# Secret. The SASL mechanism + TLS are set in each ScaledObject's trigger metadata
# (sasl: scram_sha512, tls: enable); only the username/password come from here.
#
# namePrefix -> prod-keda-msk-auth; the ScaledObjects' authenticationRef is
# rewritten to match via scaledobject-refs-config.yaml.
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-msk-auth
spec:
  secretTargetRef:
    - parameter: username
      name: backend-creds
      key: KAFKA_SASL_USERNAME
    - parameter: password
      name: backend-creds
      key: KAFKA_SASL_PASSWORD
