# audit-worker: DATABASE_URL (CNPG uri) into the worker (ingest -> ledger append).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-worker
spec:
  template:
    spec:
      containers:
        - name: worker
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: prod-audit-postgres-app
                  key: uri
