# counter-server: DATABASE_URL (CNPG uri) into the Postgres migrator init
# container AND the server. The Scylla init (migrate-counter-timeseries) needs no
# DATABASE_URL — it reads SCYLLA_* from counter-config.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: counter-server
spec:
  template:
    spec:
      initContainers:
        - name: migrate-counter
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: prod-counter-postgres-app
                  key: uri
      containers:
        - name: server
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: prod-counter-postgres-app
                  key: uri
