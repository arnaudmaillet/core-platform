# Auth PostgreSQL via CloudNativePG. namePrefix -> prod-auth-postgres; CNPG
# exposes prod-auth-postgres-rw:5432 and a prod-auth-postgres-app Secret
# (key `uri` = full connection string) wired into auth-server (see
# patch-auth-db.yaml).
#
# Holds auth's own session/issuance state. The federated IdP (Keycloak) is a
# separate concern — auth brokers to it; its datastore is not this cluster.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: auth-postgres
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  bootstrap:
    initdb:
      database: auth
      owner: app
  storage:
    size: 50Gi
    storageClass: gp3
  # Pin to the database node tier and tolerate its taint, so the cluster lands on
  # the dedicated DB nodes instead of spilling onto general/spot capacity.
  # enablePodAntiAffinity spreads the three instances across the three AZs.
  affinity:
    nodeSelector:
      intent: database
    tolerations:
      - key: dedicated
        value: database
        effect: NoSchedule
    enablePodAntiAffinity: true
    topologyKey: topology.kubernetes.io/zone
  # Backups: the pod SA assumes the CNPG backup IRSA role and writes base backups
  # + WAL to the shared backups bucket under this cluster's prefix. Pruned by the
  # 30d retention policy. A nightly ScheduledBackup triggers base backups
  # (see scheduledbackups.yaml); WAL is archived continuously.
  serviceAccountTemplate:
    metadata:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::724772065879:role/core-platform-prod-cnpg-backup-role
  backup:
    barmanObjectStore:
      destinationPath: s3://core-platform-prod-cnpg-backups-724772065879/auth
      s3Credentials:
        inheritFromIAMRole: true
    retentionPolicy: "30d"
