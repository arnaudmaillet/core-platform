# counter-worker ScaledObject: point at MSK, add SASL/SCRAM + TLS + auth ref.
# Strategic-merge replaces the whole triggers list, so it is restated in full.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: counter-worker
spec:
  # One EXPLICIT trigger per consumed topic (KEDA sums lag across triggers).
  # A topic-less kafka trigger discovers topics from the group's committed
  # offsets — and with NO commits yet (fresh cluster, empty topics) it falls
  # back to every topic on the broker, including MSK's continuously-producing
  # __amazon_msk_canary: the workers flapped min<->max on phantom lag before
  # any traffic existed (found live pre-soak). Topic list = the event-topology
  # registry's consumer edges for this worker; keep them in lockstep.
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: ${MSK_BOOTSTRAP_BROKERS_SASL_SCRAM}
        consumerGroup: counter-worker
        topic: engagement.reactions
        lagThreshold: "5000"
        offsetResetPolicy: earliest
        sasl: scram_sha512
        tls: enable
      authenticationRef:
        name: keda-msk-auth
    - type: kafka
      metadata:
        bootstrapServers: ${MSK_BOOTSTRAP_BROKERS_SASL_SCRAM}
        consumerGroup: counter-worker
        topic: view.v1.events
        lagThreshold: "5000"
        offsetResetPolicy: earliest
        sasl: scram_sha512
        tls: enable
      authenticationRef:
        name: keda-msk-auth
    - type: kafka
      metadata:
        bootstrapServers: ${MSK_BOOTSTRAP_BROKERS_SASL_SCRAM}
        consumerGroup: counter-worker
        topic: impression.v1.events
        lagThreshold: "5000"
        offsetResetPolicy: earliest
        sasl: scram_sha512
        tls: enable
      authenticationRef:
        name: keda-msk-auth
    - type: kafka
      metadata:
        bootstrapServers: ${MSK_BOOTSTRAP_BROKERS_SASL_SCRAM}
        consumerGroup: counter-worker
        topic: click.v1.events
        lagThreshold: "5000"
        offsetResetPolicy: earliest
        sasl: scram_sha512
        tls: enable
      authenticationRef:
        name: keda-msk-auth
    - type: kafka
      metadata:
        bootstrapServers: ${MSK_BOOTSTRAP_BROKERS_SASL_SCRAM}
        consumerGroup: counter-worker
        topic: social-graph.follows
        lagThreshold: "5000"
        offsetResetPolicy: earliest
        sasl: scram_sha512
        tls: enable
      authenticationRef:
        name: keda-msk-auth
