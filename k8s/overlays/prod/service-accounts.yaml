# k8s/overlays/prod/service-accounts.yaml
#
# IRSA-annotated ServiceAccounts for the services that need direct AWS access.
# namePrefix -> prod-<name>, which must match the trust subjects on the IAM
# roles (modules/security/irsa-roles audit_service_accounts / media_service_accounts:
# "default:prod-audit-server", etc.). The deployments reference these via
# serviceAccountName in their base (kustomize rewrites the prefix on both sides).
#
# Role ARNs are deterministic — "<cluster_name>-<svc>-role" in the fleet account —
# so they are pinned here (same convention as the hardcoded ECR registry account
# in `images:`). cluster_name = core-platform-prod.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: audit-server
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::724772065879:role/core-platform-prod-audit-role
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: audit-worker
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::724772065879:role/core-platform-prod-audit-role
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: media-server
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::724772065879:role/core-platform-prod-media-role
