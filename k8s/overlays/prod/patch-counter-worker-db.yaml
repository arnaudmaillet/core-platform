# counter-worker: DATABASE_URL (CNPG uri) into the worker (warm-ledger flush).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: counter-worker
spec:
  template:
    spec:
      containers:
        - name: worker
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: prod-counter-postgres-app
                  key: uri
