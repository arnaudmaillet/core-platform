# Audit ledger PostgreSQL via CloudNativePG. namePrefix -> prod-audit-postgres;
# CNPG exposes prod-audit-postgres-rw:5432 and a prod-audit-postgres-app
# Secret (key `uri` = full connection string) wired into audit-server +
# audit-worker (see patch-audit-db.yaml).
#
# TIER-0 hash-chained evidence ledger: INSERT-only at the app layer. The crypto
# material (per-subject DEKs, KEK) lives in AWS KMS, and the WORM checkpoint
# anchor in the Object-Lock bucket — both provisioned in Terraform, not here.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: audit-postgres
spec:
  instances: 3
  # Synchronous replication for the evidence ledger ONLY (the other 5 clusters
  # stay async): a primary loss must not drop committed-but-unshipped WAL, or
  # the hash chain silently diverges from the WORM checkpoints it anchors to.
  # min==max==1: exactly one sync standby — commits survive one instance loss
  # without stalling writes when a second instance is down.
  minSyncReplicas: 1
  maxSyncReplicas: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  bootstrap:
    initdb:
      database: audit
      owner: app
  storage:
    size: 50Gi
    storageClass: gp3
  # Pin to the database node tier and tolerate its taint, so the cluster lands on
  # the dedicated DB nodes instead of spilling onto general/spot capacity.
  # enablePodAntiAffinity spreads the three instances across the three AZs.
  affinity:
    nodeSelector:
      intent: database
    tolerations:
      - key: dedicated
        value: database
        effect: NoSchedule
    enablePodAntiAffinity: true
    topologyKey: topology.kubernetes.io/zone
  # Backups: the pod SA assumes the CNPG backup IRSA role and writes base backups
  # + WAL to the shared backups bucket under this cluster's prefix. Pruned by the
  # 30d retention policy. A nightly ScheduledBackup triggers base backups
  # (see scheduledbackups.yaml); WAL is archived continuously.
  # NB: this is the live SoR for the TIER-0 hash-chained ledger — the WORM bucket
  # only holds periodic Merkle checkpoints, so PITR of this cluster matters most.
  serviceAccountTemplate:
    metadata:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::724772065879:role/core-platform-prod-cnpg-backup-role
  backup:
    barmanObjectStore:
      destinationPath: s3://core-platform-prod-cnpg-backups-724772065879/audit
      s3Credentials:
        inheritFromIAMRole: true
    retentionPolicy: "30d"
