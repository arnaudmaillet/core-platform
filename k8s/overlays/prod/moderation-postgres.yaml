# Moderation decision/enforcement PostgreSQL via CloudNativePG. namePrefix ->
# prod-moderation-postgres; CNPG exposes prod-moderation-postgres-rw:5432
# and a prod-moderation-postgres-app Secret (key `uri` = full connection
# string) wired into moderation-server (see patch-moderation-db.yaml).
#
# Postgres is moderation's decision/enforcement SoR only; its append-only history
# feed lives on the shared ScyllaCluster (moderation-history keyspace, created by
# the migrator), not provisioned here.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: moderation-postgres
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  bootstrap:
    initdb:
      database: moderation
      owner: app
  storage:
    size: 50Gi
    storageClass: gp3
  # Pin to the database node tier and tolerate its taint, so the cluster lands on
  # the dedicated DB nodes instead of spilling onto general/spot capacity.
  # enablePodAntiAffinity spreads the three instances across the three AZs.
  affinity:
    nodeSelector:
      intent: database
    tolerations:
      - key: dedicated
        value: database
        effect: NoSchedule
    enablePodAntiAffinity: true
    topologyKey: topology.kubernetes.io/zone
  # Backups: the pod SA assumes the CNPG backup IRSA role and writes base backups
  # + WAL to the shared backups bucket under this cluster's prefix. Pruned by the
  # 30d retention policy. A nightly ScheduledBackup triggers base backups
  # (see scheduledbackups.yaml); WAL is archived continuously.
  serviceAccountTemplate:
    metadata:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::724772065879:role/core-platform-prod-cnpg-backup-role
  backup:
    barmanObjectStore:
      destinationPath: s3://core-platform-prod-cnpg-backups-724772065879/moderation
      s3Credentials:
        inheritFromIAMRole: true
    retentionPolicy: "30d"
