# Fleet-wide externalized infrastructure config (dev). Mounted into every service
# as /etc/infra/infrastructure.toml and hot-reloaded by the runtime — edit the
# ConfigMap and the change applies with no restart.

[resilience]
default_profile = "standard"

[resilience.profiles.standard]
timeout = { duration_ms = 10000 }
circuit_breaker = { failure_threshold = 5, success_threshold = 2, open_duration_ms = 30000, half_open_max_calls = 1 }
retry = { max_attempts = 3, backoff = { kind = "exponential", base_ms = 50, max_ms = 10000, jitter = "full" } }

# Dependency -> profile bindings. Only the `standard` profile exists in this overlay,
# so every binding resolves to it (same as the unbound fallback); the entry is here to
# make the dependency name discoverable and ready to re-point once more profiles land.
[resilience.bindings]
# timeline -> social-graph (fan-out + cold-rebuild reads)
"social-graph" = "standard"

[traffic]
default_profile = "standard"

[traffic.profiles.standard]
rps   = 1000
burst = 200
scope = "per_method"

# ── Cache profiles (consumed by profile's read-through caches) ────────────────
[cache]
default_profile = "standard"

[cache.profiles.standard]
ttl_secs = 300

[cache.profiles.handles]
ttl_secs = 600

[cache.bindings]
"profile-view" = "standard"
"handle-lookup" = "handles"

[telemetry]
log_filter = "info"
sampling   = { kind = "trace_id_ratio", ratio = 0.1 }
