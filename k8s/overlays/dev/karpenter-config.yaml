# k8s/overlays/dev/karpenter-config.yaml

# 1. NODEPOOL DÉDIÉE AU SYSTÈME (Pour Prometheus, Argo, etc.)
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: system
spec:
  template:
    metadata:
      labels:
        intent: system
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: "intent"
          operator: In
          values: ["system"]
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]
        - key: "karpenter.k8s.aws/instance-family"
          operator: In
          values: ["t3", "m6i"] # Des instances stables pour le monitoring
      taints:
        - key: "CriticalAddonsOnly"
          value: "true"
          effect: "NoSchedule"
  limits:
    cpu: "20"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
---
# 2. NODEPOOL POUR LES WORKERS
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: worker # Kustomize ajoutera 'dev-' devant
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: "role"
          operator: In
          values: ["worker"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]
        - key: "karpenter.k8s.aws/instance-family"
          operator: In
          values: ["m5", "m5d", "m6i", "m6a", "c5", "c6i", "t3"]
  limits:
    cpu: "50"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
---
# 3. NODEPOOL POUR LA DATABASE
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: storage
spec:
  template:
    metadata:
      labels:
        role: storage
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      taints:
        - key: dedicated
          value: database
          effect: NoSchedule
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]
        - key: "karpenter.k8s.aws/instance-family"
          operator: In
          values: ["r5", "r5d", "r6i", "r6a"]
  limits:
    cpu: "50"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2
  role: "core-platform-dev-node-role"
  amiSelectorTerms:
    - alias: al2@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "core-platform-dev"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "core-platform-dev"
---
# 4. NODEPOOL POUR LE STRESS TEST (Instances Jet)
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: perf-test
spec:
  template:
    metadata:
      labels:
        role: infra-test # Label pour cibler ces nœuds dans K6
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      taints:
        - key: dedicated
          value: perf-test
          effect: NoSchedule
      requirements:
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"] # On veut de la stabilité max pour les tests
        - key: "karpenter.k8s.aws/instance-family"
          operator: In
          values: ["c6i", "c5"] # Familles optimisées CPU
        - key: "karpenter.k8s.aws/instance-size"
          operator: In
          values: ["2xlarge", "4xlarge"]
  limits:
    cpu: "100"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s # On supprime très vite après le test