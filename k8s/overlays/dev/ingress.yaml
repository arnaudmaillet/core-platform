#  k8s/overlays/dev/ingress.yaml

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: profile-grpc-ingress
  annotations:
      external-dns.alpha.kubernetes.io/hostname: api-profile.core-platform.click
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/backend-protocol: HTTP 
      alb.ingress.kubernetes.io/backend-protocol-version: GRPC
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
      alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
      alb.ingress.kubernetes.io/healthcheck-port: '50052'
      alb.ingress.kubernetes.io/success-codes: '12'
spec:
  ingressClassName: alb
  rules:
    - host: api-profile.core-platform.click
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dev-profile-server
                port:
                  number: 50052
