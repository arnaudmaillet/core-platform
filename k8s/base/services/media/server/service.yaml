# k8s/base/services/media/server/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: media-server
  labels:
    app: media-server
spec:
  selector:
    app: media-server
  ports:
    - name: grpc
      protocol: TCP
      port: 50063
      targetPort: grpc
      appProtocol: grpc
  type: ClusterIP
