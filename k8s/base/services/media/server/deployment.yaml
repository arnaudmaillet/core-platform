# k8s/base/services/media/server/deployment.yaml
#
# media-server — TIER-1 media control plane (asset-lifecycle SoR + upload-broker
# + delivery-resolve). Bytes never transit this process; it brokers pre-signed
# direct-to-object-store URLs. RPC/CPU-bound → scales on CPU (see hpa.yaml). The
# async transform pipeline runs in a separate consumer, not in this binary.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-server
  labels:
    app: media-server
    role: server
    tier: tier-1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: media-server
  template:
    metadata:
      labels:
        app: media-server
        role: server
    spec:
      # IRSA: S3 object RW on the media bucket (presigned upload/download +
      # takedown delete). The overlay creates this SA with the role-arn annotation.
      serviceAccountName: media-server
      # Owns the media asset-lifecycle Postgres schema via an idempotent migrator
      # init container (reads DATABASE_URL from media-config). Object-store buckets
      # are provisioned out-of-band (Terraform), not by this migrator.
      initContainers:
        - name: migrate-media
          image: core-platform-migrator
          args: ["media"]
          envFrom:
            - configMapRef:
                name: media-config
      containers:
        - name: server
          image: core-platform-media-server
          envFrom:
            - configMapRef:
                name: media-config
          env:
            - name: INFRA_CONFIG_PATH
              value: /etc/infra/infrastructure.toml
            - name: MEDIA_GRPC_ADDR
              value: "0.0.0.0:50063"
          ports:
            - name: grpc
              containerPort: 50063
          volumeMounts:
            - name: infra-config
              mountPath: /etc/infra
              readOnly: true
          readinessProbe:
            grpc:
              port: 50063
              service: media.v1.MediaService
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50063
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
      volumes:
        - name: infra-config
          configMap:
            name: infra-config
