# k8s/base/services/moderation/server/deployment.yaml
#
# moderation-server — TIER-0 trust/safety decision + enforcement plane on the
# shared fleet runtime. RPC-bound (hot-read enforcement + fail-closed Screen
# gate), no Kafka consumer: scales on CPU (see hpa.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moderation-server
  labels:
    app: moderation-server
    role: server
    tier: tier-0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: moderation-server
  template:
    metadata:
      labels:
        app: moderation-server
        role: server
    spec:
      # TIER-0 fail-closed — never on spot. Requires a pool that offers
      # on-demand (the Karpenter apps pool allows both since this change);
      # a spot reclaim wave must not take out the fail-closed set.
      nodeSelector:
        karpenter.sh/capacity-type: on-demand
      # Spread replicas across AZs and nodes (ScheduleAnyway: never blocks
      # scheduling; the PDB is the hard guard against voluntary co-eviction).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: moderation-server
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: moderation-server
      # Dual-store, like counter: Postgres decision/enforcement SoR + Scylla
      # append-only history. One idempotent migrator init container per backend
      # (the migrator reads DATABASE_URL / Scylla config from moderation-config).
      initContainers:
        - name: migrate-moderation
          image: core-platform-migrator
          args: ["moderation"]
          envFrom:
            - configMapRef:
                name: moderation-config
        - name: migrate-moderation-history
          image: core-platform-migrator
          args: ["moderation-history"]
          envFrom:
            - configMapRef:
                name: moderation-config
      containers:
        - name: server
          image: core-platform-moderation-server
          envFrom:
            - configMapRef:
                name: moderation-config
          env:
            - name: INFRA_CONFIG_PATH
              value: /etc/infra/infrastructure.toml
            - name: MODERATION_GRPC_ADDR
              value: "0.0.0.0:50061"
          ports:
            - name: grpc
              containerPort: 50061
          volumeMounts:
            - name: infra-config
              mountPath: /etc/infra
              readOnly: true
          readinessProbe:
            grpc:
              port: 50061
              service: moderation.v1.ModerationService
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50061
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "512Mi"
            # No CPU limit: CFS throttling breaks tokio tail latency under
            # spikes; memory stays the hard cap.
            limits:
              memory: "512Mi"
      volumes:
        - name: infra-config
          configMap:
            name: infra-config
