# k8s/base/services/auth/server/hpa.yaml
#
# Server profile = CPU-bound RPC plane → scale on CPU utilization. The overlay's
# namePrefix is propagated to scaleTargetRef.name by kustomize's built-in HPA
# name-reference transformer, so this targets dev-/staging-/prod-auth-server.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-server
  labels:
    app: auth-server
    role: server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
