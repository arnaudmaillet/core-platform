# k8s/base/services/auth/server/deployment.yaml
#
# auth-server — TIER-0 issuance/session/IdP-broker plane on the shared fleet
# runtime. RPC-bound, no Kafka consumer: scales on CPU (see hpa.yaml). Image tag,
# the `auth-config` ConfigMap and `infra-config` are supplied by the overlay.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server
  labels:
    app: auth-server
    role: server
    tier: tier-0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-server
  template:
    metadata:
      labels:
        app: auth-server
        role: server
    spec:
      # TIER-0 fail-closed — never on spot. Requires a pool that offers
      # on-demand (the Karpenter apps pool allows both since this change);
      # a spot reclaim wave must not take out the fail-closed set.
      nodeSelector:
        karpenter.sh/capacity-type: on-demand
      # Spread replicas across AZs and nodes (ScheduleAnyway: never blocks
      # scheduling; the PDB is the hard guard against voluntary co-eviction).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: auth-server
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: auth-server
      # Owns the auth Postgres schema via an idempotent migrator init container
      # (reads DATABASE_URL from auth-config).
      initContainers:
        - name: migrate-auth
          image: core-platform-migrator
          args: ["auth"]
          envFrom:
            - configMapRef:
                name: auth-config
      containers:
        - name: server
          image: core-platform-auth-server
          envFrom:
            - configMapRef:
                name: auth-config
          env:
            # The runtime is fail-closed on this file; mounted from infra-config.
            - name: INFRA_CONFIG_PATH
              value: /etc/infra/infrastructure.toml
            - name: AUTH_GRPC_ADDR
              value: "0.0.0.0:50060"
          ports:
            - name: grpc
              containerPort: 50060
            # Well-known JWKS over plain HTTP (AUTH_JWKS_HTTP_ADDR default) —
            # fetched by realtime/audit via AUTH_JWKS_URL.
            - name: jwks
              containerPort: 8081
          volumeMounts:
            - name: infra-config
              mountPath: /etc/infra
              readOnly: true
          # Readiness gates on the typed service health (SERVING only once backend
          # probes pass), so a pod leaves rotation when a dependency is unreachable.
          readinessProbe:
            grpc:
              port: 50060
              service: auth.v1.AuthService
            initialDelaySeconds: 5
            periodSeconds: 10
          # Liveness checks the overall ("") key = process alive, so a transient
          # backend blip drops readiness without triggering a restart loop.
          livenessProbe:
            grpc:
              port: 50060
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "512Mi"
            # No CPU limit: CFS throttling breaks tokio tail latency under
            # spikes; memory stays the hard cap.
            limits:
              memory: "512Mi"
      volumes:
        - name: infra-config
          configMap:
            name: infra-config
