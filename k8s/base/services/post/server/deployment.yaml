# k8s/base/services/post/server/deployment.yaml
#
# post-server on the shared fleet runtime. Schema is provisioned by the migrator
# (init container) before the server starts. Image tags + the `infra-config` and
# `post-config` ConfigMaps are supplied by the overlay.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: post-server
  labels:
    app: post-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: post-server
  template:
    metadata:
      labels:
        app: post-server
    spec:
      # Spread replicas across AZs and nodes (ScheduleAnyway: never blocks
      # scheduling; the PDB is the hard guard against voluntary co-eviction).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: post-server
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: post-server
      # Apply this service's schema migrations before the server boots. The
      # migrator is self-contained (migrations embedded) and idempotent, so it is
      # safe to run on every rollout; it exits 0 once schema is up to date.
      initContainers:
        - name: migrate-post
          image: core-platform-migrator
          args: ["post"]
          envFrom:
            - configMapRef:
                name: post-config
      containers:
        - name: server
          image: core-platform-post-server
          envFrom:
            - configMapRef:
                name: post-config
          env:
            # The runtime is fail-closed on this file; mounted from infra-config.
            - name: INFRA_CONFIG_PATH
              value: /etc/infra/infrastructure.toml
          ports:
            - name: grpc
              containerPort: 50056
          volumeMounts:
            - name: infra-config
              mountPath: /etc/infra
              readOnly: true
          # Readiness gates on backend reachability: the per-service health key is
          # driven by the runtime's storage probes (SERVING only once they pass),
          # so a pod leaves rotation when a dependency is unreachable.
          readinessProbe:
            grpc:
              port: 50056
              service: post.v1.PostService
            initialDelaySeconds: 5
            periodSeconds: 10
          # Liveness checks the overall ("") key = process alive, so a transient
          # backend blip drops readiness without triggering a restart loop.
          livenessProbe:
            grpc:
              port: 50056
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            # Soak-calibrated (2026-07-04): sized from observed throughput +
            # stability (p95 34ms I/O-bound, 0 OOM/restart at 2 replicas), NOT
            # measured utilization. Refine with `kubectl top` on next bring-up.
            requests:
              cpu: "150m"
              memory: "256Mi"
            # No CPU limit: CFS throttling breaks tokio tail latency under
            # spikes; memory stays the hard cap.
            limits:
              memory: "512Mi"
      volumes:
        - name: infra-config
          configMap:
            name: infra-config
