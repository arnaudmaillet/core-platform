# k8s/base/services/profile/server/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: profile-server
  labels:
    app: profile-server
spec:
  selector:
    app: profile-server
  ports:
    - name: grpc
      protocol: TCP
      port: 50052
      targetPort: grpc
      appProtocol: grpc
  type: ClusterIP
