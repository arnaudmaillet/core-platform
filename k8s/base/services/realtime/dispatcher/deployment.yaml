# k8s/base/services/realtime/dispatcher/deployment.yaml
#
# realtime-dispatcher — TIER-1 fan-out worker. Runs the supervised run_consumer
# lanes (notification + public-broadcast streams → resolve registry → node-hop
# publish). Serves NO domain RPC; only the gRPC health/reflection plane on :50067.
#
# Worker profile: throughput-bound, scaled on Kafka consumer-group lag (see
# scaledobject.yaml). Stateless (the node-local conn tables live in the gateway),
# so scale-up is cheap; grace window covers in-flight fan-out + offset commit.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-dispatcher
  labels:
    app: realtime-dispatcher
    role: worker
    tier: tier-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: realtime-dispatcher
  template:
    metadata:
      labels:
        app: realtime-dispatcher
        role: worker
    spec:
      # Spread replicas across AZs and nodes (ScheduleAnyway: never blocks
      # scheduling; the PDB is the hard guard against voluntary co-eviction).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: realtime-dispatcher
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: realtime-dispatcher
      terminationGracePeriodSeconds: 60
      containers:
        - name: dispatcher
          image: core-platform-realtime-dispatcher
          envFrom:
            - configMapRef:
                name: realtime-config
          env:
            - name: INFRA_CONFIG_PATH
              value: /etc/infra/infrastructure.toml
            - name: REALTIME_DISPATCHER_GRPC_ADDR
              value: "0.0.0.0:50067"
          ports:
            - name: grpc
              containerPort: 50067
          volumeMounts:
            - name: infra-config
              mountPath: /etc/infra
              readOnly: true
          readinessProbe:
            grpc:
              port: 50067
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50067
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            # No CPU limit: CFS throttling breaks tokio tail latency under
            # spikes; memory stays the hard cap.
            limits:
              memory: "512Mi"
      volumes:
        - name: infra-config
          configMap:
            name: infra-config
