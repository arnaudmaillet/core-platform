# k8s/base/services/realtime/dispatcher/scaledobject.yaml
#
# KEDA ScaledObject — worker scaling on Kafka consumer-group lag. See the
# counter-worker ScaledObject for the full notes (KEDA prereq, namePrefix
# name-reference caveat, partition-count cap, bootstrapServers placeholder).
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: realtime-dispatcher
  labels:
    app: realtime-dispatcher
    role: worker
spec:
  scaleTargetRef:
    name: realtime-dispatcher
  minReplicaCount: 1
  maxReplicaCount: 8
  cooldownPeriod: 120
  pollingInterval: 15
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: KAFKA_BOOTSTRAP_PLACEHOLDER
        consumerGroup: realtime-dispatcher
        # All subscribed fan-out topics (notification + public-broadcast streams).
        lagThreshold: "2000"
        offsetResetPolicy: latest
