# k8s/base/services/realtime/dispatcher/service.yaml
#
# Headless: no inbound traffic, stable endpoint for health/metrics scraping only.
apiVersion: v1
kind: Service
metadata:
  name: realtime-dispatcher
  labels:
    app: realtime-dispatcher
spec:
  clusterIP: None
  selector:
    app: realtime-dispatcher
  ports:
    - name: grpc
      protocol: TCP
      port: 50067
      targetPort: grpc
      appProtocol: grpc
