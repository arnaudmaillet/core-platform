# k8s/base/services/realtime/gateway/hpa.yaml
#
# Edge profile = connection/memory-bound → scale on MEMORY, not CPU. The ideal
# signal is active-connection count: wire it as an External/Pods metric once the
# gateway exports `realtime_active_connections` and a prometheus-adapter rule
# publishes it (commented below). Memory utilization is the robust default until
# then — a parked-socket fleet pressures RSS long before CPU.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: realtime-gateway
  labels:
    app: realtime-gateway
    role: edge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: realtime-gateway
  minReplicas: 2
  maxReplicas: 20
  behavior:
    scaleDown:
      # Don't dump connections fast — let drained pods reconnect-rebalance.
      stabilizationWindowSeconds: 300
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
    # - type: Pods
    #   pods:
    #     metric:
    #       name: realtime_active_connections
    #     target:
    #       type: AverageValue
    #       averageValue: "50000"
