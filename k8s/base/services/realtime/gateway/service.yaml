# k8s/base/services/realtime/gateway/service.yaml
#
# Internal ClusterIP exposing both planes for in-cluster reach + probing. The
# PUBLIC WSS path is provisioned in the overlay as a separate type: LoadBalancer
# Service annotated for an AWS NLB (L4), e.g.:
#   service.beta.kubernetes.io/aws-load-balancer-type: external
#   service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
# — keep client sockets on L4 so the gateway, not a proxy, owns the conn table.
apiVersion: v1
kind: Service
metadata:
  name: realtime-gateway
  labels:
    app: realtime-gateway
spec:
  selector:
    app: realtime-gateway
  ports:
    - name: wss
      protocol: TCP
      port: 8443
      targetPort: wss
    - name: grpc
      protocol: TCP
      port: 50066
      targetPort: grpc
      appProtocol: grpc
  type: ClusterIP
