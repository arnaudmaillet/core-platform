# k8s/base/services/realtime/gateway/pdb.yaml
#
# Keep at least one gateway serving during voluntary disruptions (node drains,
# rollouts) so connection migration is gradual, not a mass reconnect storm.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: realtime-gateway
  labels:
    app: realtime-gateway
    role: edge
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: realtime-gateway
