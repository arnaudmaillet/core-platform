# k8s/base/services/realtime/gateway/deployment.yaml
#
# realtime-gateway — TIER-1 fail-open edge of the System-of-Connection. Runs TWO
# listeners: the public WSS plane (:8443, the actual client socket load) and the
# internal gRPC health/reflection plane (:50066). This is the one fleet binary
# that intentionally breaks the one-port rule.
#
# EDGE profile (distinct from both server and worker):
#   * Connection/memory-bound, NOT CPU-bound — millions of mostly-idle parked
#     sockets. Scales on memory + active-connection count (see hpa.yaml), and the
#     hard per-conn memory SLO is what `limits.memory` enforces.
#   * Long terminationGracePeriod: on SIGTERM the gateway broadcasts RECONNECT
#     (RTM-5003 broadcast_drain) with jitter so clients re-handshake elsewhere
#     instead of thundering. Pair with a PodDisruptionBudget (pdb.yaml).
#   * Front the WSS port with an L4 NLB, never an L7 ALB — L7 proxies impose an
#     ephemeral-port ceiling that caps fan-in well below the C10M target.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-gateway
  labels:
    app: realtime-gateway
    role: edge
    tier: tier-1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realtime-gateway
  template:
    metadata:
      labels:
        app: realtime-gateway
        role: edge
    spec:
      # Spread replicas across AZs and nodes (ScheduleAnyway: never blocks
      # scheduling; the PDB is the hard guard against voluntary co-eviction).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: realtime-gateway
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: realtime-gateway
      # Generous drain window for jittered client reconnect on rollout/scale-down.
      terminationGracePeriodSeconds: 120
      containers:
        - name: gateway
          image: core-platform-realtime-gateway
          envFrom:
            - configMapRef:
                name: realtime-config
          env:
            - name: INFRA_CONFIG_PATH
              value: /etc/infra/infrastructure.toml
            - name: REALTIME_GATEWAY_GRPC_ADDR
              value: "0.0.0.0:50066"
          ports:
            - name: wss
              containerPort: 8443
            - name: grpc
              containerPort: 50066
          volumeMounts:
            - name: infra-config
              mountPath: /etc/infra
              readOnly: true
          # Probe the internal gRPC health plane (overall key). The WSS listener's
          # health is reflected into the same key by the runtime.
          readinessProbe:
            grpc:
              port: 50066
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50066
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              # Memory IS the scaling/eviction signal for the edge — hold the line.
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: infra-config
          configMap:
            name: infra-config
