# k8s/base/services/search/server/deployment.yaml
#
# search-server — TIER-1 fail-open discovery read-model. Serves the read RPCs
# ONLY (the OpenSearch ingestion runs in the post/moderation consumers, not here);
# RPC/CPU-bound → scales on CPU (see hpa.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-server
  labels:
    app: search-server
    role: server
    tier: tier-1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search-server
  template:
    metadata:
      labels:
        app: search-server
        role: server
    spec:
      # Spread replicas across AZs and nodes (ScheduleAnyway: never blocks
      # scheduling; the PDB is the hard guard against voluntary co-eviction).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: search-server
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: search-server
      containers:
        - name: server
          image: core-platform-search-server
          envFrom:
            - configMapRef:
                name: search-config
          env:
            - name: INFRA_CONFIG_PATH
              value: /etc/infra/infrastructure.toml
            - name: SEARCH_GRPC_ADDR
              value: "0.0.0.0:50062"
          ports:
            - name: grpc
              containerPort: 50062
          volumeMounts:
            - name: infra-config
              mountPath: /etc/infra
              readOnly: true
          readinessProbe:
            grpc:
              port: 50062
              service: search.v1.SearchService
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50062
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
      volumes:
        - name: infra-config
          configMap:
            name: infra-config
