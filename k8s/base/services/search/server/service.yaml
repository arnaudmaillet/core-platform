# k8s/base/services/search/server/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: search-server
  labels:
    app: search-server
spec:
  selector:
    app: search-server
  ports:
    - name: grpc
      protocol: TCP
      port: 50062
      targetPort: grpc
      appProtocol: grpc
  type: ClusterIP
