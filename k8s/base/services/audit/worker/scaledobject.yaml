# k8s/base/services/audit/worker/scaledobject.yaml
#
# KEDA ScaledObject — worker scaling on Kafka consumer-group lag. See the
# counter-worker ScaledObject for the full notes. maxReplicaCount is deliberately
# low: the periodic chain loops are singleton-ish (see deployment.yaml) and audit
# ingest is not a high-throughput firehose — it's the compliance evidence trickle.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: audit-worker
  labels:
    app: audit-worker
    role: worker
spec:
  scaleTargetRef:
    name: audit-worker
  minReplicaCount: 1
  maxReplicaCount: 4
  cooldownPeriod: 120
  pollingInterval: 30
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: KAFKA_BOOTSTRAP_PLACEHOLDER
        consumerGroup: audit-worker
        # account/auth/moderation.v1.events + audit.v1.events.
        lagThreshold: "1000"
        offsetResetPolicy: earliest
