# k8s/base/services/audit/worker/deployment.yaml
#
# audit-worker — TIER-0 INGEST/VERIFY plane. Runs the supervised run_consumer
# ingest lane (decode → hash-chain → persist → WORM-archive) over the producer
# topics audit consumes (account/auth/moderation.v1.events + audit.v1.events),
# plus the verifier / checkpoint-anchor / retention / crypto-shred loops. Serves
# NO domain RPC; only the gRPC health/reflection plane on :50069.
#
# Worker profile: scaled on Kafka consumer-group lag (see scaledobject.yaml).
# Chain appends are CAS/idempotent, so parallel ingest is safe. BUT the periodic
# loops (checkpoint/anchor/retention/crypto-shred) are singleton-ish — running
# them on every replica is wasteful and, for the Merkle checkpoint, racey. Until
# they gain leader-election, either keep maxReplicaCount modest OR split the loops
# into a separate single-replica Deployment / CronJob. Tracked as a Day-2 item.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-worker
  labels:
    app: audit-worker
    role: worker
    tier: tier-0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-worker
  template:
    metadata:
      labels:
        app: audit-worker
        role: worker
    spec:
      # Spread replicas across AZs and nodes (ScheduleAnyway: never blocks
      # scheduling; the PDB is the hard guard against voluntary co-eviction).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: audit-worker
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: audit-worker
      # IRSA: same audit role as the server — ingest seals PII via the KEK and the
      # checkpoint loop anchors signed Merkle roots to the WORM bucket.
      serviceAccountName: audit-worker
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: core-platform-audit-worker
          envFrom:
            - configMapRef:
                name: audit-config
          env:
            - name: INFRA_CONFIG_PATH
              value: /etc/infra/infrastructure.toml
            - name: AUDIT_WORKER_GRPC_ADDR
              value: "0.0.0.0:50069"
          ports:
            - name: grpc
              containerPort: 50069
          volumeMounts:
            - name: infra-config
              mountPath: /etc/infra
              readOnly: true
          readinessProbe:
            grpc:
              port: 50069
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50069
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
      volumes:
        - name: infra-config
          configMap:
            name: infra-config
