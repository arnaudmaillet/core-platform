# k8s/base/services/audit/worker/service.yaml
#
# Headless: no inbound traffic, stable endpoint for health/metrics scraping only.
apiVersion: v1
kind: Service
metadata:
  name: audit-worker
  labels:
    app: audit-worker
spec:
  clusterIP: None
  selector:
    app: audit-worker
  ports:
    - name: grpc
      protocol: TCP
      port: 50069
      targetPort: grpc
      appProtocol: grpc
