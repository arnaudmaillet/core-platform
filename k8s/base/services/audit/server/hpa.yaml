# k8s/base/services/audit/server/hpa.yaml
#
# Server profile = CPU-bound RPC plane → scale on CPU. minReplicas held at 2 so
# the fail-closed RecordPrivileged path always has headroom.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: audit-server
  labels:
    app: audit-server
    role: server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: audit-server
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
