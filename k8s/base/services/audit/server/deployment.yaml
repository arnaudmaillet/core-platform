# k8s/base/services/audit/server/deployment.yaml
#
# audit-server — TIER-0 tamper-evident compliance evidence plane (READ/RECORD).
# Serves the access-controlled Query/Export/VerifyIntegrity reads AND the
# synchronous, FAIL-CLOSED RecordPrivileged RPC (break-glass is denied if the
# write can't be recorded). RPC-bound → scales on CPU (see hpa.yaml).
#
# Owns the audit Postgres schema via an idempotent migrator init container.
#
# IAM (provisioned in Terraform, surfaced here via IRSA on the overlay's
# ServiceAccount): this is the SOLE principal allowed kms:Decrypt/GenerateDataKey
# on the audit KEK and write-only (no delete) on the Object-Lock WORM bucket.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-server
  labels:
    app: audit-server
    role: server
    tier: tier-0
spec:
  # Fail-closed RecordPrivileged must always have capacity → never scale below 2.
  replicas: 2
  selector:
    matchLabels:
      app: audit-server
  template:
    metadata:
      labels:
        app: audit-server
        role: server
    spec:
      # IRSA: KEK kms:Decrypt/GenerateDataKey + WORM write. The overlay creates
      # this SA (prefixed) with the eks.amazonaws.com/role-arn annotation.
      serviceAccountName: audit-server
      initContainers:
        - name: migrate-audit
          image: core-platform-migrator
          args: ["audit"]
          envFrom:
            - configMapRef:
                name: audit-config
      containers:
        - name: server
          image: core-platform-audit-server
          envFrom:
            - configMapRef:
                name: audit-config
          env:
            - name: INFRA_CONFIG_PATH
              value: /etc/infra/infrastructure.toml
            - name: AUDIT_SERVER_GRPC_ADDR
              value: "0.0.0.0:50068"
          ports:
            - name: grpc
              containerPort: 50068
          volumeMounts:
            - name: infra-config
              mountPath: /etc/infra
              readOnly: true
          readinessProbe:
            grpc:
              port: 50068
              service: audit.v1.AuditService
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50068
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
      volumes:
        - name: infra-config
          configMap:
            name: infra-config
