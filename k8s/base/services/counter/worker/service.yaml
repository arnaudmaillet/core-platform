# k8s/base/services/counter/worker/service.yaml
#
# Headless service: a worker takes no inbound traffic, but a stable endpoint lets
# the health/reflection plane be scraped (probes, metrics, grpc_health_probe).
apiVersion: v1
kind: Service
metadata:
  name: counter-worker
  labels:
    app: counter-worker
spec:
  clusterIP: None
  selector:
    app: counter-worker
  ports:
    - name: grpc
      protocol: TCP
      port: 50065
      targetPort: grpc
      appProtocol: grpc
