# k8s/base/services/counter/worker/deployment.yaml
#
# counter-worker — TIER-1 firehose ingest/aggregation plane. Runs the supervised
# run_consumer lanes (view/impression/click.v1.events → windowed N→1 pre-agg →
# sharded counters) + the reconcile loop. Serves NO domain RPC; it exposes only
# the gRPC health/reflection plane on :50065 so Kubernetes can probe readiness.
#
# Worker profile: throughput-bound, scaled on Kafka consumer-group lag (see
# scaledobject.yaml), NOT on CPU. terminationGracePeriod is generous so an
# evicted pod can drain in-flight batches and commit offsets (manual-commit
# run_consumer contract) before SIGKILL — avoids replay churn on scale-down.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: counter-worker
  labels:
    app: counter-worker
    role: worker
    tier: tier-1
spec:
  # Replicas are owned by the KEDA ScaledObject; this is just the seed value.
  replicas: 1
  selector:
    matchLabels:
      app: counter-worker
  template:
    metadata:
      labels:
        app: counter-worker
        role: worker
    spec:
      # Spread replicas across AZs and nodes (ScheduleAnyway: never blocks
      # scheduling; the PDB is the hard guard against voluntary co-eviction).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: counter-worker
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: counter-worker
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: core-platform-counter-worker
          envFrom:
            - configMapRef:
                name: counter-config
          env:
            - name: INFRA_CONFIG_PATH
              value: /etc/infra/infrastructure.toml
            - name: COUNTER_WORKER_GRPC_ADDR
              value: "0.0.0.0:50065"
          ports:
            - name: grpc
              containerPort: 50065
          volumeMounts:
            - name: infra-config
              mountPath: /etc/infra
              readOnly: true
          # No typed service on a worker — probe the overall ("") health key:
          # SERVING once the consumers' backend probes pass.
          readinessProbe:
            grpc:
              port: 50065
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50065
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "1Gi"
            # No CPU limit: CFS throttling breaks tokio tail latency under
            # spikes; memory stays the hard cap.
            limits:
              memory: "1Gi"
      volumes:
        - name: infra-config
          configMap:
            name: infra-config
