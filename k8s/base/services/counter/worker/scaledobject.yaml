# k8s/base/services/counter/worker/scaledobject.yaml
#
# KEDA ScaledObject — worker scaling profile. Scales counter-worker on Kafka
# consumer-group LAG, not CPU: the right pressure signal for a stream processor.
#
# Requires KEDA installed in-cluster (helm install keda kedacore/keda -n keda).
# kustomize's built-in name-reference transformer does NOT rewrite a CRD's
# spec.scaleTargetRef.name for the overlay namePrefix — add a nameReference for
# kind: ScaledObject to the overlay's `configurations` (see the snippet shipped
# with this scaffold) or the prefix will mis-target the Deployment.
#
# maxReplicaCount is capped at the topic partition count: a Kafka consumer group
# cannot parallelize beyond its partitions, so extra pods would idle.
# `bootstrapServers` is a placeholder — patch it per-env in the overlay (or move
# it to a TriggerAuthentication backed by external-secrets).
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: counter-worker
  labels:
    app: counter-worker
    role: worker
spec:
  scaleTargetRef:
    name: counter-worker
  minReplicaCount: 1
  maxReplicaCount: 12
  cooldownPeriod: 120
  pollingInterval: 15
  triggers:
    - type: kafka
      metadata:
        # Patched per-env. e.g. dev: redpanda.default.svc:9093 / prod: MSK bootstrap.
        bootstrapServers: KAFKA_BOOTSTRAP_PLACEHOLDER
        consumerGroup: counter-worker
        # Omitting `topic` monitors lag across ALL topics the group subscribes to
        # (view/impression/click.v1.events). Scale when avg lag/pod exceeds:
        lagThreshold: "5000"
        offsetResetPolicy: latest
