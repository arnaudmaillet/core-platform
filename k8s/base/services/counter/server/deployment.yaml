# k8s/base/services/counter/server/deployment.yaml
#
# counter-server — TIER-1 fail-open counter/analytics READ plane. Serves the
# read-only RPCs on :50064; it NEVER consumes the firehose or runs aggregation —
# that is counter-worker. RPC/CPU-bound → scales on CPU (see hpa.yaml).
#
# counter is the fleet's only dual-store service: warm ledger in Postgres, cold
# time-series in Scylla. The server owns schema provisioning for BOTH via two
# idempotent migrator init containers (the worker assumes schema is present —
# deploy/sync the server first, or run the migrator as a pre-sync Job).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: counter-server
  labels:
    app: counter-server
    role: server
    tier: tier-1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: counter-server
  template:
    metadata:
      labels:
        app: counter-server
        role: server
    spec:
      # Spread replicas across AZs and nodes (ScheduleAnyway: never blocks
      # scheduling; the PDB is the hard guard against voluntary co-eviction).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: counter-server
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: counter-server
      initContainers:
        # Postgres warm-ledger schema. Idempotent: safe on every rollout.
        - name: migrate-counter
          image: core-platform-migrator
          args: ["counter"]
          envFrom:
            - configMapRef:
                name: counter-config
        # Scylla cold time-series schema (TWCS).
        - name: migrate-counter-timeseries
          image: core-platform-migrator
          args: ["counter-timeseries"]
          envFrom:
            - configMapRef:
                name: counter-config
      containers:
        - name: server
          image: core-platform-counter-server
          envFrom:
            - configMapRef:
                name: counter-config
          env:
            - name: INFRA_CONFIG_PATH
              value: /etc/infra/infrastructure.toml
            - name: COUNTER_GRPC_ADDR
              value: "0.0.0.0:50064"
          ports:
            - name: grpc
              containerPort: 50064
          volumeMounts:
            - name: infra-config
              mountPath: /etc/infra
              readOnly: true
          readinessProbe:
            grpc:
              port: 50064
              service: counter.v1.CounterService
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50064
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            # No CPU limit: CFS throttling breaks tokio tail latency under
            # spikes; memory stays the hard cap.
            limits:
              memory: "512Mi"
      volumes:
        - name: infra-config
          configMap:
            name: infra-config
