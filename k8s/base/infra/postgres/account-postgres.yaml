# Account service's PostgreSQL (env: DATABASE_URL=postgres://postgres:postgres@dev-account-postgres:5432/account).
#
# Plain postgres:16 (not CNPG): self-contained, fully schema-validatable, and —
# crucially — it exposes the Service name the env hardcodes. CNPG would force a
# `<cluster>-rw` suffix (i.e. dev-account-postgres-rw), which the env doesn't use.
# Dev credentials are inline (they already appear in DATABASE_URL); use a Secret +
# managed Postgres for staging/prod.
#
# Recreate strategy: a single-writer DB on an RWO volume must never have two pods
# attached at once during a rollout.
apiVersion: v1
kind: Service
metadata:
  name: account-postgres
  labels:
    app: account-postgres
spec:
  selector:
    app: account-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-postgres
  labels:
    app: account-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: account-postgres
  template:
    metadata:
      labels:
        app: account-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: account
            # Keep data in a subdir so the volume's lost+found doesn't collide
            # with initdb on a fresh PVC.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "account"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: account-postgres-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: account-postgres-data
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: gp3
  resources:
    requests:
      storage: 5Gi
