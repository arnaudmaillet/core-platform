# Single-node Redpanda (Kafka API) for the dev fleet (env: KAFKA_BROKERS=dev-kafka:9092).
# Redpanda v24.2.7 matches the local-dev stack the migrator/consumers were tested
# against. `--mode dev-container` relaxes fsync/aio for in-container single-node use.
#
# NOTE: --advertise-kafka-addr hardcodes `dev-kafka` — it must equal the Service
# name AFTER the dev overlay's namePrefix (kustomize doesn't rewrite arg strings).
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  selector:
    app: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
          args:
            - redpanda
            - start
            - --mode=dev-container
            - --smp=1
            - --kafka-addr=0.0.0.0:9092
            - --advertise-kafka-addr=dev-kafka:9092
          ports:
            - name: kafka
              containerPort: 9092
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            exec:
              command: ["rpk", "cluster", "health", "--exit-when-healthy"]
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 5Gi
