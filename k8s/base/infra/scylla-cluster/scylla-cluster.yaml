# Operator-managed ScyllaDB for staging (scylla-operator). Standalone + un-prefixed
# in namespace `scylla` so the env's scylla-client.scylla.svc FQDN resolves
# unchanged. Name `scylla` -> the operator creates the `scylla-client` service.
# Apply AFTER the scylla-operator is healthy:  kubectl apply -k k8s/base/infra/scylla-cluster
apiVersion: scylla.scylladb.com/v1
kind: ScyllaCluster
metadata:
  name: scylla
  namespace: scylla
spec:
  version: 5.4.0
  agentVersion: 3.2.6
  # Scylla Manager tasks (registered by the manager-controller once the
  # scylla-manager app — operators appset — is up; inert until then, so this is
  # safe to apply first). Agent S3 creds come from scylla-agent-config-secret
  # (see externalsecret-agent-config.yaml). Manager owns retention: it purges
  # snapshots beyond `retention`, hence no bucket lifecycle rule.
  # 03:00 UTC, offset from the CNPG base backups at 02:00.
  backups:
    - name: daily-snapshot
      location: ["s3:core-platform-staging-scylla-backups-724772065879"]
      retention: 7
      cron: "0 3 * * *"
  # Weekly full repair: with RF>1 in prod this heals entropy between replicas;
  # harmless on staging's single node and keeps the task wiring exercised.
  repairs:
    - name: weekly-repair
      cron: "0 4 * * 0"
  datacenter:
    name: datacenter1
    racks:
      - name: rack1
        # 3 members, NOT 1: the per-service migrations create every keyspace at
        # NetworkTopologyStrategy RF 3 and the services write LOCAL_QUORUM —
        # a single member fails every fleet write (soak finding #15). Three
        # members also make staging exercise the real quorum paths.
        members: 3
        # Pin to the database node tier and tolerate its taint, so Scylla lands on
        # the dedicated DB nodes instead of general/spot capacity.
        placement:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: intent
                      operator: In
                      values: ["database"]
          tolerations:
            - key: dedicated
              value: database
              effect: NoSchedule
        storage:
          capacity: 20Gi
          storageClassName: gp3
        # scylla-operator reserves ~1.5Gi/pod (manager-agent + OS), so a 2Gi limit
        # left only ~476Mi/shard — below Scylla's 1Gi/shard floor → boot failure.
        # 4Gi leaves ~2.5Gi/shard. Fits the t3.large (8Gi) DB nodes.
        resources:
          requests: { cpu: "1", memory: 4Gi }
          limits:   { cpu: "1", memory: 4Gi }
