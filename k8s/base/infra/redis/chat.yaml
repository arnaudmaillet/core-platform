# Per-service Redis cache for chat (env: REDIS_HOSTS=dev-chat-redis:6379).
# Ephemeral (emptyDir) — these hold regenerable hot-cache state. The overlay's
# namePrefix turns the name into dev-chat-redis; the `app` label is not prefixed,
# so the Service selector still matches.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-redis
  labels:
    app: chat-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-redis
  template:
    metadata:
      labels:
        app: chat-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: chat-redis
  labels:
    app: chat-redis
spec:
  selector:
    app: chat-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
