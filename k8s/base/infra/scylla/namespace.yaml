# Dedicated namespace for the shared ScyllaDB cluster.
#
# The fleet's <svc>.env files hardcode SCYLLA_CONTACT_POINTS=
# scylla-client.scylla.svc.cluster.local:9042, so this namespace name (`scylla`)
# and the headless service name (`scylla-client`) are load-bearing — they must
# NOT be rewritten by an overlay namePrefix. That's why this lives as standalone
# infra rather than inside the dev app overlay.
apiVersion: v1
kind: Namespace
metadata:
  name: scylla
