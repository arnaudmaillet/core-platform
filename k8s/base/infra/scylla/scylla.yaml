# Shared 3-node ScyllaDB cluster for the dev fleet.
#
# Plain StatefulSet (not the ScyllaDB Operator): self-contained and fully
# schema-validatable, sufficient for a dev backend. 3 nodes so the migrations'
# `NetworkTopologyStrategy { 'datacenter1': 3 }` (RF3) places one replica per
# node and LocalQuorum reads/writes actually work.
#
# Image pinned to scylladb/scylla:5.4 (vnodes, not 6.x tablets) — matches the
# local-dev stack the migrator smoke test passed against, and avoids tablet
# placement constraints on a small cluster. The default snitch reports the
# datacenter as `datacenter1`, which is exactly what the keyspace migrations
# expect.
apiVersion: v1
kind: Service
metadata:
  name: scylla-client
  labels:
    app: scylla
spec:
  # Headless: gives every node stable per-pod DNS
  # (scylla-0.scylla-client.scylla.svc.cluster.local, …) and lets the driver
  # discover the full ring from any contact point.
  clusterIP: None
  selector:
    app: scylla
  ports:
    - name: cql
      port: 9042
      targetPort: 9042
    - name: intra
      port: 7000
      targetPort: 7000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: scylla
  labels:
    app: scylla
spec:
  serviceName: scylla-client
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: scylla
  template:
    metadata:
      labels:
        app: scylla
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: scylla
          image: scylladb/scylla:5.4
          # scylla-0 is the seed; the other nodes bootstrap and join from it.
          args:
            - "--seeds=scylla-0.scylla-client.scylla.svc.cluster.local"
            - "--smp=1"
            - "--memory=1G"
            - "--overprovisioned=1"
          ports:
            - name: cql
              containerPort: 9042
            - name: intra
              containerPort: 7000
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "nodetool status | grep -E '^UN\\s'"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9042
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /var/lib/scylla
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi
