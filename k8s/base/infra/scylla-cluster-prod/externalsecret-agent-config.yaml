# scylla-manager-agent S3 credentials for backups.
#
# The scylla-operator (v1.14) mounts a Secret named `scylla-agent-config-secret`
# (the CRD default when rack.scyllaAgentConfig is unset) into every member pod's
# agent container, key `scylla-manager-agent.yaml`. The mount is OPTIONAL, so a
# not-yet-synced secret never blocks Scylla from starting — backups just fail
# until ESO lands it. This ExternalSecret templates that YAML from the
# Terraform-seeded core-platform-prod-scylla-s3 keys (data/app-secrets unit).
#
# PROD-COUPLED like the rest of this directory (hardcoded bucket/account, and
# the ClusterSecretStore carries the fleet overlay's `prod-` namePrefix): this
# base is only synced by the prod-scylla-cluster Application. Same v1
# static-key posture as media/audit; IRSA is the tracked deferral.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: scylla-agent-config
  namespace: scylla
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: prod-aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: scylla-agent-config-secret
    template:
      engineVersion: v2
      data:
        scylla-manager-agent.yaml: |
          s3:
            access_key_id: {{ .access_key }}
            secret_access_key: {{ .secret_key }}
            region: us-east-1
  data:
    - secretKey: access_key
      remoteRef: { key: "core-platform-prod-scylla-s3", property: access_key }
    - secretKey: secret_key
      remoteRef: { key: "core-platform-prod-scylla-s3", property: secret_key }
