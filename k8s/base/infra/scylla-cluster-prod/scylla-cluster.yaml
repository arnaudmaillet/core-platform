# Operator-managed ScyllaDB for PROD (scylla-operator). Standalone + un-prefixed
# in namespace `scylla` so the env's scylla-client.scylla.svc FQDN resolves
# unchanged (every Scylla-backed service hardcodes it in its DSN).
#
# Prod shape vs staging's single node:
#   * 3 members as 3 racks, one rack pinned per AZ — a rack is Scylla's
#     failure-domain unit, so RF3 keyspaces survive a full AZ loss;
#   * all racks on the tainted r6g database nodes (min 3, one per AZ — see
#     live/prod/env.hcl);
#   * backups + weekly repair via Scylla Manager (operators appset), agent creds
#     from externalsecret-agent-config.yaml.
#
# SIZING NOTE (tracked follow-up from the infra review): gp3's 3k-IOPS baseline
# is the interim posture. Real prod Scylla throughput wants i-family
# instance-store NVMe via a dedicated Karpenter pool; revisit with k6 data
# before public launch.
apiVersion: scylla.scylladb.com/v1
kind: ScyllaCluster
metadata:
  name: scylla
  namespace: scylla
spec:
  version: 5.4.0
  agentVersion: 3.2.6
  # Scylla Manager tasks (registered by the manager-controller; inert until the
  # scylla-manager app is up). Daily 03:00 UTC, offset from CNPG's 02:00.
  backups:
    - name: daily-snapshot
      location: ["s3:core-platform-prod-scylla-backups-724772065879"]
      retention: 14
      cron: "0 3 * * *"
  # Weekly anti-entropy repair — load-bearing at RF3 (staging's single node made
  # it a no-op; here it heals replica divergence).
  repairs:
    - name: weekly-repair
      cron: "0 4 * * 0"
  datacenter:
    name: datacenter1
    racks:
      - name: us-east-1a
        members: 1
        placement:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: intent
                      operator: In
                      values: ["database"]
                    - key: topology.kubernetes.io/zone
                      operator: In
                      values: ["us-east-1a"]
          tolerations:
            - key: dedicated
              value: database
              effect: NoSchedule
        storage:
          capacity: 100Gi
          storageClassName: gp3
        # r6g.large DB nodes (16Gi): 8Gi to Scylla leaves headroom for the
        # manager agent (~1.5Gi) and the CNPG instances sharing the tier.
        resources:
          requests: { cpu: "1", memory: 8Gi }
          limits: { cpu: "1", memory: 8Gi }
      - name: us-east-1b
        members: 1
        placement:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: intent
                      operator: In
                      values: ["database"]
                    - key: topology.kubernetes.io/zone
                      operator: In
                      values: ["us-east-1b"]
          tolerations:
            - key: dedicated
              value: database
              effect: NoSchedule
        storage:
          capacity: 100Gi
          storageClassName: gp3
        resources:
          requests: { cpu: "1", memory: 8Gi }
          limits: { cpu: "1", memory: 8Gi }
      - name: us-east-1c
        members: 1
        placement:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: intent
                      operator: In
                      values: ["database"]
                    - key: topology.kubernetes.io/zone
                      operator: In
                      values: ["us-east-1c"]
          tolerations:
            - key: dedicated
              value: database
              effect: NoSchedule
        storage:
          capacity: 100Gi
          storageClassName: gp3
        resources:
          requests: { cpu: "1", memory: 8Gi }
          limits: { cpu: "1", memory: 8Gi }
