# infrastructure/argocd/apps/catalog/profile-service/templates/databases/redis.yaml

{{- if eq .Values.componentType "storage" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.persistence.cache.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  selector:
    matchLabels:
      app: {{ .Values.persistence.cache.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.persistence.cache.name }}
    spec:
      nodeSelector:
          intent: database
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "database"
          effect: "NoSchedule"
      containers:
        - name: redis
          image: {{ .Values.persistence.cache.image | default "redis:7-alpine" }}
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.persistence.cache.name }}
spec:
  ports:
    - port: 6379
  selector:
    app: {{ .Values.persistence.cache.name }}
{{- end }}