# infrastructure/argocd/apps/catalog/profile-service/templates/shared/ingress.yaml

{{- if eq .Values.componentType "app" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.serviceName }}-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: {{ .Values.ingress.groupName | default "management-group" | quote }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    {{- if .Values.global.certificateArn }}
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.global.certificateArn | quote }}
    {{- end }}
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.ingress.host | quote }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.commandServer.name | default (printf "%s-command-server" .Values.serviceName) }}
                port:
                  number: {{ .Values.app.commandServer.port | default 50051 }}
{{- end }}