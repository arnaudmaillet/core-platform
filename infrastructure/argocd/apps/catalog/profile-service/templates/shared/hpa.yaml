# infrastructure/argocd/apps/catalog/profile-service/templates/shared/hpa.yaml

{{- if eq .Values.componentType "app" }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.serviceName }}-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    # On pointe vers le nom définit dans la section app de app.yaml
    name: {{ .Values.app.commandServer.name | default (printf "%s-command-server" .Values.serviceName) }}
  minReplicas: {{ .Values.hpa.minReplicas | default 1 }}
  maxReplicas: {{ .Values.hpa.maxReplicas | default 2 }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.hpa.targetCPU | default 70 }}
{{- end }}