# infrastructure/argocd/apps/deployments/prod/fleet.yaml
#
# Prod fleet Application: syncs k8s/overlays/prod through the envsubst CMP
# (same render path as staging — the ${VAR} runtime endpoints come from the
# Terraform-owned cmp-envsubst-values Secret in THIS cluster's argocd ns).
#
# targetRevision: main — merging develop → main IS the prod deploy. Staging has
# already exercised the same overlay shape (and, once the promote workflow pins
# them here, the same immutable images) by the time a commit reaches main.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-fleet
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/arnaudmaillet/core-platform
    targetRevision: main
    path: k8s/overlays/prod
    plugin:
      name: envsubst-v1.0
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  # ESO's admission webhook defaults remoteRef fields (conversionStrategy /
  # decodingStrategy / metadataPolicy) on every ExternalSecret; without ignoring
  # them the live objects diff against Git forever, the app can never reach
  # Synced, and selfHeal loops — found live on the staging bring-up.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # CRDs come from the operator appsets, which sync independently — tolerate
      # them arriving after this app's first attempt (same rationale as staging).
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
