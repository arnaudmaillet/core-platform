# infrastructure/argocd/apps/deployments/prod/scylla-cluster.yaml
#
# Deploys the PROD ScyllaCluster (k8s/base/infra/scylla-cluster-prod → name
# `scylla`, ns `scylla`; 3 members across AZ-pinned racks). SEPARATE from the
# prod-fleet Application for the same reason as staging: the fleet overlay's
# `prod-` namePrefix would rename the cluster and break the hardcoded
# scylla-client.scylla.svc:9042 DSNs. Discovered by the prod root-workloads
# appset (recurse over deployments/prod).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-scylla-cluster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/arnaudmaillet/core-platform
    targetRevision: main
    path: k8s/base/infra/scylla-cluster-prod
  destination:
    server: https://kubernetes.default.svc
    namespace: scylla
  # The scylla-operator's defaulting webhook fills unset CR fields on admission
  # (image repositories, repair/backup tuning, per-rack agentResources); without
  # ignoring them the live object diffs against Git forever and the app can never
  # reach Synced — same class as the ESO remoteRef defaults on the fleet app.
  # Snapshot of the defaulted paths observed live on the prod bring-up (2026-07-04).
  ignoreDifferences:
    - group: scylla.scylladb.com
      kind: ScyllaCluster
      jqPathExpressions:
        - .spec.repository
        - .spec.agentRepository
        - .spec.backups[].numRetries
        - .spec.repairs[].numRetries
        - .spec.repairs[].intensity
        - .spec.repairs[].parallel
        - .spec.repairs[].smallTableThreshold
        - .spec.datacenter.racks[].agentResources
    # ESO's admission webhook defaults remoteRef fields on the co-located
    # scylla-agent-config ExternalSecret (same fix as the fleet app).
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # The ScyllaCluster CRD comes from the scylla-operator app, which syncs
      # independently — tolerate it arriving after this app's first attempt.
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
