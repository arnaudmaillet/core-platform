# infrastructure/argocd/apps/deployments/staging/scylla-cluster.yaml
#
# Deploys the ScyllaCluster (k8s/base/infra/scylla-cluster → name `scylla`, ns
# `scylla`). SEPARATE from the staging-fleet Application on purpose: the fleet
# overlay applies `namePrefix: staging-`, which would rename the cluster to
# `staging-scylla` and make the operator publish `staging-scylla-client.scylla.svc`
# — but every Scylla-backed service hardcodes `scylla-client.scylla.svc:9042` in
# its DSN. Syncing the base directly (no prefix) keeps that FQDN intact.
#
# Discovered by the staging root-workloads appset (recurse over deployments/staging).
# Without this, no ScyllaCluster CR is ever created → scylla-migration init
# containers crash-loop ("could not resolve scylla-client.scylla.svc"). The
# scylla-operator (root-operators appset, wave -10) installs the CRD first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-scylla-cluster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/arnaudmaillet/core-platform
    targetRevision: develop
    path: k8s/base/infra/scylla-cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: scylla
  # The scylla-operator's defaulting webhook fills unset CR fields on admission
  # (image repositories, repair/backup tuning, per-rack agentResources); without
  # ignoring them the live object diffs against Git forever and the app can never
  # reach Synced — same class as the ESO remoteRef defaults on the fleet app.
  # Snapshot of the defaulted paths observed live on the prod bring-up (2026-07-04).
  ignoreDifferences:
    - group: scylla.scylladb.com
      kind: ScyllaCluster
      jqPathExpressions:
        - .spec.repository
        - .spec.agentRepository
        - .spec.backups[].numRetries
        - .spec.repairs[].numRetries
        - .spec.repairs[].intensity
        - .spec.repairs[].parallel
        - .spec.repairs[].smallTableThreshold
        - .spec.datacenter.racks[].agentResources
    # ESO's admission webhook defaults remoteRef fields on the co-located
    # scylla-agent-config ExternalSecret (same fix as the fleet app).
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # The ScyllaCluster CRD comes from the scylla-operator app, which syncs
      # independently (appset sync-waves don't order across Applications) —
      # tolerate the CRD arriving after this app's first sync attempt.
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
