# infrastructure/argocd/apps/deployments/staging/fleet.yaml
#
# Staging is the first env on the NEW Kustomize deploy path: one ArgoCD
# Application syncs the k8s/overlays/staging overlay (services + CNPG + External
# Secrets). Discovered by the staging root-workloads appset
# (bootstrap/staging/root-appset-workloads.yaml -> folder deployments/staging).
#
# (dev still runs the legacy Helm catalog/profile-service path — superseded by
# this Kustomize approach but not yet migrated.)
#
# RENDER: this overlay carries ${VAR} runtime endpoints (MSK brokers, ElastiCache/
# OpenSearch endpoints, the ACM cert ARN) that are only known after the Terraform
# data-store apply. They are resolved by the `envsubst` Config Management Plugin in
# argocd-repo-server (see modules/kubernetes/argocd/server), which runs
# `kustomize build | envsubst` over a Terraform-owned values Secret. Git holds the
# template; the CMP renders concrete manifests, so selfHeal is stable (no manual
# in-cluster edits to revert). Hence `source.plugin`, not a bare `path`.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-fleet
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/arnaudmaillet/core-platform
    targetRevision: develop
    path: k8s/overlays/staging
    plugin:
      # ArgoCD names a versioned sidecar CMP "<metadata.name>-<spec.version>", so the
      # plugin defined as envsubst / v1.0 is referenced as "envsubst-v1.0".
      name: envsubst-v1.0
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  # ESO's admission webhook defaults remoteRef fields (conversionStrategy /
  # decodingStrategy / metadataPolicy) on every ExternalSecret; without ignoring
  # them the live objects diff against Git forever, the app can never reach
  # Synced, and selfHeal loops — found live on the staging bring-up.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # The overlay carries CRs (ScaledObject/Cluster/ExternalSecret/Scheduled-
      # Backup) whose CRDs come from the operator appsets. ApplicationSet
      # sync-waves do NOT order across independent Applications, so on a fresh
      # bring-up this app can sync before KEDA/CNPG/ESO CRDs exist — skip the
      # dry-run for missing kinds and retry instead of hard-failing.
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
