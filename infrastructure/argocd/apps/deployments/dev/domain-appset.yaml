# infrastructure/argocd/apps/deployments/dev/domain-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-workloads
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/arnaudmaillet/core-platform
        revision: feat/profile/stress-test-clean
        files:
          - path: "infrastructure/argocd/apps/deployments/dev/*.values.yaml"
  template:
    metadata:
      # On met le nom dans une string. Si c'est un dossier (pas de .yaml), le nom sera "invalid"
      # mais comme on filtre les fichiers dans le générateur, ça ne devrait pas arriver.
      name: 'dev-{{ .path.filename | trimSuffix ".values.yaml" }}'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: feat/profile/stress-test-clean
          # On calcule le path du catalogue dynamiquement
          path: 'infrastructure/argocd/apps/catalog/{{ index (splitList "-" .path.filename) 0 }}-service'
          helm:
            valueFiles:
              - '$values/infrastructure/argocd/bootstrap/global-params.json'
              - '$values/{{ .path.path }}'
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: feat/profile/stress-test-clean
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: 'dev-{{ index (splitList "-" .path.filename) 0 }}'
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [CreateNamespace=true]