# infrastructure/argocd/apps/deployments/dev/domain-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-workloads
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params.json"
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/apps/deployments/dev/profile/*.yaml"
  template:
    metadata:
      name: 'dev-{{ .path.basenameDir }}-{{ .path.filename }}'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          path: 'infrastructure/argocd/apps/catalog/{{ .path.basenameDir }}-service'
          helm:
            values: |
              global:
                certificateArn: "{{ .certificateArn }}"
              componentType: "{{ .path.filename }}"
            valueFiles:
              - '$values/{{ .path.path }}'
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: 'dev-{{ .path.basenameDir }}'
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [CreateNamespace=true]