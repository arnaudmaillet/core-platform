# infrastructure/argocd/apps/deployments/dev/domain-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-workloads
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          # 1. Lit le contenu des fichiers (extrait serviceName et componentType)
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/apps/deployments/dev/*/*.yaml"
          # 2. Lit les paramètres globaux (extrait certificateArn)
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params.json"
  template:
    metadata:
      name: 'dev-{{serviceName}}-{{componentType}}'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          path: 'infrastructure/argocd/apps/catalog/{{serviceName}}-service'
          helm:
            values: |
              global:
                certificateArn: "{{certificateArn}}"
              componentType: "{{componentType}}"
            valueFiles:
              - '$values/{{path.path}}'
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: 'dev-{{serviceName}}'
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true