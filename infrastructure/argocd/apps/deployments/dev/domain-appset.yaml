# infrastructure/argocd/apps/deployments/dev/domain-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-workload
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/arnaudmaillet/core-platform
        revision: env/dev
        files:
          - path: "infrastructure/argocd/apps/deployments/dev/values/*.yaml"
  template:
    metadata:
      name: "dev-{{ .serviceName }}"
    spec:
      project: default
      source:
        repoURL: https://github.com/arnaudmaillet/core-platform
        targetRevision: env/dev
        path: "infrastructure/argocd/apps/catalog/{{ .serviceName }}"
        helm:
          valueFiles:
            # On remonte vers la racine puis on redescend vers le fichier précis
            # .path.path contient déjà "infrastructure/argocd/apps/deployments/dev/values/profile-service.yaml"
            - "../../../../deployments/dev/{{ .path.path }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: default
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true
