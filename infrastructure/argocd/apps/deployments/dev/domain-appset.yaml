# infrastructure/argocd/apps/deployments/dev/domain-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-workload
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          # 1. On boucle sur chaque fichier de service (profile, auth, etc.)
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/apps/deployments/dev/values/*.yaml"
          # 2. On injecte les paramètres globaux (ton JSON avec l'ARN)
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params.json"
  template:
    metadata:
      name: "dev-{{ .serviceName }}"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          path: "infrastructure/argocd/apps/catalog/{{ .serviceName }}"
          helm:
            values: |
              global:
                certificateArn: "{{ .certificateArn }}"
              nodeSelector:
                intent: apps
            valueFiles:
              - '$values/infrastructure/argocd/apps/deployments/dev/values/{{ .serviceName }}.yaml'
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .envName }}-{{ .serviceName }}"
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true