# infrastructure/argocd/apps/deployments/dev/domain-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-workloads # Changé en pluriel pour éviter le conflit avec l'ancien
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          # 1. Générateur des fichiers de services (app.yaml, storage.yaml)
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                # On scanne récursivement pour trouver app.yaml et storage.yaml
                - path: "infrastructure/argocd/apps/deployments/dev/profile/*.yaml"
              # ON AJOUTE ÇA pour régler le message "duplicate key path[2]"
              pathParamPrefix: app 
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params.json"
  template:
    metadata:
      # ON AJOUTE componentType pour différencier dev-profile-app et dev-profile-storage
      name: "dev-{{ .serviceName }}-{{ .componentType }}"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          # On garde ton pointeur vers le catalogue
          path: "infrastructure/argocd/apps/catalog/{{ .serviceName }}-service"
          helm:
            values: |
              global:
                certificateArn: "{{ .certificateArn }}"
              # On passe le type au Helm pour le if/else (app ou storage)
              componentType: "{{ .componentType }}"
            valueFiles:
              # On utilise la variable appPath (grâce au prefix) pour pointer le bon fichier
              - '$values/{{ .appPath.path }}'
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .envName }}-{{ .serviceName }}"
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [CreateNamespace=true]
