# infrastructure/argocd/apps/deployments/dev/domain-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-workloads
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          # 1. On charge les params globaux d'abord
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params.json"
          # 2. On scanne les services (le .path vient d'ici)
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/apps/deployments/dev/*/{app,storage}.yaml"
  template:
    metadata:
      name: 'dev-{{serviceName}}-{{componentType}}'
      # Résultat : dev-profile-app ou dev-profile-storage
      name: "dev-{{ .path.basenameDir }}-{{ .path.basename }}"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          path: "infrastructure/argocd/apps/catalog/{{ .path.basenameDir }}-service"
          helm:
            values: |
              global:
                certificateArn: "{{certificateArn}}"
              componentType: "{{path.basename}}"
            valueFiles:
              - '$values/{{path.path}}'
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: 'dev-{{path.basenameDir}}'
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true