# infrastructure/argocd/apps/deployments/dev/domain-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-workloads
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          # 1. On scanne tous les fichiers yaml dans les sous-dossiers (ex: dev/profile/*.yaml)
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/apps/deployments/dev/**/[!global]*.yaml"
          # 2. On injecte l'ARN du certificat
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params.json"
  template:
    metadata:
      name: "dev-{{ .path.basenameDir }}-{{ .path.basename }}"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          # On pointe toujours vers le catalogue générique du service
          path: "infrastructure/argocd/apps/catalog/{{ .path.basenameDir }}-service"
          helm:
            values: |
              global:
                certificateArn: "{{ .certificateArn }}"
              componentType: "{{ .path.basename }}"
            valueFiles:
              - '$values/{{ .path.path }}'
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "dev-{{ .path.basenameDir }}"
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true