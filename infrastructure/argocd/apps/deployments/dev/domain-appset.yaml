# infrastructure/argocd/apps/deployments/dev/domain-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-workloads
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          # 1. Générateur des fichiers de services (app.yaml, storage.yaml)
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/apps/deployments/dev/profile/*.yaml"
              pathParamPrefix: app 
          # 2. Générateur des paramètres globaux
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params.json"
  template:
    metadata:
      name: 'dev-{{ .app.basenameDir }}-{{ .app.filename }}'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          path: 'infrastructure/argocd/apps/catalog/{{ .app.basenameDir }}-service'
          helm:
            values: |
              global:
                certificateArn: "{{ .certificateArn }}"
              componentType: "{{ .app.filename }}"
            valueFiles:
              - '$values/{{ .app.path }}'
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: 'dev-{{ .app.basenameDir }}'
      syncPolicy:
        automated: 
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true