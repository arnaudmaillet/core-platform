# infrastructure/argocd/apps/plateform/aws-lb-controller/templates/aws-lb-controller.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-load-balancer-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: aws-load-balancer-controller
    repoURL: https://aws.github.io/eks-charts
    targetRevision: "1.7.2"
    helm:
      values: |
        clusterName: {{ .Values.global.clusterName | quote }}
        serviceAccount:
          create: true
          annotations:
            eks.amazonaws.com/role-arn: {{ .Values.global.lbRoleArn | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true