# Env-agnostic defaults; `global` is injected from the Terraform-written
# global-params-<env>.json by the platform appset (clusterName, env, region,
# role ARNs — the AWS account id is derived from an ARN in templates).
image:
  # Multi-arch (amd64+arm64) upstream image — schedules anywhere the fleet does.
  repository: quay.io/keycloak/keycloak
  tag: "26.0"

# Single replica: an IdP outage only blocks NEW logins (auth mints and refreshes
# sessions from its own state); clustering (jgroups/kubernetes cache stack) is
# deliberately deferred until login volume justifies it.
replicas: 1

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 1536Mi

postgres:
  instances: 2
  storageSize: 10Gi
