# infrastructure/argocd/apps/infrastructure/platform/keycloak/Chart.yaml
#
# Self-authored Keycloak deployment (no upstream chart wrapper): the platform
# needs a deliberately narrow IdP — in-cluster HTTP only, one realm imported
# declaratively at boot, CNPG-backed — and the upstream charts' surface
# (ingress, clustering, theming) is all posture we don't want yet. auth brokers
# every grant server-side (password + authorization_code via its token
# endpoint), so Keycloak has NO public exposure; browser-facing login pages are
# a future product decision, not an omission.
#
# Consumers/consumed:
#   * auth-server (default ns) → keycloak.keycloak.svc:8080 token endpoint
#     (the only ingress besides kubelet probes and CNPG plumbing).
#   * client secret: the SAME <env>-auth-secrets/keycloak_client_secret both
#     sides use — auth sends it, the imported realm expects it.
#   * admin password: <env>-keycloak/admin_password (Terraform app-secrets).
apiVersion: v2
name: keycloak
version: 1.0.0
