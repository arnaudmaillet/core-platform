# Keycloak's backing store — holds USER CREDENTIALS, so it gets the full fleet
# CNPG posture: dedicated DB nodes, barman base backups + WAL to the shared
# backups bucket (its own prefix), nightly ScheduledBackup. The SA this cluster
# runs as ({{ .Values.global.env }}-keycloak-postgres in ns keycloak) must be in
# the cnpg-backup-role IRSA trust list (irsa-roles unit) — exact-match, same
# lesson as the restore-drill SA.
{{- $account := (split ":" .Values.global.externalSecretsRoleArn)._4 }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.global.env }}-keycloak-postgres
  namespace: keycloak
spec:
  instances: {{ .Values.postgres.instances }}
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  bootstrap:
    initdb:
      database: keycloak
      owner: app
  storage:
    size: {{ .Values.postgres.storageSize }}
    storageClass: gp3
  affinity:
    nodeSelector:
      intent: database
    tolerations:
      - key: dedicated
        value: database
        effect: NoSchedule
    enablePodAntiAffinity: true
    topologyKey: topology.kubernetes.io/zone
  serviceAccountTemplate:
    metadata:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::{{ $account }}:role/{{ .Values.global.clusterName }}-cnpg-backup-role
  backup:
    barmanObjectStore:
      destinationPath: s3://{{ .Values.global.clusterName }}-cnpg-backups-{{ $account }}/keycloak
      s3Credentials:
        inheritFromIAMRole: true
    retentionPolicy: "30d"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ .Values.global.env }}-keycloak-postgres-backup
  namespace: keycloak
spec:
  # Same nightly window as the fleet clusters (02:00 UTC).
  schedule: "0 0 2 * * *"
  backupOwnerReference: self
  cluster:
    name: {{ .Values.global.env }}-keycloak-postgres
