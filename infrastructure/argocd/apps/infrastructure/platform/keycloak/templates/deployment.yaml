apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      securityContext:
        runAsNonRoot: true
        # The upstream image runs as UID 1000 (keycloak).
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Stamp the client secret into the realm template. sed, not envsubst:
        # busybox ships sed everywhere and the template has exactly one marker.
        - name: render-realm
          image: busybox:1.36
          command:
            - sh
            - -c
            - >
              sed "s|__KC_AUTH_CLIENT_SECRET__|${KC_AUTH_CLIENT_SECRET}|"
              /template/core-platform-realm.json
              > /import/core-platform-realm.json
          env:
            - name: KC_AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: KC_AUTH_CLIENT_SECRET
          volumeMounts:
            - name: realm-template
              mountPath: /template
            - name: realm-import
              mountPath: /import
      containers:
        - name: keycloak
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args:
            # Production mode over in-cluster plain HTTP: TLS terminates
            # nowhere because nothing outside the mesh reaches this pod
            # (NetworkPolicy). hostname-strict off — clients address the
            # in-cluster Service name.
            - start
            - --http-enabled=true
            - --hostname-strict=false
            - --import-realm
          env:
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_DB
              value: postgres
            # Explicit host/port/db/creds from the CNPG -app secret (stable
            # key contract) rather than parsing a URI.
            - name: KC_DB_URL_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.env }}-keycloak-postgres-app
                  key: host
            - name: KC_DB_URL_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.env }}-keycloak-postgres-app
                  key: port
            - name: KC_DB_URL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.env }}-keycloak-postgres-app
                  key: dbname
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.env }}-keycloak-postgres-app
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.env }}-keycloak-postgres-app
                  key: password
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: KC_BOOTSTRAP_ADMIN_PASSWORD
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 4
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: realm-template
          configMap:
            name: keycloak-realm-template
        - name: realm-import
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  type: ClusterIP
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: http
      appProtocol: http
