# Declarative realm, imported at every boot (`--import-realm` re-imports only
# if the realm is absent — existing realms are NOT overwritten, so runtime
# admin changes survive restarts; realm drift beyond the client contract is
# acceptable for now).
#
# __KC_AUTH_CLIENT_SECRET__ is stamped by the init container from the ESO
# secret (no reliance on Keycloak's import-placeholder behavior across
# versions). sslRequired=none because the ONLY path to this Keycloak is
# in-cluster plain HTTP from auth-server — with the default "external" KC
# would reject the password grant from a non-local pod IP.
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-template
  namespace: keycloak
data:
  core-platform-realm.json: |
    {
      "realm": "core-platform",
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "bruteForceProtected": true,
      "clients": [
        {
          "clientId": "core-platform-auth",
          "name": "core-platform auth broker",
          "description": "Confidential client for the auth service. Password grant is the first-party login path (auth brokers it server-side); standard flow is enabled for the future browser authorization-code flow.",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "secret": "__KC_AUTH_CLIENT_SECRET__",
          "directAccessGrantsEnabled": true,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": false,
          "fullScopeAllowed": false,
          "redirectUris": ["https://*.core-platform.click/*"],
          "webOrigins": ["+"]
        }
      ]
    }
