# Two sources, one target secret:
#   * admin_password  ← <env>-keycloak            (Terraform app-secrets unit)
#   * client secret   ← <env>-auth-secrets        (SAME value auth sends — the
#     realm import below stamps it into the core-platform-auth client, so the
#     two sides can never drift)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-secrets
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    # The fleet overlay's ClusterSecretStore (cluster-scoped, env-prefixed).
    name: {{ .Values.global.env }}-aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: keycloak-secrets
  data:
    - secretKey: KC_BOOTSTRAP_ADMIN_PASSWORD
      remoteRef: { key: "{{ .Values.global.clusterName }}-keycloak", property: admin_password }
    - secretKey: KC_AUTH_CLIENT_SECRET
      remoteRef: { key: "{{ .Values.global.clusterName }}-auth-secrets", property: keycloak_client_secret }
