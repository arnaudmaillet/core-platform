# Namespace isolation, mirroring the fleet baseline: default-deny ingress,
# then exactly the paths Keycloak needs. Kubelet health probes bypass
# NetworkPolicy via the CNI's node->pod agent (same as the fleet).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: keycloak
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
# auth-server (default ns) → Keycloak token endpoint. The ONLY application
# ingress: every grant is brokered server-side by auth.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-to-keycloak
  namespace: keycloak
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
          podSelector:
            matchLabels:
              app: auth-server
      ports:
        - port: 8080
          protocol: TCP
---
# Keycloak → its CNPG primary, CNPG instance↔instance replication, and the
# cnpg-system operator's status/backup/failover path (:8000) — the same trio
# the fleet's default-ns policy grants (staging shakedown finding #11).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-keycloak-postgres-plumbing
  namespace: keycloak
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: {{ .Values.global.env }}-keycloak-postgres
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: keycloak
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ .Values.global.env }}-keycloak-postgres
      ports:
        - port: 5432
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - port: 8000
          protocol: TCP
