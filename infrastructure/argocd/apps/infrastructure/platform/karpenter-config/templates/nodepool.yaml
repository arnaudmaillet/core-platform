# infrastructure/argocd/apps/infrastructure/platform/karpenter-config/templates/nodepool.yaml

apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: "karpenter.sh/capacity-type"
          operator: In
          # En DEV, on utilise du Spot pour économiser 70% des coûts.
          # En PROD, tu passeras cette valeur en "on-demand".
          values: {{ .Values.capacityType | default "[\"spot\"]" }}
        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: ["t", "c", "m"]
        - key: "karpenter.k8s.aws/instance-size"
          operator: In
          values: ["medium", "large"]
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]
  limits:
    cpu: 1000 # Limite de sécurité pour ton budget AWS
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h # Rotation des nœuds tous les 30 jours