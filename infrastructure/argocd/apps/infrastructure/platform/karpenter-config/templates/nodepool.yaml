# infrastructure/argocd/apps/infrastructure/platform/karpenter-config/templates/nodepool.yaml

apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: {{ .Values.nodepools.default.capacityType | toJson }}
        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: {{ .Values.nodepools.default.categories | toJson }}
        - key: "karpenter.k8s.aws/instance-size"
          operator: In
          values: {{ .Values.nodepools.default.sizes | toJson }}
  limits:
    cpu: {{ .Values.nodepools.default.cpuLimit }}
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m