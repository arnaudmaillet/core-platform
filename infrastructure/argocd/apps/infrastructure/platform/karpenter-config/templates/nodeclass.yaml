# infrastructure/argocd/apps/infrastructure/platform/karpenter-config/templates/nodeclass.yaml

apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # AL2023, not AL2: Amazon Linux 2 standard support ended 2026-06-30 and EKS
  # stopped publishing AL2 AMIs for new k8s minors — staying on al2@latest means
  # unpatched nodes. AL2023 bootstraps via nodeadm (Karpenter handles the user
  # data); no manifest change needed beyond this alias.
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: "al2023@latest"
  role: "{{ .Values.global.clusterName }}-node-role"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "{{ .Values.global.clusterName }}"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "{{ .Values.global.clusterName }}"
  # Karpenter does NOT infer pod capacity from the CNI's prefix-delegation
  # setting — without an explicit override it applies the per-ENI-IP formula
  # and small instances stay pod-starved. 110 is the upstream kubelet default
  # ceiling and is safely below prefix-delegation capacity for every size the
  # pools allow.
  kubelet:
    maxPods: 110
  tags:
    Intent: apps
    ManagedBy: Karpenter
    Environment: "{{ .Values.global.env }}"