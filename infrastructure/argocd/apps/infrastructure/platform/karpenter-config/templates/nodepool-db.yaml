# infrastructure/argocd/apps/infrastructure/platform/karpenter-config/templates/nodepool-db.yaml

apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: database-pool
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: {{ .Values.nodepools.database.capacityType | toJson }}
        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: {{ .Values.nodepools.database.categories | toJson }}
        - key: "karpenter.k8s.aws/instance-size"
          operator: In
          values: {{ .Values.nodepools.database.sizes | toJson }}
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]
      taints:
        - key: "dedicated"
          value: "database"
          effect: "NoSchedule"
  limits:
    cpu: {{ .Values.nodepools.database.cpuLimit }}
  disruption:
    consolidationPolicy: WhenEmpty
    # On est moins agressif sur le recyclage des nodes de BDD pour éviter les micro-coupures