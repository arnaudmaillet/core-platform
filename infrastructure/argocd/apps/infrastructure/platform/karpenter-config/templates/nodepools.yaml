# infrastructure/argocd/apps/infrastructure/platform/karpenter-config/templates/nodepools.yaml

{{- range $name, $config := .Values.nodepools }}
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ $name }}
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        # --- ARCHITECTURE ---
        # Both arches allowed: fleet-images-deploy.yml publishes multi-arch
        # manifests (amd64 + arm64, stitch job verifies both platforms per
        # sha), so kubelet resolves the right image on Graviton — the
        # ImagePullBackOff that broke the first staging bring-up (amd64-only
        # images, arm64 system pool) can't recur for any sha built since.
        # Karpenter picks the cheapest fitting instance, which on-demand/spot
        # is usually Graviton. NB: the prod OVERLAY still pins fleet pods to
        # amd64 (k8s/overlays/prod/patch-arch-amd64*.yaml) until the first
        # multi-arch sha is promoted — those pins, not this file, are the
        # rollout gate.
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64", "arm64"]
        
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: {{ $config.capacityType | toJson }}
        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: {{ $config.categories | toJson }}
        - key: "karpenter.k8s.aws/instance-size"
          operator: In
          values: {{ $config.sizes | toJson }}
        - key: "intent"
          operator: In
          values: [{{ $name | quote }}]
      
      {{- if eq $name "database" }}
      taints:
        - key: "dedicated"
          value: "database"
          effect: "NoSchedule"
      {{- end }}

      expireAfter: 720h # Sécurité pour recycler les nœuds tous les 30 jours
  
  limits:
    # Karpenter limits.cpu is a CORE COUNT (a pool-wide vCPU ceiling), not
    # millicores. Default 16 vCPUs if a pool omits cpuLimit — a real guardrail,
    # never the old `1000` (which meant 1000 cores, effectively unlimited).
    cpu: {{ $config.cpuLimit | default 16 }}
  
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
---
{{- end }}