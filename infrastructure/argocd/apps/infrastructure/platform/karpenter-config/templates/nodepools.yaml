# infrastructure/argocd/apps/infrastructure/platform/karpenter-config/templates/nodepools.yaml

{{- range $name, $config := .Values.nodepools }}
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ $name }}
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        # --- GESTION DE L'ARCHITECTURE ---
        - key: "kubernetes.io/arch"
          operator: In
          {{- if eq $name "database" }}
          values: ["amd64"] # Force AMD64 pour la compatibilité PostGIS
          {{- else }}
          values: ["amd64", "arm64"] # Mixte pour le reste (Karpenter choisira le moins cher)
          {{- end }}
        
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: {{ $config.capacityType | toJson }}
        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: {{ $config.categories | toJson }}
        - key: "karpenter.k8s.aws/instance-size"
          operator: In
          values: {{ $config.sizes | toJson }}
        - key: "intent"
          operator: In
          values: [{{ $name | quote }}]
      
      {{- if eq $name "database" }}
      taints:
        - key: "dedicated"
          value: "database"
          effect: "NoSchedule"
      {{- end }}

      expireAfter: 720h # Sécurité pour recycler les nœuds tous les 30 jours
  
  limits:
    cpu: {{ $config.cpuLimit | default 1000 }} # 1cpu par defaut
  
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
---
{{- end }}