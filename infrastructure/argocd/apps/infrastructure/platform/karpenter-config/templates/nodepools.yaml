# infrastructure/argocd/apps/infrastructure/platform/karpenter-config/templates/nodepools.yaml

{{- range $name, $config := .Values.nodepools }}
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ $name }}
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        # --- GESTION DE L'ARCHITECTURE ---
        # amd64 EVERYWHERE for now: the fleet CI builds amd64-only images
        # (x86 runners, no --platform), so an arm64 node ImagePullBackOffs any
        # fleet pod scheduled onto it ("no match for platform in manifest" —
        # exactly what broke the first staging bring-up: Karpenter picked
        # cheaper Graviton for the system pool). Re-allow arm64 here ONLY
        # after fleet-images-deploy.yml publishes multi-arch manifests.
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]
        
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: {{ $config.capacityType | toJson }}
        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: {{ $config.categories | toJson }}
        - key: "karpenter.k8s.aws/instance-size"
          operator: In
          values: {{ $config.sizes | toJson }}
        - key: "intent"
          operator: In
          values: [{{ $name | quote }}]
      
      {{- if eq $name "database" }}
      taints:
        - key: "dedicated"
          value: "database"
          effect: "NoSchedule"
      {{- end }}

      expireAfter: 720h # Sécurité pour recycler les nœuds tous les 30 jours
  
  limits:
    # Karpenter limits.cpu is a CORE COUNT (a pool-wide vCPU ceiling), not
    # millicores. Default 16 vCPUs if a pool omits cpuLimit — a real guardrail,
    # never the old `1000` (which meant 1000 cores, effectively unlimited).
    cpu: {{ $config.cpuLimit | default 16 }}
  
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
---
{{- end }}