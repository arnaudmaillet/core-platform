# infrastructure/argocd/apps/infrastructure/platform/karpenter-config/values.yaml

clusterName: ""
env: "dev"

# Configuration des Pools de calcul
nodepools:
  default:
    capacityType: ["spot"]
    categories: ["t", "c", "m"]
    sizes: ["medium", "large"]
    cpuLimit: 1000
  
  database:
    capacityType: ["on-demand"]
    categories: ["m", "r"]
    sizes: ["large", "xlarge"]
    cpuLimit: 50