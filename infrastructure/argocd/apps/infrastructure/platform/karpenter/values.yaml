# infrastructure/argocd/apps/infrastructure/platform/karpenter/values.yaml

karpenter:
  settings:
    clusterName: "{{ .Values.global.clusterName }}"
    clusterEndpoint: "{{ .Values.global.clusterEndpoint }}"
    interruptionQueue: "core-platform-dev"
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "{{ .Values.global.karpenterRoleArn }}"
