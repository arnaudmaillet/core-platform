# infrastructure/argocd/apps/infrastructure/operators/scylla-operator/Chart.yaml
#
# Wrapper around the upstream ScyllaDB Operator chart. Manages the ScyllaCluster
# CRD + controller so staging can run an operator-managed ScyllaDB (vs dev's plain
# StatefulSet). Requires cert-manager (already installed) for its webhooks.
apiVersion: v2
name: scylla-operator-wrapper
version: 1.0.0
dependencies:
  - name: scylla-operator
    version: "1.14.0"
    repository: https://storage.googleapis.com/scylla-operator-charts/stable
