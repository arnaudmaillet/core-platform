# infrastructure/argocd/apps/infrastructure/operators/external-secrets/Chart.yaml
#
# Wrapper around the External Secrets Operator chart. Syncs AWS Secrets Manager
# (the MSK SCRAM + Redis AUTH creds written by the data-store modules) into k8s
# Secrets, authenticated via the IRSA role from modules/security/irsa-roles
# (enable_external_secrets). The role ARN is injected on the SA annotation by the
# ApplicationSet (global-params -> serviceAccount.annotations), like the platform
# charts.
apiVersion: v2
name: external-secrets-wrapper
version: 1.0.0
dependencies:
  - name: external-secrets
    version: "0.10.5"
    repository: https://charts.external-secrets.io
