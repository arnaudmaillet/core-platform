# infrastructure/argocd/apps/infrastructure/operators/scylla-manager/values.yaml
scylla-manager:
  # The manager's internal single-node ScyllaCluster (task state store, tiny).
  # Chart defaults are meant for scylladb's own clusters — two must change here:
  scylla:
    developerMode: true
    racks:
      - name: manager-rack
        members: 1
        storage:
          capacity: 5Gi
          # The chart default (scylladb-local-xfs) doesn't exist in this cluster;
          # gp3 is the fleet's default EBS CSI class.
          storageClassName: gp3
        # developerMode relaxes Scylla's production resource floor, so the chart's
        # small defaults are safe; keep them explicit for visibility.
        resources:
          limits:
            cpu: 1
            memory: 200Mi
          requests:
            cpu: 1
            memory: 200Mi
