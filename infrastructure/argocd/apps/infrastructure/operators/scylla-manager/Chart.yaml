# Wrapper around the upstream Scylla Manager chart (same repo/version family as
# the scylla-operator wrapper). The manager is what actually EXECUTES the
# ScyllaCluster `spec.backups`/`spec.repairs` tasks: the operator's
# manager-controller registers them with this manager, which drives the
# per-node agents. Without it those specs are inert — i.e. no Scylla backups.
#
# The chart bundles its own single-node ScyllaCluster (manager state store), so
# it needs the scylla-operator CRDs/webhooks — same appset wave; ArgoCD retry
# converges the ordering. NB: the chart hardcodes `namespace: scylla-manager` in
# its ConfigMap — the appset MUST deploy it to that namespace.
apiVersion: v2
name: scylla-manager-wrapper
version: 1.0.0
dependencies:
  - name: scylla-manager
    version: "1.14.0"
    repository: https://storage.googleapis.com/scylla-operator-charts/stable
