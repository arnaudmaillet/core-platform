# infrastructure/argocd/apps/infrastructure/operators/keda/values.yaml
keda:
  # The chart bundles the keda.sh CRDs (ScaledObject, ScaledJob,
  # TriggerAuthentication, ...); keep this on so they land before the workloads.
  crds:
    install: true
  # Single operator + metrics-apiserver is plenty for staging's worker fleet.
  operator:
    replicaCount: 1
  metricsServer:
    replicaCount: 1
