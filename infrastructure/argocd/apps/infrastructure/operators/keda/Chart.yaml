# infrastructure/argocd/apps/infrastructure/operators/keda/Chart.yaml
#
# Wrapper around the upstream KEDA chart. Installs the KEDA operator + the
# ScaledObject / TriggerAuthentication CRDs that the event-driven workers depend
# on (counter-worker, realtime-dispatcher, audit-worker all ship a ScaledObject
# that scales on Kafka consumer-group lag, not CPU).
#
# Must converge BEFORE the workload overlay: ArgoCD applies operators at
# sync-wave -10 (root-operators) and workloads at wave 0 (root-workloads), so the
# keda.sh CRDs exist before staging-fleet applies its ScaledObjects. A missing CRD
# fails the whole workload sync — ordering here is load-bearing.
#
# No IRSA role: staging scales on MSK lag via SASL/SCRAM creds (synced by External
# Secrets into a TriggerAuthentication at the ScaledObject level), so the operator
# itself needs no AWS identity.
apiVersion: v2
name: keda-wrapper
version: 1.0.0
dependencies:
  - name: keda
    version: "2.15.1"
    repository: https://kedacore.github.io/charts
