# infrastructure/argocd/apps/plateform/karpenter/templates/karpenter.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: public.ecr.aws/karpenter
    chart: karpenter
    targetRevision: 1.2.1
    helm:
      values: |
        settings:
          clusterName: {{ .Values.global.clusterName }}
          interruptionQueue: ""
        serviceAccount:
          create: true
          name: karpenter
          annotations:
            eks.amazonaws.com/role-arn: "{{ .Values.global.karpenterRoleArn }}"
        controller:
          clusterEndpoint: {{ .Values.global.clusterEndpoint }}
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true