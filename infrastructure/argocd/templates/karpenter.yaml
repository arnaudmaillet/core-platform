# infrastructure/argocd/templates/karpenter.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
spec:
  project: default
  source:
    chart: karpenter
    repoURL: https://charts.karpenter.sh/
    targetRevision: "0.33.0" # À adapter selon ta version
    helm:
      values: |
        settings:
          clusterName: {{ .Values.global.clusterName }}
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: {{ .Values.global.karpenterRoleArn }}
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true