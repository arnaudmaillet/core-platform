# infrastructure/argocd/templates/karpenter.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
spec:
  project: default
  source:
    chart: karpenter 
    repoURL: oci://public.ecr.aws/karpenter
    targetRevision: v0.33.1
    helm:
      values: |
        settings:
          clusterName: core-platform-dev
        serviceAccount:
          create: true
          name: karpenter
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::724772065879:role/core-platform-dev-karpenter-controller-role
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
