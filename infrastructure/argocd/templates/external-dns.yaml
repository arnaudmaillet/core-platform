# infrastructure/argocd/templates/external-dns.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
spec:
  project: default
  source:
    chart: external-dns
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    targetRevision: "1.13.0"
    helm:
      values: |
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: {{ .Values.global.externalDnsRoleArn }}
        policy: sync
        sources:
          - ingress
          - service
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true