# infrastructure/argocd/templates/ingress.yaml

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/certificate-arn: "{{ .Values.global.certificateArn }}"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    
    # Cette annotation autorise l'ALB Controller à ouvrir les ports 
    # sur le Security Group de tes Nodes EKS automatiquement.
    alb.ingress.kubernetes.io/manage-backend-security-group-rules: "true"
    
    # --- CONFIGURATION DU HEALTH CHECK ---
    # On dirige l'ALB vers le endpoint de santé interne d'ArgoCD
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/success-codes: '200'
    
    external-dns.alpha.kubernetes.io/hostname: argocd.core-platform.click
spec:
  ingressClassName: alb
  rules:
    - host: argocd.core-platform.click
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80