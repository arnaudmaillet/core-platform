# infrastructure/argocd/bootstrap/prod/root-infra-operators.yaml
#
# Prod operators — staging's set MINUS k6-operator (cnpg, scylla-operator,
# scylla-manager, external-secrets, keda), each in its own namespace. k6 is
# load-test tooling: prod deliberately ships no k6 NetworkPolicies (the k6 pods
# couldn't reach the mesh anyway), and the operator was dead weight that also
# CrashLooped on the first bring-up — the grafana manager image is amd64-only
# and landed on a Graviton MNG node ("exec format error"; Helm catalog apps are
# not covered by the fleet overlay's amd64 pin). Load tests run against staging.
# The ESO ServiceAccount
# receives its IRSA role-arn injected from global-params-prod
# (externalSecretsRoleArn), the same pattern the platform
# appset uses for lb-controller/karpenter. KEDA owns the keda.sh CRDs the
# event-driven workers (counter/realtime/audit) scale on — it must land at this
# wave (-10) so those CRDs exist before the workload overlay (wave 0).

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-operators
  namespace: argocd
spec:
  # Guard against generator emptiness cascading into an uninstall: these appsets
  # gate on global-params-prod.json (Terraform-written, absent when the env is
  # torn down). Without this, a missing/deleted params file makes the matrix yield
  # zero elements and the appset DELETES every generated Application — and, with
  # automated prune, its resources (Karpenter/ESO/KEDA/CNPG/LB controller).
  # With the guard, deleting an Application orphans (keeps) its resources; only an
  # explicit terraform destroy tears the platform layer down.
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - name: cnpg-operator
                  folder: infrastructure/argocd/apps/infrastructure/operators/cnpg-operator
                  destNamespace: cnpg-system
                - name: scylla-operator
                  folder: infrastructure/argocd/apps/infrastructure/operators/scylla-operator
                  destNamespace: scylla-operator
                # Executes ScyllaCluster spec.backups/spec.repairs (inert without
                # it). destNamespace MUST be scylla-manager — the chart hardcodes
                # that namespace in its ConfigMap.
                - name: scylla-manager
                  folder: infrastructure/argocd/apps/infrastructure/operators/scylla-manager
                  destNamespace: scylla-manager
                - name: external-secrets
                  folder: infrastructure/argocd/apps/infrastructure/operators/external-secrets
                  destNamespace: external-secrets
                - name: keda
                  folder: infrastructure/argocd/apps/infrastructure/operators/keda
                  destNamespace: keda
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: main
              files:
                - path: "infrastructure/argocd/bootstrap/global-params-prod.json"
  template:
    metadata:
      name: '{{.name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: main
          path: '{{.folder}}'
          helm:
            valueFiles:
              - $values/infrastructure/argocd/bootstrap/global-params-prod.json
            parameters:
              # {{ if eq .name "external-secrets" }}
              - name: "external-secrets.serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
                value: "{{ .global.externalSecretsRoleArn }}"
              # {{ end }}
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.destNamespace}}'
      # scylla-manager's chart ships a ScyllaCluster CR whose unset fields the
      # scylla-operator defaulting webhook fills on admission — perpetual
      # OutOfSync otherwise. Matches only ScyllaCluster resources, so this is
      # inert for every other operator app this template generates.
      ignoreDifferences:
        - group: scylla.scylladb.com
          kind: ScyllaCluster
          jqPathExpressions:
            - .spec.repository
            - .spec.agentRepository
            - .spec.backups[].numRetries
            - .spec.repairs[].numRetries
            - .spec.repairs[].intensity
            - .spec.repairs[].parallel
            - .spec.repairs[].smallTableThreshold
            - .spec.datacenter.racks[].agentResources
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
