# infrastructure/argocd/bootstrap/staging/root-infra-observability.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-observability
  namespace: argocd
spec:
  # Guard against generator emptiness cascading into an uninstall: these appsets
  # gate on global-params-staging.json (Terraform-written, absent when the env is
  # torn down). Without this, a missing/deleted params file makes the matrix yield
  # zero elements and the appset DELETES every generated Application — and, with
  # automated prune, its resources (Karpenter/ESO/KEDA/CNPG/LB controller).
  # With the guard, deleting an Application orphans (keeps) its resources; only an
  # explicit terraform destroy tears the platform layer down.
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - name: monitoring
                  folder: infrastructure/argocd/apps/infrastructure/observability/monitoring
                  valuesKey: "kube-prometheus-stack"
                  destNamespace: monitoring
                # OTLP sink the whole fleet exports to (otel-collector.observability
                # .svc:4317) — metrics re-exposed to Prometheus, traces to debug
                # until a traces backend lands.
                - name: otel-collector
                  folder: infrastructure/argocd/apps/infrastructure/observability/otel-collector
                  valuesKey: "opentelemetry-collector"
                  # MUST be `observability`: the fleet's OTLP endpoint DNS contract.
                  destNamespace: observability
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params-staging.json"
  template:
    metadata:
      name: '{{.name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-5"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          path: '{{.folder}}'
          helm:
            valueFiles:
              - $values/infrastructure/argocd/bootstrap/global-params-staging.json
            parameters:
              - name: "certificateArn"
                value: "{{ .global.certificateArn }}"
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.destNamespace}}'
      syncPolicy:
        automated: 
          prune: true
          selfHeal: true
        syncOptions: 
          - CreateNamespace=true
          - ServerSideApply=true
