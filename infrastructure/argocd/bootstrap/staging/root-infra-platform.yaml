# infrastructure/argocd/bootstrap/staging/root-infra-platform.yaml
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-platform
  namespace: argocd
spec:
  # Guard against generator emptiness cascading into an uninstall: these appsets
  # gate on global-params-staging.json (Terraform-written, absent when the env is
  # torn down). Without this, a missing/deleted params file makes the matrix yield
  # zero elements and the appset DELETES every generated Application — and, with
  # automated prune, its resources (Karpenter/ESO/KEDA/CNPG/LB controller).
  # With the guard, deleting an Application orphans (keeps) its resources; only an
  # explicit terraform destroy tears the platform layer down.
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - name: aws-load-balancer-controller
                  folder: infrastructure/argocd/apps/infrastructure/platform/aws-lb-controller
                  destNamespace: "kube-system"
                - name: karpenter
                  folder: infrastructure/argocd/apps/infrastructure/platform/karpenter
                  destNamespace: "karpenter"
                - name: karpenter-config
                  folder: infrastructure/argocd/apps/infrastructure/platform/karpenter-config
                  destNamespace: "karpenter"
                - name: metrics-server
                  folder: infrastructure/argocd/apps/infrastructure/platform/metrics-server
                  destNamespace: "kube-system"
                - name: storage-class
                  folder: infrastructure/argocd/apps/infrastructure/platform/storage-class
                  destNamespace: "kube-system"
                # The platform IdP (in-cluster only; auth brokers all grants).
                # Depends on cnpg-operator + external-secrets from the operators
                # appset (wave -10 < this wave -5) for its Cluster/ExternalSecret.
                - name: keycloak
                  folder: infrastructure/argocd/apps/infrastructure/platform/keycloak
                  destNamespace: "keycloak"
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params-staging.json"
  template:
    metadata:
      name: "{{.name}}"
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          path: "{{.folder}}"
          helm:
            valueFiles:
              - $values/infrastructure/argocd/bootstrap/global-params-staging.json
            # Injection forcée pour bypasser le bug des moustaches du Chart .tgz
            parameters:
              # {{ if eq .name "karpenter" }}
              - name: "karpenter.settings.clusterName"
                value: "{{ .global.clusterName }}"
              - name: "karpenter.settings.clusterEndpoint"
                value: "{{ .global.clusterEndpoint }}"
              - name: "karpenter.serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
                value: "{{ .global.karpenterRoleArn }}"
              # Spot-interruption queue (Terraform names it == cluster name), so
              # Karpenter drains reclaimed nodes gracefully instead of abrupt kills.
              - name: "karpenter.settings.interruptionQueue"
                value: "{{ .global.clusterName }}"
              # {{ end }}

              # {{ if eq .name "aws-load-balancer-controller" }}
              - name: "aws-load-balancer-controller.clusterName"
                value: "{{ .global.clusterName }}"
              - name: "aws-load-balancer-controller.region"
                value: "{{ .global.region }}"
              - name: "aws-load-balancer-controller.vpcId"
                value: "{{ .global.vpcId }}"
              - name: "aws-load-balancer-controller.serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
                value: "{{ .global.lbControllerRoleArn }}"
              # {{ end }}
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.destNamespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true