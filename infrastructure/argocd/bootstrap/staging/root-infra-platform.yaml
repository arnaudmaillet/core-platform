# infrastructure/argocd/bootstrap/staging/root-infra-platform.yaml
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-platform
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - name: aws-load-balancer-controller
                  folder: infrastructure/argocd/apps/infrastructure/platform/aws-lb-controller
                  destNamespace: "kube-system"
                - name: karpenter
                  folder: infrastructure/argocd/apps/infrastructure/platform/karpenter
                  destNamespace: "karpenter"
                - name: karpenter-config
                  folder: infrastructure/argocd/apps/infrastructure/platform/karpenter-config
                  destNamespace: "karpenter"
                - name: metrics-server
                  folder: infrastructure/argocd/apps/infrastructure/platform/metrics-server
                  destNamespace: "kube-system"
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params-staging.json"
  template:
    metadata:
      name: "{{.name}}"
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          path: "{{.folder}}"
          helm:
            valueFiles:
              - $values/infrastructure/argocd/bootstrap/global-params-staging.json
            # Injection forcée pour bypasser le bug des moustaches du Chart .tgz
            parameters:
              # {{ if eq .name "karpenter" }}
              - name: "karpenter.settings.clusterName"
                value: "{{ .global.clusterName }}"
              - name: "karpenter.settings.clusterEndpoint"
                value: "{{ .global.clusterEndpoint }}"
              - name: "karpenter.serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
                value: "{{ .global.karpenterRoleArn }}"
              # Spot-interruption queue (Terraform names it == cluster name), so
              # Karpenter drains reclaimed nodes gracefully instead of abrupt kills.
              - name: "karpenter.settings.interruptionQueue"
                value: "{{ .global.clusterName }}"
              # {{ end }}

              # {{ if eq .name "aws-load-balancer-controller" }}
              - name: "aws-load-balancer-controller.clusterName"
                value: "{{ .global.clusterName }}"
              - name: "aws-load-balancer-controller.region"
                value: "{{ .global.region }}"
              - name: "aws-load-balancer-controller.vpcId"
                value: "{{ .global.vpcId }}"
              - name: "aws-load-balancer-controller.serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
                value: "{{ .global.lbControllerRoleArn }}"
              # {{ end }}
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.destNamespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true