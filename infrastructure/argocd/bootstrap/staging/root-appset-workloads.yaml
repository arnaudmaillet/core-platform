# infrastructure/argocd/bootstrap/staging/root-appset-workloads.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-workloads
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: workloads-staging
            folder: infrastructure/argocd/apps/deployments/staging
  template:
    metadata:
      name: '{{.name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "0"
    spec:
      project: default
      source:
        repoURL: https://github.com/arnaudmaillet/core-platform
        targetRevision: develop
        path: '{{.folder}}'
        directory:
          recurse: true
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated: 
          prune: false
          selfHeal: true
        syncOptions: 
          - CreateNamespace=false
          - ServerSideApply=true
