# infrastructure/argocd/bootstrap/staging/root-infra-security.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-security
  namespace: argocd
spec:
  # Guard against generator emptiness cascading into an uninstall: these appsets
  # gate on global-params-staging.json (Terraform-written, absent when the env is
  # torn down). Without this, a missing/deleted params file makes the matrix yield
  # zero elements and the appset DELETES every generated Application — and, with
  # automated prune, its resources (Karpenter/ESO/KEDA/CNPG/LB controller).
  # With the guard, deleting an Application orphans (keeps) its resources; only an
  # explicit terraform destroy tears the platform layer down.
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                # 1. Cert-manager
                - name: cert-manager
                  repoURL: https://github.com/arnaudmaillet/core-platform
                  chart: ""
                  folder: infrastructure/argocd/apps/infrastructure/security/cert-manager
                  targetRevision: develop
                  destNamespace: cert-manager
                # 2. Config Issuer
                - name: cert-manager-config
                  repoURL: https://github.com/arnaudmaillet/core-platform
                  chart: ""
                  folder: infrastructure/argocd/apps/infrastructure/security/cert-manager-config
                  targetRevision: develop
                  destNamespace: cert-manager
                # 3. External DNS
                - name: external-dns
                  repoURL: https://github.com/arnaudmaillet/core-platform
                  chart: ""
                  folder: infrastructure/argocd/apps/infrastructure/security/external-dns
                  targetRevision: develop
                  destNamespace: external-dns
                # 4. Admin Access
                - name: admin-access
                  repoURL: https://github.com/arnaudmaillet/core-platform
                  chart: ""
                  folder: infrastructure/argocd/apps/infrastructure/security/admin-access
                  targetRevision: develop
                  destNamespace: argocd
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params-staging.json"
  template:
    metadata:
      name: "{{.name}}"
      annotations:
        argocd.argoproj.io/sync-wave: "-5"
    spec:
      project: default
      sources:
        - repoURL: "{{.repoURL}}"
          targetRevision: "{{.targetRevision}}"
          chart: '{{index . "chart"}}'
          path: '{{index . "folder"}}'
          helm:
            valueFiles:
              - $values/infrastructure/argocd/bootstrap/global-params-staging.json
            parameters:
              - name: "installCRDs"
                value: "true"
                
              # {{ if eq .name "cert-manager" }}
              - name: "cert-manager.serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
                value: "{{ .global.certManagerRoleArn }}"
              # {{ end }}

              # {{ if eq .name "external-dns" }}
              - name: "external-dns.serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
                value: "{{ .global.externalDnsRoleArn }}"
              # {{ end }}

              # {{ if eq .name "admin-access" }}
              - name: "certificateArn"
                value: "{{ .global.certificateArn }}"
              # {{ end }}
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.destNamespace}}"
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [CreateNamespace=true, ServerSideApply=true]