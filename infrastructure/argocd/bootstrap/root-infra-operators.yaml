# infrastructure/argocd/bootstrap/root-infra-operators.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-operators
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: cnpg-operator
            folder: infrastructure/argocd/apps/infrastructure/operators/cnpg-operator
          - name: k6-operator
            folder: infrastructure/argocd/apps/infrastructure/operators/k6-operator
  template:
    metadata:
      name: '{{.name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: default
      source:
        repoURL: https://github.com/arnaudmaillet/core-platform
        targetRevision: env/dev
        path: '{{.folder}}'
        helm:
          values: |
            global:
              clusterName: "core-platform-dev"
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated: {prune: true, selfHeal: true}
        syncOptions: [CreateNamespace=true, ServerSideApply=true]