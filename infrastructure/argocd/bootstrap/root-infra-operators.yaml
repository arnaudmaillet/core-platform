# infrastructure/argocd/bootstrap/root-infra-operators.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-operators
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - name: cnpg-operator
                  folder: infrastructure/argocd/apps/infrastructure/operators/cnpg-operator
                - name: k6-operator
                  folder: infrastructure/argocd/apps/infrastructure/operators/k6-operator
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: env/dev
              files:
                - path: "infrastructure/argocd/bootstrap/global-params.json"
  template:
    metadata:
      name: '{{.name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: default
      source:
        repoURL: https://github.com/arnaudmaillet/core-platform
        targetRevision: env/dev
        path: '{{.folder}}'
        helm:
          values: |
            global:
              clusterName: "{{ .clusterName }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated: 
          prune: false
          selfHeal: true
        syncOptions: 
          - CreateNamespace=false
          - ServerSideApply=true
