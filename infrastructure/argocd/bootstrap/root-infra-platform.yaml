# infrastructure/argocd/bootstrap/root-infra-platform.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-platform
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - name: aws-load-balancer-controller
                  folder: infrastructure/argocd/apps/infrastructure/platform/aws-lb-controller
                  destNamespace: "kube-system"
                - name: karpenter
                  folder: infrastructure/argocd/apps/infrastructure/platform/karpenter
                  destNamespace: "karpenter"
                - name: karpenter-config
                  folder: infrastructure/argocd/apps/infrastructure/platform/karpenter-config
                  destNamespace: "karpenter"
                - name: metrics-server
                  folder: infrastructure/argocd/apps/infrastructure/platform/metrics-server
                  destNamespace: "kube-system"
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params.json"
  template:
    metadata:
      name: "{{.name}}"
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          path: "{{.folder}}"
          helm:
            # On garde le fichier pour les apps qui n'ont pas besoin d'injection forcée
            valueFiles:
              - $values/infrastructure/argocd/bootstrap/global-params.json
            # Injection directe via le bloc values d'ArgoCD
            values: |
              {{ if eq .name "karpenter" }}
              karpenter:
                settings:
                  clusterName: "{{ .global.clusterName }}"
                  clusterEndpoint: "{{ .global.clusterEndpoint }}"
                  interruptionQueue: ""
                serviceAccount:
                  annotations:
                    eks.amazonaws.com/role-arn: "{{ .global.karpenterRoleArn }}"
              {{ end }}
              
              {{ if eq .name "aws-load-balancer-controller" }}
              aws-load-balancer-controller:
                clusterName: "{{ .global.clusterName }}"
                region: "{{ .global.region }}"
                serviceAccount:
                  annotations:
                    eks.amazonaws.com/role-arn: "{{ .global.lbControllerRoleArn }}"
              {{ end }}
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.destNamespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true