# infrastructure/argocd/bootstrap/root-infra-platform.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-platform
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - name: aws-load-balancer-controller
                  folder: infrastructure/argocd/apps/infrastructure/platform/aws-lb-controller
                  valuesKey: "aws-load-balancer-controller"
                  iamRoleKey: "lbControllerRoleArn"
                  destNamespace: "kube-system"

                - name: karpenter
                  folder: infrastructure/argocd/apps/infrastructure/platform/karpenter
                  valuesKey: "karpenter"
                  iamRoleKey: "karpenterRoleArn"
                  destNamespace: "karpenter"

                - name: karpenter-config
                  folder: infrastructure/argocd/apps/infrastructure/platform/karpenter-config
                  valuesKey: "karpenter-config"
                  iamRoleKey: ""
                  destNamespace: "karpenter"

                - name: metrics-server
                  folder: infrastructure/argocd/apps/infrastructure/platform/metrics-server
                  valuesKey: "metrics-server"
                  iamRoleKey: ""
                  destNamespace: "kube-system"

          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params.json"
  template:
    metadata:
      name: "{{.name}}"
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          path: "{{.folder}}"
          helm:
            valueFiles:
              - $values/infrastructure/argocd/bootstrap/global-params.json
            parameters:
              {{- if eq .name "karpenter" }}
              - name: "settings.clusterName"
                value: "{{ .global.clusterName }}"
              - name: "settings.clusterEndpoint"
                value: "{{ .global.clusterEndpoint }}"
              - name: "serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
                value: "{{ .global.karpenterRoleArn }}"
              {{- end }}

              {{- if eq .name "aws-load-balancer-controller" }}
              - name: "clusterName"
                value: "{{ .global.clusterName }}"
              - name: "serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
                value: "{{ .global.lbControllerRoleArn }}"
              {{- end }}
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.destNamespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true