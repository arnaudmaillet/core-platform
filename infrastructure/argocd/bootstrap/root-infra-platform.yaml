# infrastructure/argocd/bootstrap/root-infra-platform.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-platform
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: aws-load-balancer-controller
            folder: infrastructure/argocd/apps/infrastructure/platform/aws-lb-controller
            roleArn: "arn:aws:iam::724772065879:role/core-platform-dev-aws-load-balancer-controller-role"
            valuesKey: "aws-load-balancer-controller"

          - name: karpenter
            folder: infrastructure/argocd/apps/infrastructure/platform/karpenter
            roleArn: "arn:aws:iam::724772065879:role/core-platform-dev-karpenter-controller-role"
            valuesKey: "karpenter"

          - name: metrics-server
            folder: infrastructure/argocd/apps/infrastructure/platform/metrics-server
            roleArn: ""
            valuesKey: "metrics-server"
  template:
    metadata:
      name: "{{.name}}"
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: default
      source:
        repoURL: https://github.com/arnaudmaillet/core-platform
        targetRevision: env/dev
        path: "{{.folder}}"
        helm:
          values: |
            {{ .valuesKey }}:
              global:
                clusterName: "core-platform-dev"
              serviceAccount:
                create: true
                name: {{ .name }}
                {{- if .roleArn }}
                annotations:
                  eks.amazonaws.com/role-arn: "{{ .roleArn }}"
                {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: kube-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
