# infrastructure/argocd/bootstrap/root-infra-platform.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-platform
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - name: aws-load-balancer-controller
                  folder: infrastructure/argocd/apps/infrastructure/platform/aws-lb-controller
                  valuesKey: "aws-load-balancer-controller"
                  iamRoleKey: "lbControllerRoleArn"
                  destNamespace: "kube-system"

                - name: karpenter
                  folder: infrastructure/argocd/apps/infrastructure/platform/karpenter
                  valuesKey: "karpenter"
                  iamRoleKey: "karpenterRoleArn"
                  destNamespace: "karpenter"

                - name: karpenter-config
                  folder: infrastructure/argocd/apps/infrastructure/platform/karpenter-config
                  valuesKey: "karpenter-config"
                  iamRoleKey: ""
                  destNamespace: "karpenter"

                - name: metrics-server
                  folder: infrastructure/argocd/apps/infrastructure/platform/metrics-server
                  valuesKey: "metrics-server"
                  iamRoleKey: ""
                  destNamespace: "kube-system"

          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params.json"
  template:
    metadata:
      name: "{{.name}}"
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: default
      source:
        repoURL: https://github.com/arnaudmaillet/core-platform
        targetRevision: develop
        path: "{{.folder}}"
        helm:
          values: |
            # Valeurs "Root" (Aplaties) pour un accès direct via .Values.clusterName
            clusterName: "{{ .clusterName }}"
            clusterEndpoint: "{{ .clusterEndpoint }}"
            env: "dev"
            
            # Valeurs scopées pour la compatibilité avec tes Charts existants
            {{ .valuesKey }}:
              settings:
                clusterName: "{{ .clusterName }}"
                clusterEndpoint: "{{ .clusterEndpoint }}"
              global:
                clusterName: "{{ .clusterName }}"
              serviceAccount:
                create: true
                name: "{{ .name }}"
                {{- if .iamRoleKey }}
                annotations:
                  eks.amazonaws.com/role-arn: "{{ index . .iamRoleKey }}"
                {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.destNamespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true