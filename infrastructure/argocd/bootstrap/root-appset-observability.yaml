# infrastructure/argocd/bootstrap/root-appset-observability.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-observability
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: monitoring
            folder: infrastructure/argocd/apps/infrastructure/observability/monitoring
  template:
    metadata:
      name: '{{.name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-5"
    spec:
      project: default
      source:
        repoURL: https://github.com/arnaudmaillet/core-platform
        targetRevision: env/dev
        path: '{{.folder}}'
        helm:
          values: |
            global:
              clusterName: "core-platform-dev"
      destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
      syncPolicy:
        automated: {prune: true, selfHeal: true}
        syncOptions: [CreateNamespace=true, ServerSideApply=true]