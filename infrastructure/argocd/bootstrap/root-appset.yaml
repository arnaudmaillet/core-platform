# infrastructure/argocd-bis/bootstrap/root-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-bootstrap
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - folder: infrastructure/operators
                  name: infra-operators
                  wave: "-10"
                  type: helm
                - folder: deployments/dev
                  name: workload-dev
                  wave: "0"
                  type: directory
          - list:
              elements:
                - clusterName: "core-platform-dev"
                  certificateArn: "arn:aws:acm:us-east-1:724772065879:certificate/bbbddd3a-05ae-4ac5-a5cf-5b86e8757be0"
                  karpenterRoleArn: "arn:aws:iam::724772065879:role/core-platform-dev-karpenter-controller-role"
                  lbRoleArn: "arn:aws:iam::724772065879:role/core-platform-dev-aws-load-balancer-controller-role"
                  externalDnsRoleArn: "arn:aws:iam::724772065879:role/core-platform-dev-external-dns-role"
  template:
    metadata:
      name: '{{.name}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/arnaudmaillet/core-platform
        targetRevision: env/dev
        path: 'infrastructure/argocd/apps/{{.folder}}'
{{- if eq .type "helm" }}
        helm:
          values: |
            global:
              clusterName: "{{ .clusterName }}"
              certificateArn: "{{ .certificateArn }}"
{{- end }}
{{- if eq .type "directory" }}
        directory:
          recurse: true
{{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true