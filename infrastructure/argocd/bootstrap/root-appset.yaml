# infrastructure/argocd/bootstrap/root-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-bootstrap-moteur
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          # Générateur 1 : La liste de tes dossiers (tes apps)
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: env/dev
              directories:
                - path: infrastructure/argocd/apps/**/*
          # Générateur 2 : Les valeurs injectées par Terraform
          - configMap:
              name: argocd-global-config
              namespace: argocd
  template:
    metadata:
      name: "{{ .path.basename }}"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: env/dev
          path: k8s/overlays/dev
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: env/dev
          path: "{{ .path.path }}"
          helm:
            # ON INJECTE LES VALEURS DU CONFIGMAP ICI
            values: |
              global:
                clusterName: "{{ .clusterName }}"
                certificateArn: "{{ .certificateArn }}"
                karpenterRoleArn: "{{ .karpenterRoleArn }}"
                externalDnsRoleArn: "{{ .externalDnsRoleArn }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
