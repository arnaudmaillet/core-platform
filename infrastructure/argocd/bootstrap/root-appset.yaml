# infrastructure/argocd/bootstrap/root-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-bootstrap-moteur
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/arnaudmaillet/core-platform
        revision: env/dev
        directories:
          - path: infrastructure/argocd/apps/**/*
  template:
    metadata:
      # Utilise basename pour être sûr d'avoir le nom unique du dossier final (ex: karpenter)
      name: '{{ .path.basename }}'
    spec:
      project: default
      sources:
        # Source 1 : Manifestes K8s (Tes services, Ingress, etc.)
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: env/dev
          path: k8s/overlays/dev

        # Source 2 : Configuration Infrastructure (Helm charts des addons)
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: env/dev
          path: '{{ .path.path }}'
      
      destination:
        server: https://kubernetes.default.svc
        # On peut laisser l'app définir son namespace ou forcer par défaut
        namespace: default 

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true