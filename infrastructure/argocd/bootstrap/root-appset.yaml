# infrastructure/argocd/bootstrap/root-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-bootstrap-moteur
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: env/dev
              directories:
                - path: infrastructure/argocd/apps/**/*
          - list:
              elements:
                - clusterName: "core-platform-dev"
                  clusterEndpoint: "https://724772065879.gr7.us-east-1.eks.amazonaws.com"
                  certificateArn: "arn:aws:acm:us-east-1:724772065879:certificate/bbbddd3a-05ae-4ac5-a5cf-5b86e8757be0"
                  karpenterRoleArn: "arn:aws:iam::724772065879:role/core-platform-dev-karpenter-controller-role"
                  externalDnsRoleArn: "arn:aws:iam::724772065879:role/core-platform-dev-external-dns-role"
                  # Ajout explicite du rôle LB car il est différent des autres
                  lbRoleArn: "arn:aws:iam::724772065879:role/core-platform-dev-aws-load-balancer-controller-role"
  template:
    metadata:
      name: "{{ .path.basename }}"
      annotations:
        argocd.argoproj.io/sync-wave: '{{ if eq (index .path.segments 3) "operators" }}1{{ else if eq (index .path.segments 3) "workload" }}10{{ else }}5{{ end }}'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: env/dev
          path: k8s/overlays/dev
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: env/dev
          path: "{{ .path.path }}"
          helm:
            values: |
              global:
                clusterName: "{{ .clusterName }}"
                clusterEndpoint: "{{ .clusterEndpoint }}"
                certificateArn: "{{ .certificateArn }}"

              {{- if eq .path.basename "aws-load-balancer-controller" }}
              clusterName: "{{ .clusterName }}"
              serviceAccount:
                annotations:
                  eks.amazonaws.com/role-arn: "{{ .lbRoleArn }}"
              {{- end }}

              # Mapping spécifique pour ExternalDNS
              {{- if eq .path.basename "external-dns" }}
              serviceAccount:
                annotations:
                  eks.amazonaws.com/role-arn: "{{ .externalDnsRoleArn }}"
              {{- end }}

              # Mapping spécifique pour Karpenter
              {{- if eq .path.basename "karpenter" }}
              serviceAccount:
                annotations:
                  eks.amazonaws.com/role-arn: "{{ .karpenterRoleArn }}"
              settings:
                aws:
                  clusterName: "{{ .clusterName }}"
                  clusterEndpoint: "{{ .clusterEndpoint }}"
                  defaultInstanceProfile: "KarpenterNodeInstanceProfile-{{ .clusterName }}"
              {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true