# infrastructure/argocd/bootstrap/root-appset-workload.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-workloads
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: workload-dev
            folder: infrastructure/argocd/apps/deployments/dev
  template:
    metadata:
      name: '{{.name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "0"
    spec:
      project: default
      source:
        repoURL: https://github.com/arnaudmaillet/core-platform
        targetRevision: env/dev
        path: '{{.folder}}'
        directory:
          recurse: true
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated: 
          prune: false
          selfHeal: true
        syncOptions: 
          - CreateNamespace=true
          - ServerSideApply=true