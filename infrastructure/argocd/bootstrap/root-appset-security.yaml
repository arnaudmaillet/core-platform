# infrastructure/argocd/bootstrap/root-appset-security.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-security
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: cert-manager
            folder: infrastructure/argocd/apps/infrastructure/security/cert-manager
          - name: external-dns
            folder: infrastructure/argocd/apps/infrastructure/security/external-dns
            roleArn: "arn:aws:iam::724772065879:role/core-platform-dev-external-dns-role"
  template:
    metadata:
      name: '{{.name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-5"
    spec:
      project: default
      source:
        repoURL: https://github.com/arnaudmaillet/core-platform
        targetRevision: env/dev
        path: '{{.folder}}'
        helm:
          values: |
            global:
              clusterName: "core-platform-dev"
              externalDnsRoleArn: "{{index . "roleArn" | default ""}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated: {prune: true, selfHeal: true}
        syncOptions: [CreateNamespace=true, ServerSideApply=true]