# infrastructure/argocd/bootstrap/root-appset-infra.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-infra
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - folder: infrastructure/argocd/apps/infrastructure/operators
                  name: infra-operators
                  wave: "-10"
                - folder: infrastructure/argocd/apps/infrastructure/plateform
                  name: infra-platform
                  wave: "-5"
                - folder: infrastructure/argocd/apps/infrastructure/security
                  name: infra-security
                  wave: "-5"
          - list:
              elements:
                - clusterName: "core-platform-dev"
                  certificateArn: "arn:aws:acm:us-east-1:724772065879:certificate/bbbddd3a-05ae-4ac5-a5cf-5b86e8757be0"
                  karpenterRoleArn: "arn:aws:iam::724772065879:role/core-platform-dev-karpenter-controller-role"
                  lbRoleArn: "arn:aws:iam::724772065879:role/core-platform-dev-aws-load-balancer-controller-role"
                  externalDnsRoleArn: "arn:aws:iam::724772065879:role/core-platform-dev-external-dns-role"
  template:
    metadata:
      name: '{{.name}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{.wave}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/arnaudmaillet/core-platform
        targetRevision: env/dev
        path: '{{.folder}}'
        helm:
          values: |
            global:
              clusterName: "{{.clusterName}}"
              certificateArn: "{{.certificateArn}}"
              karpenterRoleArn: "{{.karpenterRoleArn}}"
              lbRoleArn: "{{.lbRoleArn}}"
              externalDnsRoleArn: "{{.externalDnsRoleArn}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated: {prune: true, selfHeal: true}
        syncOptions: [CreateNamespace=true, ServerSideApply=true]