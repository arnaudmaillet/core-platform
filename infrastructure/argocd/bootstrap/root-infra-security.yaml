# infrastructure/argocd/bootstrap/root-infra-security.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-security
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                # 1. Le moteur cert-manager (Source HELM distante)
                - name: cert-manager
                  repoURL: https://charts.jetstack.io
                  chart: cert-manager
                  targetRevision: v1.12.0
                  folder: ""
                  destNamespace: cert-manager
                # 2. Ta config Issuer (Source GIT locale)
                - name: cert-manager-config
                  repoURL: https://github.com/arnaudmaillet/core-platform
                  chart: ""
                  folder: infrastructure/argocd/apps/infrastructure/security/cert-manager-config
                  targetRevision: develop
                  destNamespace: cert-manager
                # 3. External DNS (Source GIT locale)
                - name: external-dns
                  repoURL: https://github.com/arnaudmaillet/core-platform
                  chart: ""
                  folder: infrastructure/argocd/apps/infrastructure/security/external-dns
                  targetRevision: develop
                  destNamespace: external-dns
                # 4. Admin Access (Source GIT locale)
                - name: admin-access
                  repoURL: https://github.com/arnaudmaillet/core-platform
                  chart: ""
                  folder: infrastructure/argocd/apps/infrastructure/security/admin-access
                  targetRevision: develop
                  destNamespace: argocd
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params.json"
  template:
    metadata:
      name: "{{.name}}"
      annotations:
        argocd.argoproj.io/sync-wave: "-5"
    spec:
      project: default
      sources:
        - repoURL: "{{.repoURL}}"
          targetRevision: "{{.targetRevision}}"
          # On utilise index pour que YAML accepte la ligne même si la valeur est vide
          chart: '{{index . "chart"}}'
          path: '{{index . "folder"}}'
          helm:
            valueFiles:
              - $values/infrastructure/argocd/bootstrap/global-params.json
            # ArgoCD ignorera ces paramètres s'il ne trouve pas de Chart Helm distant
            parameters:
              - name: "installCRDs"
                value: "true"
              - name: "serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
                value: '{{index . "global" "certManagerRoleArn"}}'
              - name: "admin-access.global.certificateArn"
                value: "{{ .global.certificateArn }}"
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.destNamespace}}"
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [CreateNamespace=true, ServerSideApply=true]