# infrastructure/argocd/bootstrap/root-infra-security.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-security
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - name: cert-manager
                  folder: infrastructure/argocd/apps/infrastructure/security/cert-manager
                  valuesKey: "cert-manager"
                  iamRoleKey: ""
                  destNamespace: "cert-manager"
                - name: external-dns
                  folder: infrastructure/argocd/apps/infrastructure/security/external-dns
                  valuesKey: "external-dns"
                  iamRoleKey: "externalDnsRoleArn"
                  destNamespace: "external-dns"
                - name: admin-access
                  folder: infrastructure/argocd/apps/infrastructure/security/admin-access
                  valuesKey: "admin-access"
                  iamRoleKey: ""
                  destNamespace: "argocd"
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params.json"
  template:
    metadata:
      name: "{{.name}}"
      annotations:
        argocd.argoproj.io/sync-wave: "-5"
    spec:
      project: default
      source:
        repoURL: https://github.com/arnaudmaillet/core-platform
        targetRevision: develop
        path: "{{.folder}}"
        helm:
          valueFiles:
            - values.yaml
          values: |
            certificateArn: "{{ .ssl_certificate_arn }}"
            
            {{ .valuesKey }}:
              installCRDs: true
              {{- if .iamRoleKey }}
              serviceAccount:
                create: true
                annotations:
                  eks.amazonaws.com/role-arn: "{{ index . .iamRoleKey }}"
              {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.destNamespace}}"
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
