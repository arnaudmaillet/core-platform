# infrastructure/argocd/bootstrap/root-infra-security.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-security
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: cert-manager
            folder: infrastructure/argocd/apps/infrastructure/security/cert-manager
            valuesKey: "cert-manager"
          - name: external-dns
            folder: infrastructure/argocd/apps/infrastructure/security/external-dns
            roleArn: "arn:aws:iam::724772065879:role/core-platform-dev-external-dns-role"
            valuesKey: "external-dns"
          - name: admin-access
            folder: infrastructure/argocd/apps/infrastructure/security/admin-access
            valuesKey: "admin-access"
  template:
    metadata:
      name: '{{.name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-5"
    spec:
      project: default
      source:
        repoURL: https://github.com/arnaudmaillet/core-platform
        targetRevision: env/dev
        path: '{{.folder}}'
        helm:
          values: |
            {{ .valuesKey }}:
              {{- if .roleArn }}
              serviceAccount:
                annotations:
                  eks.amazonaws.com/role-arn: "{{ .roleArn }}"
              {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated: {prune: true, selfHeal: true}
        syncOptions: [CreateNamespace=true, ServerSideApply=true]
