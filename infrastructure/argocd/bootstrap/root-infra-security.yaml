# infrastructure/argocd/bootstrap/root-infra-security.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-security
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - name: cert-manager
                  folder: infrastructure/argocd/apps/infrastructure/security/cert-manager
                  destNamespace: cert-manager
                - name: external-dns
                  folder: infrastructure/argocd/apps/infrastructure/security/external-dns
                  destNamespace: external-dns
                - name: admin-access
                  folder: infrastructure/argocd/apps/infrastructure/security/admin-access
                  destNamespace: argocd
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params.json"
  template:
    metadata:
      name: "{{.name}}"
      annotations:
        argocd.argoproj.io/sync-wave: "-5"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          path: "{{.folder}}"
          helm:
            valueFiles:
              - $values/infrastructure/argocd/bootstrap/global-params.json
            parameters:
              # {{ if eq .name "cert-manager" }}
              - name: "cert-manager.cainjector.serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
                value: "{{ .global.cert_manager_role_arn }}"
              - name: "cert-manager.serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
                value: "{{ .global.cert_manager_role_arn }}"
              - name: "cert-manager.webhook.serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
                value: "{{ .global.cert_manager_role_arn }}"
              # {{ end }}
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.destNamespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true