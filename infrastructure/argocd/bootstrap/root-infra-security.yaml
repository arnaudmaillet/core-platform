# infrastructure/argocd/bootstrap/root-infra-security.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: root-security
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - name: cert-manager
                  repoURL: https://charts.jetstack.io
                  chart: cert-manager
                  targetRevision: v1.12.0
                  destNamespace: cert-manager
                - name: external-dns
                  repoURL: https://github.com/arnaudmaillet/core-platform
                  folder: infrastructure/argocd/apps/infrastructure/security/external-dns
                  destNamespace: external-dns
                - name: cert-manager-config
                  repoURL: https://github.com/arnaudmaillet/core-platform
                  folder: infrastructure/argocd/apps/infrastructure/security/cert-manager-config
                  destNamespace: cert-manager
                - name: admin-access
                  repoURL: https://github.com/arnaudmaillet/core-platform
                  folder: infrastructure/argocd/apps/infrastructure/security/admin-access
                  destNamespace: argocd
          - git:
              repoURL: https://github.com/arnaudmaillet/core-platform
              revision: develop
              files:
                - path: "infrastructure/argocd/bootstrap/global-params.json"
  template:
    metadata:
      name: '{{.name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-5"
    spec:
      project: default
      sources:
        - repoURL: '{{.repoURL}}'
          # On utilise des placeholders que le YAML accepte
          chart: '{{index . "chart"}}'
          path: '{{index . "folder"}}'
          targetRevision: '{{if index . "targetRevision"}}{{index . "targetRevision"}}{{else}}develop{{end}}'
          helm:
            valueFiles:
              - $values/infrastructure/argocd/bootstrap/global-params.json
            # On ne met pas de IF/ELSE ici pour le moment, on laisse ArgoCD ignorer les paramètres vides
            parameters:
              - name: "installCRDs"
                value: "true"
              - name: "serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
                value: '{{index . "global" "cert_manager_role_arn"}}'
        - repoURL: https://github.com/arnaudmaillet/core-platform
          targetRevision: develop
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.destNamespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true