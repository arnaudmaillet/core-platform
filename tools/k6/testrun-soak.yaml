# tools/k6/testrun-soak.yaml — run the staging fleet soak via the k6-operator.
#
# Applied MANUALLY (a TestRun is a one-shot execution, not GitOps-managed —
# syncing it would re-run the soak on every ArgoCD sync):
#
#   kubectl create configmap k6-fleet-soak -n default --from-file=soak.js=tools/k6/soak.js
#   kubectl apply -f tools/k6/testrun-soak.yaml
#   kubectl logs -n default -l k6_cr=fleet-soak -f          # live results
#
# Cleanup (also required before re-running — TestRun names are one-shot):
#   kubectl delete testrun fleet-soak -n default
#   kubectl delete configmap k6-fleet-soak -n default
#
# Runner pods are admitted through the staging `allow-loadtest-to-mesh` /
# `allow-k6-operator-to-runners` NetworkPolicies by the labels the OPERATOR
# stamps (app=k6, runner=true) — custom `app` labels are overridden, so don't
# bother setting one. ~13 min: 2m ramp → 10m soak at 10 VUs/runner → 1m down.
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: fleet-soak
  namespace: default
spec:
  parallelism: 2
  script:
    configMap:
      name: k6-fleet-soak
      file: soak.js
  runner:
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        memory: 512Mi
