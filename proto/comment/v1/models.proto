syntax = "proto3";
package comment.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/core-platform/proto/comment/v1";

message Comment {
  string                      comment_id        = 1;
  string                      post_id           = 2;
  string                      profile_id        = 3;
  optional string             parent_comment_id = 4;
  string                      content           = 5;
  google.protobuf.Timestamp   created_at        = 6;
  optional google.protobuf.Timestamp edited_at  = 7;
  CommentAuthor               author            = 8;
}


message CommentAuthor {
  string profile_id   = 1;
  string username     = 2;
  string display_name = 3;
  string avatar_url   = 4; 
}