syntax = "proto3";

package profile.v1;

// Importation des models partagés (Profile, SocialLinks, etc.)
import "profile/v1/models.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/core-platform/proto/profile/v1";

// ==========================================
// STRUCTURES DE CONTRÔLE
// ==========================================

// Metadata présentes dans chaque commande pour assurer 
// l'idempotence (command_id) et le routage (region)
message ProfileTarget {
  string profile_id = 1;
  string region = 2;
  uint64 expected_version = 3;
}

message QueryMetadata {
  string region = 1;
}

// ==========================================
// SERVICES DE MODIFICATION (COMMANDES)
// ==========================================

// 1. SERVICE D'IDENTITÉ : Gère les informations pivots du compte
service ProfileIdentityService {
  rpc CreateProfile(CreateProfileRequest) returns (CreateProfileResponse);
  rpc ChangeHandle(ChangeHandleRequest) returns (ChangeHandleResponse);
  rpc UpdateDisplayName(UpdateDisplayNameRequest) returns (UpdateDisplayNameResponse);
  rpc UpdatePrivacy(UpdatePrivacyRequest) returns (UpdatePrivacyResponse);
}

// 2. SERVICE DE MÉDIAS (ASSETS) : Gère les images de profil
service ProfileMediaService {
  rpc UpdateAvatar(UpdateAvatarRequest) returns (UpdateAvatarResponse);
  rpc RemoveAvatar(RemoveAvatarRequest) returns (RemoveAvatarResponse);
  rpc UpdateBanner(UpdateBannerRequest) returns (UpdateBannerResponse);
  rpc RemoveBanner(RemoveBannerRequest) returns (RemoveBannerResponse);
}

// 3. SERVICE DE MÉTADONNÉES : Gère les infos éditoriales et sociales
service ProfileMetadataService {
  rpc UpdateBio(UpdateBioRequest) returns (UpdateBioResponse);
  rpc UpdateLocation(UpdateLocationRequest) returns (UpdateLocationResponse);
  rpc UpdateSocials(UpdateSocialsRequest) returns (UpdateSocialsResponse);
}

// ==========================================
// SERVICE DE LECTURE (QUERIES)
// ==========================================

service ProfileQueryService {
  rpc GetProfile(GetProfileRequest) returns (Profile);
  rpc GetProfilesByAccount(GetProfilesByAccountRequest) returns (GetProfilesByAccountResponse);
  rpc ResolveSlugs(ResolveSlugsRequest) returns (ResolveSlugsResponse);
}

// ==========================================
// MESSAGES DE REQUÊTES (COMMANDS)
// ==========================================

// --- Identity ---

message CreateProfileRequest {
  string command_id = 1;
  string account_id = 2;
  string handle = 3;
  string region = 4;
}

message ChangeHandleRequest {
  string command_id = 1;
  ProfileTarget target = 2;
  string new_handle = 3;
}

message UpdateDisplayNameRequest {
  string command_id = 1;
  ProfileTarget target = 2;
  string new_display_name = 3;
}

message UpdatePrivacyRequest {
  string command_id = 1;
  ProfileTarget target = 2;
  bool is_private = 3;
}

// --- Medias ---

message UpdateAvatarRequest {
  string command_id = 1;
  ProfileTarget target = 2;
  string new_avatar_url = 3;
}

message UpdateBannerRequest {
  string command_id = 1;
  ProfileTarget target = 2;
  string new_banner_url = 3;
}

message RemoveAvatarRequest {
  string command_id = 1;
  ProfileTarget target = 2;
}

message RemoveBannerRequest {
  string command_id = 1;
  ProfileTarget target = 2;
}

// --- Metadata ---

message UpdateBioRequest {
  string command_id = 1;
  ProfileTarget target = 2;
  google.protobuf.StringValue new_bio = 3;
}

message UpdateLocationRequest {
  string command_id = 1;
  ProfileTarget target = 2;
  google.protobuf.StringValue new_location = 3;
}

message UpdateSocialsRequest {
  string command_id = 1;
  ProfileTarget target = 2;
  optional Socials new_socials = 3;
}

// ==========================================
// MESSAGES DE REQUÊTES (QUERIES)
// ==========================================

message GetProfileRequest {
  QueryMetadata metadata = 1;
  string profile_id = 2;
}

message GetProfilesByAccountRequest {
  QueryMetadata metadata = 1;
  string account_id = 2;
}

message GetProfilesByAccountResponse {
  repeated Profile profiles = 1;
}

message GetProfileResponse {
  Profile profile = 1;
}

message ResolveSlugsRequest {
  QueryMetadata metadata = 1;
  repeated string slugs = 2;
}

// ==========================================
// RESPONSES (COMMANDS)
// ==========================================

message CreateProfileResponse {}
message ChangeHandleResponse {}
message UpdateDisplayNameResponse {}
message UpdatePrivacyResponse {}
message UpdateAvatarResponse {}
message RemoveAvatarResponse {}
message UpdateBannerResponse {}
message RemoveBannerResponse {}
message UpdateBioResponse {}
message UpdateLocationResponse {}
message UpdateSocialsResponse {}
message ResolveSlugsResponse {
  map<string, string> mappings = 1;
}