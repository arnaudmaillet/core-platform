syntax = "proto3";
package post.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/core-platform/proto/post/v1";

message MediaAsset {
  string media_id         = 1;
  string url              = 2;
  string thumbnail_url    = 3;
  uint32 duration_seconds = 4;
  uint32 width            = 5;
  uint32 height           = 6;
  string media_type       = 7;
  string mime_type        = 8;
}

message Post {
  string                      post_id                = 1;
  string                      author_id              = 2;
  string                      post_type              = 3;
  optional string             caption                = 4;
  repeated MediaAsset         media_list             = 5;
  uint32                      total_duration_seconds = 6;
  bool                        allowed_comment_hands  = 7;
  string                      visibility_level       = 8;
  optional string             music_id               = 9;
  repeated string             hashtags               = 10;
  bool                        is_edited              = 11;
  google.protobuf.Timestamp   updated_at             = 12;
  string                      dynamic_metadata       = 13;
  uint64                      version                = 14;
}