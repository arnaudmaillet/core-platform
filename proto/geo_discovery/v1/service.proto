syntax = "proto3";

package geo_discovery.v1;

import "geo_discovery/v1/models.proto";

option go_package = "github.com/core-platform/proto/geo_discovery/v1";

service GeoDiscoveryQueryService {
  rpc GetMapFeed(GetMapFeedRequest) returns (GetMapFeedResponse);
}

message QueryMetadata {
  string region = 1;
}

message GetMapFeedRequest {
  QueryMetadata metadata = 1;
  MapViewport viewport = 2;
  int32 zoom_level = 3;
  uint32 limit_per_tile = 4;
}

message GetMapFeedResponse {
  repeated MapPostPin pins = 1;
}