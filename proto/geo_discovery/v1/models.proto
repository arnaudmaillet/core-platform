syntax = "proto3";

package geo_discovery.v1;
import "google/protobuf/timestamp.proto";

option go_package = "github.com/core-platform/proto/geo_discovery/v1";

message LatLng {
  double latitude = 1;
  double longitude = 2;
}

message MapViewport {
  LatLng south_west = 1;
  LatLng north_east = 2;
}

message MapPostPin {
  string post_id = 1;
  LatLng location = 2;
  double popularity_score = 3;
  string media_type = 4;
  string thumbnail_url = 5;
  google.protobuf.Timestamp created_at = 6;
}

message TilePostMetadata {
    string post_id = 1;
    double latitude = 2;
    double longitude = 3;
    string post_type = 4;
    optional string thumbnail_url = 5;
}