syntax = "proto3";
package account.v1;

import "account/v1/models.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/core-platform/proto/account/v1;accountv1";

service AccountRegistrationService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
}

service AccountAccessService {
  rpc LinkSubIdentity(LinkSubIdentityRequest) returns (LinkSubIdentityResponse);
  rpc ResolveIdentity(ResolveIdentityRequest) returns (ResolveIdentityResponse);
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);
  rpc VerifyPhone(VerifyPhoneRequest) returns (VerifyPhoneResponse);
}

service AccountModerationService {
  rpc Ban(BanRequest) returns (BanResponse);
  rpc Unban(UnbanRequest) returns (UnbanResponse);
  rpc Suspend(SuspendRequest) returns (SuspendResponse);
  rpc Unsuspend(UnsuspendRequest) returns (UnsuspendResponse);
  rpc Shadowban(ShadowbanRequest) returns (ShadowbanResponse);
  rpc LiftShadowban(LiftShadowbanRequest) returns (LiftShadowbanResponse);
  rpc IncreaseTrustScore(IncreaseTrustScoreRequest) returns (IncreaseTrustScoreResponse);
  rpc DecreaseTrustScore(DecreaseTrustScoreRequest) returns (DecreaseTrustScoreResponse);
  rpc ChangeRole(ChangeRoleRequest) returns (ChangeRoleResponse);
  rpc ChangeBetaTier(ChangeBetaTierRequest) returns (ChangeBetaTierResponse);
}

service AccountPersonalService {
  rpc ChangeEmail(ChangeEmailRequest) returns (ChangeEmailResponse);
  rpc ChangePhone(ChangePhoneRequest) returns (ChangePhoneResponse);
  rpc ChangeBirthDate(ChangeBirthDateRequest) returns (ChangeBirthDateResponse);
  // rpc ChangeRegion(ChangeRegionRequest) returns (ChangeRegionResponse);
  rpc UpdateLocale(UpdateLocaleRequest) returns (UpdateLocaleResponse);
  rpc Activate(ActivateRequest) returns (ActivateResponse);
  rpc Deactivate(DeactivateRequest) returns (DeactivateResponse);
}

service AccountQueryService {
  rpc GetAccount(GetAccountRequest) returns (FullAccountResponse);
  rpc GetPublicProfile(GetAccountRequest) returns (PublicProfileResponse);
}

service AccountSettingsService {
  rpc UpdatePreferences(UpdatePreferencesRequest) returns (UpdatePreferencesResponse);
  rpc UpdateTimezone(UpdateTimezoneRequest) returns (UpdateTimezoneResponse);
  rpc AddPushToken(AddPushTokenRequest) returns (AddPushTokenResponse);
  rpc RemovePushToken(RemovePushTokenRequest) returns (RemovePushTokenResponse);
}

message RegisterRequest {
  string                 command_id = 1;
  string                 region     = 2;
  optional string        sub_id     = 3;
  RegistrationIdentifier identifier = 4;
  string                 locale     = 5;
  string                 ip_addr    = 6;
}

message RegisterResponse {
  string account_id = 1;
}

message LinkSubIdentityRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        sub_id     = 3;
}

message LinkSubIdentityResponse {}

message ResolveIdentityRequest {
  string sub_id = 1;
}

message ResolveIdentityResponse {
  string account_id = 1;
  string state      = 2;
  string role       = 3;
}

message VerifyEmailRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        code       = 3;
}

message VerifyEmailResponse {}

// 💡 NOUVEAU : Payloads pour VerifyPhone
message VerifyPhoneRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        code       = 3;
}

message VerifyPhoneResponse {}

message BanRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        reason     = 3;
}

message BanResponse {}

message UnbanRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        reason     = 3;
}

message UnbanResponse {}

message SuspendRequest {
  string        command_id       = 1;
  AccountTarget target           = 2;
  int64         duration_seconds = 3;
  string        reason           = 4;
}

message SuspendResponse {}

message UnsuspendRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        reason     = 3;
}

message UnsuspendResponse {}

message ShadowbanRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        reason     = 3;
}

message ShadowbanResponse {}

message LiftShadowbanRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        reason     = 3;
}

message LiftShadowbanResponse {}

message IncreaseTrustScoreRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  uint32        amount     = 3;
  string        reason     = 4;
}

message IncreaseTrustScoreResponse {}

message DecreaseTrustScoreRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  uint32        amount     = 3;
  string        reason     = 4;
}

message DecreaseTrustScoreResponse {}

message ChangeRoleRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        new_role   = 3;
  string        reason     = 4;
}

message ChangeRoleResponse {}

message ChangeBetaTierRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        new_tier   = 3;
}

message ChangeBetaTierResponse {}

message ChangeEmailRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        new_email  = 3;
}

message ChangeEmailResponse {}

message ChangePhoneRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        new_phone  = 3;
}

message ChangePhoneResponse {}

message ChangeBirthDateRequest {
  string                    command_id     = 1;
  AccountTarget             target         = 2;
  google.protobuf.Timestamp new_birth_date = 3;
}

message ChangeBirthDateResponse {}

// --- MESSAGES (LOCALISATION) ---

// message ChangeRegionRequest {
//   string command_id = 1;
//   AccountTarget target = 2;
//   string new_region = 3;
// }
// message ChangeRegionResponse {}
message UpdateLocaleRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        locale     = 3;
}

message UpdateLocaleResponse {}

message ActivateRequest {
  string          command_id = 1;
  AccountTarget   target     = 2;
  optional string reason     = 3;
}

message ActivateResponse {}

message DeactivateRequest {
  string          command_id = 1;
  AccountTarget   target     = 2;
  optional string reason     = 3;
}

message DeactivateResponse {}

message GetAccountRequest { string account_id = 1; }

message FullAccountResponse {
  AccountIdentity   identity   = 1;
  AccountGovernance governance = 2;
  AccountSettings   settings   = 3;
}

message PublicProfileResponse {
  string account_id = 1;
  string locale     = 2;
}

message UpdatePreferencesRequest {
  string                        command_id    = 1;
  AccountTarget                 target        = 2;
  AccountSettings.Privacy       privacy       = 3;
  AccountSettings.Notifications notifications = 4;
  AccountSettings.Appearance    appearance    = 5;
}

message UpdatePreferencesResponse {}

message UpdateTimezoneRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        timezone   = 3;
}

message UpdateTimezoneResponse {}

message AddPushTokenRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        token      = 3;
}

message AddPushTokenResponse {}

message RemovePushTokenRequest {
  string        command_id = 1;
  AccountTarget target     = 2;
  string        token      = 3;
}

message RemovePushTokenResponse {}