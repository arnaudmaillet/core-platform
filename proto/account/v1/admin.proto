// proto/account/v1/admin.proto

syntax = "proto3";

package account.v1;

import "account/v1/models.proto";
import "account/v1/enums.proto";

option go_package = "github.com/core-platform/proto/account/v1;accountv1";

// --- MODERATION ---
service AccountModerationService {
  rpc Suspend(SuspendRequest) returns (Account);
  rpc Unsuspend(UnsuspendRequest) returns (Account);
  rpc Shadowban(ShadowbanRequest) returns (Account);
  rpc LiftShadowban(LiftShadowbanRequest) returns (Account);
  rpc BanAccount(BanRequest) returns (Account);
  rpc UnbanAccount(UnbanRequest) returns (Account);
  rpc IncreaseTrustScore(IncreaseTrustScoreRequest) returns (Account);
  rpc DecreaseTrustScore(DecreaseTrustScoreRequest) returns (Account);
}

// --- METADATA ---
service AccountMetadataService {
  rpc GetMetadata(GetMetadataRequest) returns (AccountMetadata);
  rpc SetBetaStatus(SetBetaStatusRequest) returns (AccountMetadata);
  rpc SetShadowbanStatus(SetShadowbanStatusRequest) returns (AccountMetadata);
  rpc UpdateAccountRole(UpdateRoleRequest) returns (AccountMetadata);
}

// --- SETTINGS ---
service AccountSettingsService {
  rpc GetSettings(GetSettingsRequest) returns (AccountSettings);
  rpc UpdateTimezone(UpdateTimezoneRequest) returns (AccountSettings);
  rpc AddPushToken(AddPushTokenRequest) returns (AccountSettings);
  rpc RemovePushToken(RemovePushTokenRequest) returns (AccountSettings);
  rpc UpdatePreferences(UpdatePreferencesRequest) returns (AccountSettings);
}

// --- MESSAGES ---
message SuspendRequest { string id = 1; string reason = 2; }
message UnsuspendRequest { string id = 1; }
message ShadowbanRequest { string id = 1; string reason = 2; }
message LiftShadowbanRequest { string id = 1; }
message BanRequest { string id = 1; string reason = 2; }
message UnbanRequest { string id = 1; }
message GetMetadataRequest { string account_id = 1; }
message SetBetaStatusRequest { string account_id = 1; bool is_beta_tester = 2; string reason = 3; }
message SetShadowbanStatusRequest { string account_id = 1; bool is_shadowbanned = 2; string reason = 3; }
message UpdateRoleRequest { string account_id = 1; AccountRole new_role = 2; string reason = 3; }
message GetSettingsRequest { string account_id = 1; }
message UpdateTimezoneRequest { string account_id = 1; string timezone = 2; }
message AddPushTokenRequest { string account_id = 1; string token = 2; }
message RemovePushTokenRequest { string account_id = 1; string token = 2; }
message UpdatePreferencesRequest { 
  string account_id = 1; 
  AccountSettings.Privacy privacy = 2;
  AccountSettings.Notifications notifications = 3;
  AccountSettings.Appearance appearance = 4;
}
message IncreaseTrustScoreRequest {
  string account_id = 1;
  string action_id = 2;
  uint32 amount = 3;
  string reason = 4;
}
message DecreaseTrustScoreRequest {
  string account_id = 1;
  string action_id = 2;
  uint32 amount = 3;
  string reason = 4;
}