// proto/account/v1/admin.proto

syntax = "proto3";

package account.v1;

import "account/v1/models.proto";
import "account/v1/enums.proto";

option go_package = "github.com/core-platform/proto/account/v1;accountv1";

// --- MODERATION ---
service AccountModerationService {
  rpc Suspend(SuspendRequest) returns (AccountIdentity);
  rpc Unsuspend(UnsuspendRequest) returns (AccountIdentity);
  rpc Shadowban(ShadowbanRequest) returns (AccountIdentity);
  rpc LiftShadowban(LiftShadowbanRequest) returns (AccountIdentity);
  rpc BanAccount(BanRequest) returns (AccountIdentity);
  rpc UnbanAccount(UnbanRequest) returns (AccountIdentity);
  rpc IncreaseTrustScore(IncreaseTrustScoreRequest) returns (AccountIdentity);
  rpc DecreaseTrustScore(DecreaseTrustScoreRequest) returns (AccountIdentity);
}

// --- METADATA ---
service AccountMetadataService {
  rpc GetMetadata(GetMetadataRequest) returns (AccountMetadata);
  rpc SetBetaStatus(SetBetaStatusRequest) returns (AccountMetadata);
  rpc SetShadowbanStatus(SetShadowbanStatusRequest) returns (AccountMetadata);
  rpc UpdateAccountRole(UpdateRoleRequest) returns (AccountMetadata);
}

// --- SETTINGS ---
service AccountSettingsService {
  rpc GetSettings(GetSettingsRequest) returns (AccountSettings);
  rpc UpdateTimezone(UpdateTimezoneRequest) returns (AccountSettings);
  rpc AddPushToken(AddPushTokenRequest) returns (AccountSettings);
  rpc RemovePushToken(RemovePushTokenRequest) returns (AccountSettings);
  rpc UpdatePreferences(UpdatePreferencesRequest) returns (AccountSettings);
}

// --- MESSAGES ---
message SuspendRequest { string command_id = 1; string account_id = 2; string reason = 3; }
message UnsuspendRequest { string command_id = 1; string account_id = 2; string reason = 3; }
message ShadowbanRequest { string command_id = 1; string account_id = 2; string reason = 3; }
message LiftShadowbanRequest { string command_id = 1; string account_id = 2; string reason = 3; }
message BanRequest { string command_id = 1; string account_id = 2; string reason = 3; }
message UnbanRequest { string command_id = 1; string account_id = 2; string reason = 3; }
message GetMetadataRequest { string account_id = 1; }
message SetBetaStatusRequest { string command_id = 1; string account_id = 2; bool is_beta_tester = 3; string reason = 4; }
message SetShadowbanStatusRequest { string command_id = 1; string account_id = 2; bool is_shadowbanned = 3; string reason = 4; }
message UpdateRoleRequest { string command_id = 1; string account_id = 2; AccountRole new_role = 3; string reason = 4; }
message GetSettingsRequest { string account_id = 1; }
message UpdateTimezoneRequest { string command_id = 1; string account_id = 2; string timezone = 3; }
message AddPushTokenRequest { string command_id = 1; string account_id = 2; string token = 3; }
message RemovePushTokenRequest { string command_id = 1; string account_id = 2; string token = 3; }
message UpdatePreferencesRequest { 
  string command_id = 1; 
  string account_id = 2; 
  AccountSettings.Privacy privacy = 3;
  AccountSettings.Notifications notifications = 4;
  AccountSettings.Appearance appearance = 5;
}
message IncreaseTrustScoreRequest {
  string command_id = 1; 
  string account_id = 2;
  string action_id = 3;
  uint32 amount = 4;
  string reason = 5;
}
message DecreaseTrustScoreRequest {
  string command_id = 1; 
  string account_id = 2;
  string action_id = 3;
  uint32 amount = 4;
  string reason = 5;
}