syntax = "proto3";
package account.v1;

import "account/v1/models.proto";
import "account/v1/enums.proto";

option go_package = "github.com/core-platform/proto/account/v1;accountv1";

service AccountAccessService {
  // Inscription & Liaison Sociale
  rpc Register(RegisterRequest) returns (AccountIdentity);
  rpc LinkExternalIdentity(LinkExternalIdentityRequest) returns (AccountIdentity);
  
  // Résolution technique (souvent utilisé par une Gateway ou un service d'Auth)
  rpc ResolveIdentity(ResolveIdentityRequest) returns (ResolveIdentityResponse);
}

message RegisterRequest {
  string command_id = 1;
  optional string external_id = 2; // Optionnel grâce à notre refacto Option 1
  RegistrationIdentifier identifier = 3;
  string region_code = 4;
  string locale = 5;
  string ip_addr = 6;
}

message LinkExternalIdentityRequest { 
  string command_id = 1; 
  string account_id = 2; 
  string external_id = 3; 
}

message ResolveIdentityRequest { string external_id = 1; }

message ResolveIdentityResponse {
  string account_id = 1;
  AccountState state = 2;
  AccountRole role = 3;
}