syntax = "proto3";
package account.v1;

import "account/v1/models.proto";

option go_package = "github.com/core-platform/proto/account/v1;accountv1";

service AccountSettingsService {
  rpc UpdatePreferences(UpdatePreferencesRequest) returns (AccountSettings);
  rpc UpdateTimezone(UpdateTimezoneRequest) returns (AccountSettings);
  rpc AddPushToken(AddPushTokenRequest) returns (AccountSettings);
  rpc RemovePushToken(RemovePushTokenRequest) returns (AccountSettings);
}

message UpdatePreferencesRequest { 
  string command_id = 1; 
  string account_id = 2; 
  AccountSettings.Privacy privacy = 3;
  AccountSettings.Notifications notifications = 4;
  AccountSettings.Appearance appearance = 5;
}
message UpdateTimezoneRequest { string command_id = 1; string account_id = 2; string timezone = 3; }
message AddPushTokenRequest { string command_id = 1; string account_id = 2; string token = 3; }
message RemovePushTokenRequest { string command_id = 1; string account_id = 2; string token = 3; }