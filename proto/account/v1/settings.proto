syntax = "proto3";
package account.v1;

import "account/v1/models.proto";

option go_package = "github.com/core-platform/proto/account/v1;accountv1";

service AccountSettingsService {
  rpc UpdatePreferences(UpdatePreferencesRequest) returns (UpdatePreferencesResponse);
  rpc UpdateTimezone(UpdateTimezoneRequest) returns (UpdateTimezoneResponse);
  rpc AddPushToken(AddPushTokenRequest) returns (AddPushTokenResponse);
  rpc RemovePushToken(RemovePushTokenRequest) returns (RemovePushTokenResponse);
}

// --- MESSAGES (PREFERENCES) ---

message UpdatePreferencesRequest { 
  string command_id = 1; 
  AccountTarget target = 2;
  AccountSettings.Privacy privacy = 3;
  AccountSettings.Notifications notifications = 4;
  AccountSettings.Appearance appearance = 5;
}
message UpdatePreferencesResponse {}

// --- MESSAGES (TIMEZONE) ---

message UpdateTimezoneRequest { 
  string command_id = 1; 
  AccountTarget target = 2; 
  string timezone = 3; 
}
message UpdateTimezoneResponse {}

// --- MESSAGES (PUSH TOKENS) ---

message AddPushTokenRequest { 
  string command_id = 1; 
  AccountTarget target = 2; 
  string token = 3; 
}
message AddPushTokenResponse {}

message RemovePushTokenRequest { 
  string command_id = 1; 
  AccountTarget target = 2; 
  string token = 3; 
}
message RemovePushTokenResponse {}