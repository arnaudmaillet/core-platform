// proto/account/v1/services.proto

syntax = "proto3";

package account.v1;

import "account/v1/models.proto";
import "account/v1/enums.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/core-platform/proto/account/v1;accountv1";

// --- IDENTITY ---
service AccountIdentityService {
  // Registration & Search
  rpc Register(RegisterRequest) returns (Account);
  // rpc ResolveIdentity(ResolveIdentityRequest) returns (ResolveIdentityResponse);
  rpc LinkExternalIdentity(LinkExternalIdentityRequest) returns (Account);

  // Identity Updates
  rpc ChangeEmail(ChangeEmailRequest) returns (Account);
  rpc VerifyEmail(VerifyEmailRequest) returns (Account);
  rpc ChangePhoneNumber(ChangePhoneNumberRequest) returns (Account);
  rpc VerifyPhoneNumber(VerifyPhoneNumberRequest) returns (Account);
  rpc ChangeBirthDate(ChangeBirthDateRequest) returns (Account);
  rpc ChangeRegion(ChangeRegionRequest) returns (Account);

  // Lifecycle
  rpc DeactivateAccount(DeactivateRequest) returns (Account);
  rpc ReactivateAccount(ActivateRequest) returns (Account);
}

// --- STATUS ---
service AccountStatusService {
  rpc GetAccount(GetAccountRequest) returns (Account);
  rpc LinkExternalIdentity(LinkExternalIdentityRequest) returns (Account);
  rpc DeactivateAccount(DeactivateRequest) returns (Account);
  rpc ReactivateAccount(ActivateRequest) returns (Account);
}

// --- MESSAGES ---
message GetAccountRequest { string id = 1; }
message RegisterRequest {
  string external_id = 1;
  string email = 2;
  google.protobuf.Timestamp birth_date = 3;
  string region_code = 4;
  string locale = 5;
  string ip_addr = 6;
}
// message ResolveIdentityRequest { string external_id = 1; }
message LinkExternalIdentityRequest { string id = 1; string external_id = 2; }
message ChangeEmailRequest { string id = 1; string new_email = 2; }
message VerifyEmailRequest { string id = 1; string token = 2; }
message ChangePhoneNumberRequest { string id = 1; string new_phone = 2; }
message VerifyPhoneNumberRequest { string id = 1; string code = 2; }
message ChangeBirthDateRequest { string id = 1; google.protobuf.Timestamp new_birth_date = 2; }
message ChangeRegionRequest { string id = 1; string new_region = 2; }
message DeactivateRequest { string id = 1; }
message ActivateRequest { string id = 1; }
message ResolveIdentityResponse {
  string account_id = 1;
  AccountState state = 2;
  AccountRole role = 3;
}