// proto/account/v1/services.proto

syntax = "proto3";

package account.v1;

import "account/v1/models.proto";
import "account/v1/enums.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/core-platform/proto/account/v1;accountv1";

// --- IDENTITY ---
service AccountIdentityService {
  // Registration & Search
  rpc Register(RegisterRequest) returns (AccountIdentity);
  // rpc ResolveIdentity(ResolveIdentityRequest) returns (ResolveIdentityResponse);
  rpc LinkExternalIdentity(LinkExternalIdentityRequest) returns (AccountIdentity);

  // Identity Updates
  rpc ChangeEmail(ChangeEmailRequest) returns (AccountIdentity);
  rpc VerifyEmail(VerifyEmailRequest) returns (AccountIdentity);
  rpc ChangePhoneNumber(ChangePhoneNumberRequest) returns (AccountIdentity);
  rpc VerifyPhoneNumber(VerifyPhoneNumberRequest) returns (AccountIdentity);
  rpc ChangeBirthDate(ChangeBirthDateRequest) returns (AccountIdentity);
  rpc ChangeRegion(ChangeRegionRequest) returns (AccountIdentity);

  // Lifecycle
  rpc DeactivateAccount(DeactivateRequest) returns (AccountIdentity);
  rpc ReactivateAccount(ActivateRequest) returns (AccountIdentity);
}

// --- STATUS ---
service AccountStatusService {
  rpc GetIdentity(GetIdentityRequest) returns (AccountIdentity);
  rpc LinkExternalIdentity(LinkExternalIdentityRequest) returns (AccountIdentity);
  rpc DeactivateAccount(DeactivateRequest) returns (AccountIdentity);
  rpc ReactivateAccount(ActivateRequest) returns (AccountIdentity);
}

// --- MESSAGES ---
message GetIdentityRequest { string account_id = 1; }
message RegisterRequest {
  string command_id = 1;
  string external_id = 2;
  RegistrationIdentifier identifier = 3;
  google.protobuf.Timestamp birth_date = 4;
  string region_code = 5;
  string locale = 6;
  string ip_addr = 7;
}
// message ResolveIdentityRequest { string external_id = 1; }
message LinkExternalIdentityRequest { string command_id = 1; string account_id = 2; string external_id = 3; }
message ChangeEmailRequest { string command_id = 1; string account_id = 2; string new_email = 3; }
message VerifyEmailRequest { string command_id = 1; string account_id = 2; string token = 3; }
message ChangePhoneNumberRequest { string command_id = 1; string account_id = 2; string new_phone = 3; }
message VerifyPhoneNumberRequest { string command_id = 1; string account_id = 2; string token = 3; }
message ChangeBirthDateRequest { string command_id = 1; string account_id = 2; google.protobuf.Timestamp new_birth_date = 3; }
message ChangeRegionRequest { string command_id = 1; string account_id = 2; string new_region = 3; }
message DeactivateRequest { string command_id = 1; string account_id = 2; optional string reason = 3; }
message ActivateRequest { string command_id = 1; string account_id = 2; }
message ResolveIdentityResponse {
  string account_id = 1;
  AccountState state = 2;
  AccountRole role = 3;
}