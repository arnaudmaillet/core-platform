syntax = "proto3";

package social.v1;

service SocialService {
  rpc FollowProfile(FollowProfileRequest) returns (FollowProfileResponse);
  rpc UnfollowProfile(UnfollowProfileRequest) returns (UnfollowProfileResponse);
  rpc IsFollowing(IsFollowingRequest) returns (IsFollowingResponse);
  rpc GetProfileCounters(GetProfileCountersRequest) returns (GetProfileCountersResponse);
  rpc GetFollowing(GetFollowingRequest) returns (GetFollowingResponse);
  rpc GetFollowers(GetFollowersRequest) returns (GetFollowersResponse);
}


message CommandTarget {
  string profile_id = 1;
  string region = 2;
  uint64 expected_version = 3;
}


message FollowProfileRequest {
  string command_id = 1;
  string follower_id = 2;
  CommandTarget target = 3;
}

message FollowProfileResponse {
  bool success = 1;
}

message UnfollowProfileRequest {
  string command_id = 1;
  string follower_id = 2;
  CommandTarget target = 3;
}

message UnfollowProfileResponse {
  bool success = 1;
}

message IsFollowingRequest {
  string follower_id = 1;
  string following_id = 2;
}

message IsFollowingResponse {
  bool is_following = 1;
}

message GetProfileCountersRequest {
  string profile_id = 1;
  string region = 2;
}

message GetProfileCountersResponse {
  uint64 followers_count = 1;
  uint64 following_count = 2;
}

message GetFollowingRequest {
  string follower_id = 1;
  string region = 2;
  optional uint32 limit = 3;
  optional uint32 offset = 4;
}

message GetFollowingResponse {
  repeated string following_ids = 1;
}

message GetFollowersRequest {
  string following_id = 1;
  string region = 2;
  optional uint32 limit = 3;
  optional uint32 offset = 4;
}

message GetFollowersResponse {
  repeated string followers_ids = 1;
}