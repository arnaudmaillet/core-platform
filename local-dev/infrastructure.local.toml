# Fleet-wide externalized infrastructure config (local docker-compose).
# Mounted into every service as /etc/infra/infrastructure.toml (INFRA_CONFIG_PATH)
# and hot-reloaded by the runtime. Mirrors k8s/overlays/dev/infrastructure.toml.

[resilience]
default_profile = "standard"

[resilience.profiles.standard]
timeout = { duration_ms = 10000 }
circuit_breaker = { failure_threshold = 5, success_threshold = 2, open_duration_ms = 30000, half_open_max_calls = 1 }
retry = { max_attempts = 3, backoff = { kind = "exponential", base_ms = 50, max_ms = 10000, jitter = "full" } }

[resilience.bindings]
"social-graph" = "standard"

[traffic]
default_profile = "standard"

[traffic.profiles.standard]
rps   = 1000
burst = 200
scope = "per_method"

[cache]
default_profile = "standard"

[cache.profiles.standard]
ttl_secs = 300

[cache.profiles.handles]
ttl_secs = 600

[cache.bindings]
"profile-view" = "standard"
"handle-lookup" = "handles"

[telemetry]
log_filter = "info"
sampling   = { kind = "trace_id_ratio", ratio = 0.1 }
