# backend/services/account/api/command-server/Cargo.toml

[package]
name = "account-command-server"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description.workspace = true


[dependencies]
# Tes briques internes
shared-proto = { path = "../../../../../common/rust/shared-proto" }
account = { path = "../../../../../crates/account" } # Ta logique métier

# Serveur & Async
tonic = "0.12"
tokio = { version = "1.0", features = ["full"] }
prost = "0.13"

# Utilitaires
tracing = "0.1"
tracing-subscriber = "0.3"
dotenvy = "0.15"
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "uuid", "chrono"] }