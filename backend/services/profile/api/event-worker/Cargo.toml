# backend/services/account/api/command-server/Cargo.toml

[package]
name = "profile-event-worker"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description.workspace = true

[dependencies]
shared-kernel = { workspace = true, features = ["service-worker"] }
shared-proto = { workspace = true }
profile = { workspace = true, features = ["test-utils"] }
auth = { workspace = true }

tokio = { workspace = true }
tonic = { workspace = true }
tokio-util = { workspace = true, features = ["rt"] }
tonic-reflection = { workspace = true }
tonic-health = { workspace = true }
uuid = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }
rdkafka = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }

tracing = { workspace = true }
tracing-subscriber = { workspace = true }
dotenvy = { workspace = true }
sqlx = { workspace = true, features = [
    "runtime-tokio",
    "postgres",
    "uuid",
    "chrono",
] }

[dev-dependencies]
auth = { workspace = true, features = ["test-utils"] }
