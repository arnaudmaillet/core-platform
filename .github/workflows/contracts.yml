name: contracts

# Guards and publishes the centralized gRPC IDL (crates/contracts/proto):
#   - `buf lint`     on every change (BASIC rules — see buf.yaml)
#   - `buf breaking` against the base branch on PRs (WIRE_JSON — blocks wire/JSON
#     incompatible changes to already-deployed contracts)
#   - `buf push`     to the Buf Schema Registry (buf.build/core-platform/contracts)
#     on merges to develop/main, so the frontend repos consume versioned contracts
#     instead of copying .proto files. buf-action attaches git metadata, so the
#     branch name becomes the BSR label: `develop` = staging contracts, `main` = prod.
#
# Publishing requires the BUF_TOKEN repo secret (a BSR API token). Until it is
# set, the push is skipped and this workflow is validation-only — it never fails
# for lack of registry credentials.
#
# Only runs when proto (or this workflow) changes, so it stays cheap.

on:
  pull_request:
    paths:
      - "crates/contracts/proto/**"
      - ".github/workflows/contracts.yml"
  push:
    branches: [develop, main]
    paths:
      - "crates/contracts/proto/**"
      - ".github/workflows/contracts.yml"

permissions:
  contents: read
  # buf-action posts a lint/breaking summary comment on the PR.
  pull-requests: write

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `buf breaking` can resolve the base branch ref.
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          version: 1.61.0
          # The buf module lives in a subdir, not the repo root.
          input: crates/contracts/proto
          lint: true
          breaking: true
          # `buf format` style rules aren't enforced here; lint (BASIC) is.
          format: false
          # Publish to the BSR on develop/main pushes only (never from PRs).
          # Self-skips while the BUF_TOKEN secret is absent so validation stays
          # green pre-BSR-setup.
          push: ${{ github.event_name == 'push' && secrets.BUF_TOKEN != '' }}
          token: ${{ secrets.BUF_TOKEN }}
          github_token: ${{ github.token }}
