# .github/workflows/fleet-images-deploy.yml
#
# Build + push every fleet binary (20 services + the shared migrator) to ECR,
# one image per binary via the generic deploy/Dockerfile (`--build-arg BIN`). This
# replaces the legacy per-service Bazel deploy workflows for the Rust crates/ fleet
# (those target the old backend/ tree). Add a BIN to the matrix to ship a new one.
#
# Auth + region come from the same repo secrets the existing deploy workflows use
# (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION). Each binary is built in
# parallel with a per-BIN BuildKit registry cache (core-platform-buildcache:<bin>),
# so a source edit only rebuilds the workspace+build layer — the cargo-chef cook
# layer (librdkafka, tonic, scylla, sqlx…) is reused.
#
# Each image is tagged with the immutable :<git-sha> (the deployment handle) and a
# floating :staging (convenience only). After the matrix succeeds, the
# `pin-staging-images` job rewrites the staging overlay's fleet image tags to that
# :<git-sha> and commits back to develop — so ArgoCD sees a real manifest diff and
# rolls out, deploys are content-addressed (IfNotPresent is correct for an
# immutable tag), and a rollback is just `git revert`. Previously the overlay
# pinned a MUTABLE :staging tag, so new builds never landed on reschedule and there
# was no record of what was running.
name: Build & Push Fleet Images

on:
  push:
    branches: [develop]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deploy/Dockerfile'
      - '.github/workflows/fleet-images-deploy.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to push (default: staging)'
        default: staging

permissions:
  contents: read

jobs:
  build-and-push:
    # Native runner per arch — no QEMU: emulated rustc on a 22-binary workspace
    # is hours-per-binary territory, while ubuntu-24.04-arm is free on public
    # repos and compiles at full speed. Each (bin, arch) pushes an arch-suffixed
    # tag; the stitch job below merges them into one multi-arch manifest.
    runs-on: ${{ matrix.arch.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { platform: linux/amd64, runner: ubuntu-latest,     suffix: amd64 }
          - { platform: linux/arm64, runner: ubuntu-24.04-arm,  suffix: arm64 }
        bin:
          - counter-server
          - counter-worker
          - audit-server
          - audit-worker
          - auth-server
          - media-server
          - moderation-server
          - search-server
          - realtime-gateway
          - realtime-dispatcher
          # ── Core services (same Rust workspace; the staging overlay deploys these too) ──
          - account-server
          - chat-server
          - comment-server
          - engagement-server
          - geo-discovery-server
          - notification-server
          - post-server
          - profile-server
          - social-graph-server
          - timeline-server
          # ── Shared ──
          - migrator
          - topic-provisioner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.bin }} (${{ matrix.arch.suffix }})
        env:
          REG: ${{ steps.ecr.outputs.registry }}
          BIN: ${{ matrix.bin }}
          ARCH: ${{ matrix.arch.suffix }}
          PLATFORM: ${{ matrix.arch.platform }}
        run: |
          docker buildx build \
            -f deploy/Dockerfile \
            --platform "$PLATFORM" \
            --build-arg BIN="$BIN" \
            --cache-from type=registry,ref="$REG/core-platform-buildcache:$BIN-$ARCH" \
            --cache-to   type=registry,ref="$REG/core-platform-buildcache:$BIN-$ARCH",mode=max \
            -t "$REG/core-platform-$BIN:${{ github.sha }}-$ARCH" \
            --push .

  # ── Stitch per-arch images into one multi-arch manifest per binary ───────────
  # The :<git-sha> and floating tags only exist once BOTH arch builds succeeded
  # (needs: gates on the full matrix) — a half-arch fleet is never addressable
  # by the tags the overlays and the promote workflow use. This is what lets
  # the Karpenter pools re-allow arm64: kubelet resolves the right arch from
  # the manifest list.
  stitch-manifests:
    name: Create multi-arch manifests
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Stitch and verify every binary
        env:
          REG: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.event.inputs.tag || 'staging' }}
        run: |
          set -euo pipefail
          # Keep in sync with the build matrix above.
          for bin in \
            counter-server counter-worker audit-server audit-worker \
            auth-server media-server moderation-server search-server \
            realtime-gateway realtime-dispatcher \
            account-server chat-server comment-server engagement-server \
            geo-discovery-server notification-server post-server profile-server \
            social-graph-server timeline-server \
            migrator topic-provisioner; do
            docker buildx imagetools create \
              -t "$REG/core-platform-$bin:${{ github.sha }}" \
              -t "$REG/core-platform-$bin:$TAG" \
              "$REG/core-platform-$bin:${{ github.sha }}-amd64" \
              "$REG/core-platform-$bin:${{ github.sha }}-arm64"
            # Fail loudly if the stitched manifest is missing either platform.
            docker buildx imagetools inspect "$REG/core-platform-$bin:${{ github.sha }}" \
              | grep -q 'linux/amd64'
            docker buildx imagetools inspect "$REG/core-platform-$bin:${{ github.sha }}" \
              | grep -q 'linux/arm64'
            echo "stitched: $bin"
          done

  # ── Pin the staging overlay to the immutable tag we just built ────────────────
  # Runs once after ALL matrix builds succeed; if any binary fails, the fleet is
  # not pinned (a partial rollout is never promoted). Rewrites ONLY the images this
  # workflow builds — the legacy Bazel-built services keep their own tags — then
  # commits back to develop so ArgoCD rolls out the new revision.
  pin-staging-images:
    name: Pin staging overlay to immutable tags
    needs: stitch-manifests
    runs-on: ubuntu-latest
    # Only auto-pin for the standard staging build (skip manual one-off tags).
    if: ${{ github.event_name == 'push' || (github.event.inputs.tag || 'staging') == 'staging' }}
    permissions:
      contents: write
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          # Push over SSH with the repo deploy key: develop's ruleset requires
          # PRs but grants DeployKey bypass, so this job (and only a holder of
          # this key) may land the sha-pin commit directly. The default
          # GITHUB_TOKEN push is rejected by the ruleset — GitHub can't grant
          # the Actions app a ruleset bypass on user-owned repos.
          ssh-key: ${{ secrets.FLEET_PIN_DEPLOY_KEY }}

      - name: Pin fleet images to the built commit SHA
        env:
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Keep in sync with the build matrix above (the images this workflow ships).
          for bin in \
            counter-server counter-worker audit-server audit-worker \
            auth-server media-server moderation-server search-server \
            realtime-gateway realtime-dispatcher \
            account-server chat-server comment-server engagement-server \
            geo-discovery-server notification-server post-server profile-server \
            social-graph-server timeline-server \
            migrator topic-provisioner; do
            NAME="core-platform-$bin" NEWTAG="$TAG" \
              yq -i '(.images[] | select(.name == strenv(NAME)).newTag) = strenv(NEWTAG)' \
              k8s/overlays/staging/kustomization.yaml
          done

      - name: Commit & push
        env:
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          if git diff --quiet -- k8s/overlays/staging/kustomization.yaml; then
            echo "Fleet images already pinned to ${TAG}; nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/staging/kustomization.yaml
          git commit -m "chore(deploy): pin staging fleet images to ${TAG} [skip ci]"
          # Rebase in case develop advanced while the matrix was building.
          git pull --rebase origin develop
          git push origin develop
